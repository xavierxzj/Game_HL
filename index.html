创招、养宠条件的几点释疑\n\n1：飞修行 \n大罗金仙练到1300级后，将接受三次考验；第一次掉300级、第二次掉200级、第三次掉100级\n魔神则第一次掉100级、第二次掉200级、第三次掉300级\n魔界法器合成：金光刀9点 堕天甲12点 龟背靴3点 甲为主锻造\n\n2：飞创招  \n打3只2000级的超防大象，初步估计每只约17000+血，人2700混防就够了\n\n3：飞养宠  \n大罗金仙：蓝发魔姬100级、绿妖200级、傲雪兽300级、至尊林400级、蓝鸟龙500级\n魔神：蓝鸟龙100级、至尊林200级、傲雪兽300级、绿妖400级、蓝发魔姬500级\n宠物等级必须适合，超过1级都无法接任务的；飞升后掉20万的养宠经验！", "source": "幻灵宝典"}, {"idx": 90, "orig_path": "幻灵杂类->龟壳、龙鳞等物品的出现地和用途", "orig_data": "龟壳、龙鳞等物品的出现地和用途\n\n龟壳  坠泪岗（45，25）（39，8）（37，17）\n龙鳞  吓死人洞（11，29）\n鳄鱼骨  东码头\n象牙  西雪岭（27，35）\n狼爪  踏雪原（59，73）\n凤凰羽翼   凰之谷（33，55）\n霸王钳  不归海岸\n人鱼之泪  在地狱抓只1级小丁当，到雪城宠店换到人鱼项链，到海底找人鱼三公主（34，32）可换成人鱼之泪\n\n地点后为参考坐标 如果大家有更好的坐标请补充：）\n其用途为：\n\n\n1、5个龟壳练成玄武丹，5个玄武丹练成乾金丹。一般情况下使用有毒药的效果。\n2、5个龙鳞练成青龙丹，5个青龙丹练成离火丹。一般情况下使用有毒药的效果。\n3、5个凤翼练成神凤丹，5个神凤丹练成垦土丹。一般情况下使用有毒药的效果。\n4、5个象牙练成穿云丹，5个穿云丹练成震木丹。一般情况下使用有毒药的效果。\n5、5个人鱼泪练成柔肠丹，5个柔肠丹练成坎水丹。一般情况下使用有毒药的效果。\n\n当把5个龟壳提炼成玄武丹的时候,\n分别把5个龟壳按12.11.9.7.6点的位置摆设好...主炼9点.便可得到玄武丹.... \n龙磷,象牙,凤凰羽翼还有人鱼泪也是按同样的方法提炼..\n\n当把5个玄武丹提炼成乾金丹的时候,方法跟把龟壳提炼成玄武丹的方法一样,\n分别把5个玄武丹放到12.11.9.7.6点.主炼9点.\n便可得到乾金丹...青龙丹,神凰丹,穿云丹和柔肠丹也是按同样的方法提炼..  \n\n\n\n\n最后把乾金丹12点，离火丹9点，垦土丹5点，震木丹7点，坎水丹3点按五行位置放入八卦炉，主炼乾金丹，可以得到紫阳丹。\n\n\n\n得到了紫阳丹后，将紫阳丹置于乾金位置，作为主炼，无极草震木，冰石坎水，无忧失心草离火，千年灵芝艮土为副，就可以得到提升人物功力的升级圣药通玄丹。（也就是升级药）", "source": "幻灵宝典"}, {"idx": 91, "orig_path": "幻灵杂类->新人练级详细路线", "orig_data": "新人练级详细路线\n\n龙的成长不在高而在成长分布！（一般6.5以上的就可以了）\n最好的分配是功防型的功防高敏低，这样练级好！\n练级带的宠最好是克制自己所打的怪物而不是被克，这样练比较好！\n\n金克木   \n木克土\n土克水\n水克火\n火克金\n\n新人1级带的装备  \n真爱仙屡0级+200敏\n采云衣0级+150防\n端午节的香朗+50防20敏50功50内或者+20防50敏50功50内\n恋之守护+30敏\n人宠合一\n先发制人-----要么人和宠的敏都低于自己打的怪物\n后发制人-----要么就都高于自己打的怪物\n人的敏只要能跟宠加一样高，在无好的防衣前还是以加防为主\n\n————————————————————————\n\n练金龙====当人和宠都有300敏就可以在悬台跟的到500的象了！到华山打的时候就可以不要敏了因为人和龙的敏一般都不会高于猴子和蹊跷鼠（龙的敏成长最好在1.0左右）\n\n1-15级 水城外郊 1-20铁甲龟 1-25蝴蝶\n15-25级 青风原 30拽刺头 25厚皮鳄(44,91/左角)\n25-60级 四桥原 50努努鸟 40酷刺头（防100敏50） 70骑士龟 80拽刺头（标33.64/防165敏40）\n60-80级 黄泥岗 111截拳道(38,10/右上方台子上) (防150敏需110以上)\n80-120级 松雪野 200白毛象 210楞头青 (敏需200以上,防需300左右)\n120-180级 雪融谷 250懒懒象(45,42/中间那有水的地方) (敏需170以上)\n180-200级 西雪玲 330白毛象 (敏180以上)\n200-250级 绿洲东郊 410酷毙象 (41,73/树周围) (防400+ 敏230+)\n榕盘谷 424跷跷鼠 （40，28/防375敏525）\n250-300级 悬台 590衰呆象 (55,55) (防500+ 敏380+)\n羁马谷 580弹簧鼠 (62.45/图右中/5，防430，敏690）\n300-500级 华山脚 720陶陶 740蹊跷鼠 (防需650+ 敏1180+)\n沙洞2层-紫苔洞窟 777绿锦宝 720拽刺头（防1600敏430）\n500-650级 华山脚 850陶陶 870蹊跷鼠 (防760+ 敏1450+)\n沙洞2层-紫苔洞窟 888绿锦宝 828呆刺头（34,37/防1780敏550）\n650-700级 华山亭 939截拳道 979级硬骨鳄 (防2000敏1170+)\n700-1000级 华山腰道 1050鲁鲁 1030琳琳 （标27.27 防2290敏1460）\n华山腰道 1191鲁鲁 1150蝴蝶 (防需要2560 敏1800+)\n1000-1200级 传说中的英雄冢 1300黄锦宝 (防2700，敏850)\n新山城1层-九曲回廊 1620呆刺头 1650红锦宝 (防需3850+ 敏需1200+)\n\n————————————————————————\n\n简单的说偶自己要是开小号从一级练的话\n①首先开号再带上装备真爱鞋+菜云衣服+香朗+恋之守护\n②带一只金龙（成长6.5左右功2.5左右防3.0左右敏0.8左右敏）\n③开始练级了（从开始1级到打500级的象加的点数全部加防，要是人和宠不合的话就稍做调整，人敏高了就脱下鞋，人敏低了就加一些，但不要太多了。鞋和香斓可以加250敏了所以点数加敏最多+50左右，当可以去华山打 山脚 720陶陶 740蹊跷的时候可以不要加敏了！因为怪物的敏很高，人和宠都跟不上！人带装备之后的敏可以跟上悬台的500级象就可以不再加其他的，都加防！）\n\n————————————————————————\n\n新人练苦行归和蝴蝶的路线（新人练级一般不会加功，因为没有极品装备所以点数要是加功就会很难练宠，蝴蝶和归的功成长一般不会很高要是功成长高了就不好练！所以新人一般不要练蝴蝶和归，但系统规定要练一只300级的苦行归才可以飞仙，下面给出练级路线。本人奉劝新人一般归练到300级可以飞就够了，没必要练到很高级别，因为飞仙后的归最多成长也只10+左右，成长好坏等级高低并不影响多大）\n\n\n1-15级 水城外郊 1-20铁甲龟 1-25琳琳\n15-25级 青风原 30拽刺头 25厚皮鳄(44.91/左角，防64敏15）\n25-65级 四桥原 50努努鸟 40酷刺头（防100敏50） 70骑士龟 80拽刺头（标33.64/防165敏40）\n观日桥 75铁甲龟 60厚皮鳄 （防140敏40）\n65-80级 闲情园 90盈盈 70铁甲龟 （防210 敏155）\n80-150级 剑池谷 121 琳琳 101 大嘴鳄 （防220敏110） 155琳琳(标40.37/图中宝剑下，防315敏134)\n松竹林 181呆刺头 (标22.11/右上的树后，防360，敏124)\n150-200级 怨灵洞口 282西皮 (64,56/图右中/树下) (防220,敏240)\n200-250级 银罐谷 414匆匆(42,34/右下树右) (防355,敏350)\n250-350级 铜人殿 424旺旺(82,45/右下) (防320,敏440)\n350-500级 将军碑谷 530迷惑 (61,43/图右中) (防600,敏515)\n500-650级 沙盗洞口 808迷茫 (24,24/碑周围) (防880,敏780)\n650-750级 沙洞1层-古铜洞窟 861跷跷鼠 828乐乐熊 (35,49/左中) (防需1600敏1151）\n华山脚 858淘淘 888跷跷鼠 (标36,54/防1650敏1273）\n小小房间 888绿甲 830欧欧 （防2330敏950）\n沙洞4层-古铜洞窟2 980懒懒象 920蜜蜜熊 (防需2050敏1450)\n750-850级 沙洞6层-碧水洞窟 1000迷茫 900蒙蒙(26,15/那个女孩边) (防1650,敏1500)\n小房间 939摇爷 989绿甲 （防2659敏771）\n850-980级 华山腰道 1050鲁鲁 1030琳琳 （标27.27 防2290敏1460）\n沙洞4层-古铜洞窟2 1070懒懒象 1030蜜蜜熊 (56,31) (防2150敏1600)\n过道 1040戛戛 1090蓝牙 （防2800敏1000）\n980-1000级 沙洞4层-古铜洞窟2 1111白毛象 1090蜜蜜熊 (37,48) (防2200敏1770）\n华山腰道 1120琳琳 1090鲁鲁 （防2400敏1600）\n1000-1100级 沙洞7层-盘龙洞窟 1191跷跷鼠 1150乐乐熊 (防2200,敏1800)\n华山腰道 1191鲁鲁 1150琳琳 （标53.26 防2550敏1833）\n窄窄的过道 1141愣头青 1191绿甲 （防3100敏1121）\n1000-1200级 沙洞7层-盘龙洞窟 1313白毛象 1262蜜蜜熊 (47,64) (防2800敏2000）\n华山瀑布 1302硬骨鳄 1262截拳道 （防3200敏1330）1393硬骨鳄 1330截拳道（防3500敏1400）\n很窄的过道 1250戛戛 1292蓝牙 （防3480敏1200）\n新山城1层-九曲回廊 1610衰呆象 1650欢欢熊(33,41) (防2800+,敏2000以上)\n新山城2层-九曲回廊 1970酷刺头 1920小妖(15,21) (防3500+,敏2400以上)\n新山城4层-清幽古洞 2480珍珍 2500西皮 (防5100+,敏2780以上)", "source": "幻灵宝典"}, {"idx": 92, "orig_path": "幻灵杂类->详解投胎！", "orig_data": "详解投胎！\n\n一：什么是投胎？\n通俗的说，投胎就是地仙800级以上的层次（每个层次都需要800级以上），重新回到凡人阶段的过程。\n\n二：为什么要投胎？投胎有什么好处？\n投胎即可以增加修行，又可以获得永久红利点，还可以帮助一些任务的完成。\n投胎后的修行奖励是按照投胎时的级别乘以投胎层次的倍数来了，既地仙*1倍、天仙*1.5倍、大罗*2倍、5转*2.5倍。\n比如：地仙800级投胎可以获得奖励的修行等级是800*1=800，地仙1200级投胎获得的奖励的修行等级是1200*1=1200\n比如：天仙800级投胎可以获得奖励的修行等级是800*1.5=1200，天仙1200级投胎获得的奖励的修行等级是1200*1.5=1800\n投胎后获得的红利点根据投胎的层次分别是：地仙10点、天仙15点、大罗20点、5转25点。\n\n三：什么人适合投胎？\n幻灵游侠毕竟是个集养宠、锻造等多方面的游戏，所以只有当你在养宠和锻造等方面有一定的积累了，投胎才能够事半功倍。\n上网时间比较充裕的玩家（能够24小时使用我网络），修行等级达到一定高度，所带出征宠物能够轻松的先出手秒50~60关的宠物，这样的玩家反复投胎比较见成效。\n虽然每次红利点加的比较少，但聚沙成塔，投胎次数多了后，累计起来却是个不小的数目。\n\n四：如何合理分配网络使用时段？\n这个问题不针对上网没固定时间的玩家，只为能够24小时使用网络的玩家而设。\n地仙800级层次投胎是目前最快的，因为不需要比如飞仙子做图鉴那样的任务。\n如果白天能够长时间面对网络，那么可以把需要破劫的地仙阶段放在服务器维护后的10点~18点这个阶段，投胎后的凡人放在18点~2点，散仙放在2点~早上服务器维护。\n如果是晚上能够长时间面对网络，那么可以把散仙阶段放在服务器维护后的10点~18点这个阶段，地仙放在18点~2点，投胎后的凡人放在2点~早上服务器维护。\n\n五：投胎注意的事项！\n出征的宠物一定要设置成你练级的1200级宠物，投胎后不要更换。\n凡人70级后可以去天关50~53关挂机到700级（一仗一级），700级~800级可以去59、60关挂机（780级后2仗1级）。\n凡人和地仙阶段需要重新在天关50那存记录，身上带的进入天关的钥匙不要丢，通过装备到身上在换下来调整钥匙在物品栏的位置。\n\nPS：如果你有充裕的上网时间，成长能够秒到60关的宠物，相应修行等级的装备，那么一天投胎一次，增加1600级修行、10点永久红利点就不是梦想。", "source": "幻灵宝典"}, {"idx": 93, "orig_path": "幻灵杂类->全防人快速练级路径", "orig_data": "全防人快速练级路径\n\n说明:为了飞妖MM,用一星期的守护天使卡注册了2个小号,5天练到夜叉1000级.练的是全防人.看到有不少练小号的人或是新人不知道怎么练级,现将自己整理的练级路径提供给大家,希望有所帮助.\n\n注:前提是出征宠是高成长,高防低敏的鸟龙.我本人用的为7.1成长,\n比例约2.8/3.7/0.6.这样不用顾虑鸟龙的防.而且攻足够秒.\n\n地点                Lv怪物                所需防\n水城外郊        \n3铁甲龟,4琳琳                12\n                9铁甲龟,10琳琳                24\n                20铁甲龟,25盈盈                60\n坠泪岗\n                30盈盈,35铁甲龟                90\n                35盈盈(26.19)                85\n四桥原\n                40酷刺头,50努努鸟        100\n枯井原\n                50拽刺头,60独行                130\n观日桥\n                60厚皮鳄,75铁甲龟        150\n四桥原\n                70骑士龟,80拽刺头        160\n明月桥\n                80大嘴鳄,95铁甲龟        205\n                95嘟嘟鸟(7,15)                200\n观日桥头\n        101拽刺头,106嘟嘟鸟        200\n                111铁甲龟,116淘淘        240\n                121拽刺头,136蓝萌萌        270\n闲情园\n                111铁甲龟,125盈盈        280\n剑池谷\n                150大嘴鳄,161琳琳        370\n                160琳琳(40,37)                320\n                166大嘴鳄,181琳琳        380\n松竹林\n                190呆刺头(22,11)        360\n断壁\n                220独行,227嘟嘟鸟        460\n                230酷毙象,242琳琳        490\n东码头\n                227硬骨鳄(29,10)        460\n断魂崖\n                272呆刺头,282琳琳        520\n赏月谷\n                343迷你象(50,70)        580\n榕盘谷\n                424跷跷鼠(40,28)        740\n羁马谷\n                580弹簧鼠(62,45)        850\n悬台\n                580淘淘,595衰呆象        1000\n                595衰呆象(55,55)        1000\n                606淘淘,626衰呆象        1140\n华山脚\n                717淘淘,740跷跷鼠        1320\n                780淘淘,811跷跷鼠        1540\n                858淘淘,888跷跷鼠        1640\n华山腰道\n        1030琳琳,1050鲁鲁        2290\n                1090鲁鲁,1120琳琳        2400\n                1150琳琳,1191鲁鲁        2600\n华山瀑布\n        1262截拳道,1302硬骨鳄        3200\n                1330截拳道,1393硬骨鳄        3500", "source": "幻灵宝典"}, {"idx": 94, "orig_path": "幻灵杂类->新手必读：新手任务攻略", "orig_data": "新手必读：新手任务攻略\n\n现发表我半年来玩幻灵新手各种快速升级的任务\n      一。先做个0级用的药王佩任务[防+20敏+20]\n      在山城药店门口可以遇见药王（27，35），从他那里听说了乾坤五行炉的情况，了解到武当的元元真人正是当今世上少数懂得使用乾坤五行炉的人。找到药王炼丹所需要的无极草与药王交换可以得到药王佩。[无极草在华山腰道左下角的NPC那的到答：无极天魔丹]\n      二。1-15级做丑剑客升级任务\n       这个任务只限于新手，到水城郊外找到丑剑客（打20级蝴蝶的地方）她会让你买一瓶甘露酒给他！如果你有300元就去药典买一瓶！她会给你升10级\nPS：投胎后的人可以利用此任务马上从1级到20级哦\n      三。50-69级做修剑传功任务\n      水城的楚狂人[楚狂人在青风原]前些天在幻兽的大战中受了重伤，心爱的宝剑也损坏了。他现在伤重不便行走，希望有人能帮他把他的剑送到山城铁匠张三那去修修。如果玩家和他对话，并选择帮助他，他会告诉你行走的路线，并将他的\"松纹残剑\"交给你。带着\"松纹残剑\"，找到山城的铁匠张三，得知他无法修复此剑，必须找树城的铁匠李四才可以修复。带着\"松纹残剑\"，找到迷雾榕城的李四，他会将\"松纹残剑\"修复为\"松纹金钢剑\"。 带着\"松纹金钢剑\"，回到水城的楚狂人处，将\"松纹金钢剑\"还给他，你的等级将得到提升20级\n       四。70-200级做送物得甲任务\n      华山脚的修行者一直在用乾坤五行炉炼制毒药，可是现在一些材料用完了，如果回城取，非常的费工夫。如果玩家和他对话，得知乾坤五行炉的作用和获取方法，并选择乐意帮他去买银蜂针和缝影烈毒散这两样东西，他会告知玩家在哪里买到这两样东西，并给玩家一张\"购物单\"。买到需要的两样东西后，带着\"购物单\"再次来到华山脚，交予修行者，他会将自己做的铠甲送给玩家。\n      五。到了150级做除小贼任务\n      和水城的怪老头对话，他会警告你要小心小偷。如果向他求助该怎么办，他会告诉你别把钱放在身上，都存起来，同时还要练偷。他还希望你能帮他夺回被逃到山城附近的小偷所偷走的东西。选择帮助他，你会得到物品\"物证\"。\n带着\"物证\"，找到枯井原的笨小偷。他提出用武力解决，选择\"我可不怕你\"，就进入战斗。战斗胜利，失去物品\"物证\"，得到物品\"贵重项链\"，将\"贵重项链\"还给怪老头，等级提高10级。\n     六。150级左右做“佛珠”任务\n     在水城的船上的小云（22，54），她会给你一条佛珠。再到树城斗宠处下面，找云中子（69，107），他会帮你把佛珠祝福一下，成为“祝福过的佛珠”\nPS：祝福过的佛珠 等级150级 +20攻 +20防 +20敏\n    七。现在可以做恋之守护任务\n     在美丽的栖月谷（28，40）[不到300级去要花3000块]，可以看到一个漂亮的mm可儿在呤诗，询问后得知她的恋人远在雪城，请玩家帮忙到雪城附近为她的恋人常枫送上一件可儿亲手做的“御雪暖服”（多才多艺，能诗，也能做家事）到了雪城附近，由西雪岭经寒井台,进入冰清桥往上就是玉洁桥，常枫会出现玉洁桥最深处（40，20），将衣服给他后，他会请玩家再帮忙带上一支“雪山人参”给可儿按原路回到栖月谷再与可儿交谈，可儿为了表示感谢，将自己儿时获得的一条有魔法的项链“恋之守护”赠送给玩家。此项链据说有特别的魔法，只要佩戴上这条项链，爱情就能得到恋之女神的护佑。\nPS：御雪暖服：0级使用 +5防（防具）恋之守护： 0级使用 +30敏（头饰）\n\n做好这些任务新手只要4。5小时左右可以轻松到练200级左右了\n建议新手先加帮可获赠幻币或0级用的一些新手防具或宠对你快速升级很有用的\n哈哈以上是我的一些菜鸟心得大家不要见笑", "source": "幻灵宝典"}, {"idx": 95, "orig_path": "幻灵杂类->快速带功德--6个半小时1W？", "orig_data": "快速带功德--6个半小时1W？\n\n7月12日。周六。38度。好热呀。我在没办法开空调的情况下（因为用两台电脑开小号，分别在两个房间里。）奋战6个半小时，把功德带到了1W。←达到飞升要求！\n现在来说说具体操作了：\n1。人物篇\n   申请4个新人帐号（免费3天）建议帐号名尽量一致。比如：king01、king02、king03、king04...记住一个帐号（便于快速修改）。\n2。装备篇\n   身饰：幻兽之灵    0级使用  +100血、100防、100敏（水任务兽玉换得）     推荐指数★★★\n          梦之链    0级使用  +100血、100防        （中秋任务绝版）      推荐指数 ★★\n          药王佩    0级使用          +20防、 20敏 （乾坤五行炉开炉任务）推荐指数  ★☆\n         彩蝶香囊   10级使用   +50防 +10敏？      （端午任务得）        推荐指数 ☆\n   头饰：恋之守护    0级使用                 +30敏 （随便就能得）       没商量，就是他了！\n   衣服：彩云衣     0级使用          +150防        （水任务10打怪得）   没商量。就是他了！\n   鞋  ：真爱仙履   0级使用                  +200敏（雪狼湖任务得）     没商量，就是他了！\n按幻兽之灵装备下来：1级新人 100血250防350敏（新人20点加敏）\n3。宠物篇\n   单人天关3层抓N只（各人能力，我有2个宠袋。抓了20只）150级的欢欢熊，敏捷在150-170左右不等。\n   高兴的话毒死这帮熊，就是血为1\n解释一下：1、为什么要抓熊。因为推荐挂功德的地点为松竹林，打190级的刺头敏在130左右。让新人带熊出征可以跟人合击（并不是指望这些熊帮你秒刺头。虽然熊是克刺头的）打还是要靠你大号的人和宠！\n         2、为什么要毒死他们。因为熊能和人合击，所以也有经验拿。当新人够等级了。熊也升了不少级。下批新人怎么办？如果毒他们到1点血，可以使他们在战斗中死亡概率加大，减少升级可能。（我20只用光后就没再去抓。太麻烦。新人带乌龟出征了！不过速度就慢了点）\n\n准备就绪就开动吧，建新人，重新分点。全敏！新人出来在客栈，然后集结到水城驿站。1个号组队。另外3个加。凑200两给组队的号。从驿站直接到树城去松竹林。大号分发装备、宠。然后组队！小号们穿戴整齐。带好宠出征。不用加血了。直接加入队伍混吧。\n提示：大号用2.5版本开宠爱。小号们开2.0版本。常用命令里选自动战斗！队型：鸟阵。\n\n20分钟后。新人们都55-60级了。停。上缴装备。钱财.宠（超过150就连宠带人一起删了）。\n10分钟后。又一批新人来到了松竹林。重复以上的动作。。。。。\n\n计算：\n\n4个新人=60级*12=720点功德/30分钟！1小时1440点功德。6.5小时~7小时。1W功德任务圆满完成！\n我因为在两台电脑之间反复奔走。又因天气太热汗如雨下。所以奔走的速度约等于乌龟爬行速度的80%。有条件1开5的朋友估计时间更短。\n\n以上为本人带功德的一点小经验，与大家分享。如有不对的地方请大侠们指出！", "source": "幻灵宝典"}, {"idx": 96, "orig_path": "幻灵杂类->幻灵天劫全过程", "orig_data": "幻灵天劫全过程\n\nby不会打字\n\n\n本帖可随意转载,但是请註明出处及作者\n\n\n地仙(三隻)   过劫奖励:2000两 (1199劫奖励黄龙使)\n天劫      怪物   属性  倍数         天劫      怪物   属性  倍数 \n99        黑蹄先生  木    1.5           699     黑蹄先生  木   1.5 \n199      黑蹄先生  木      2           799     黑蹄先生  木   1.4\n299      黑蹄先生  木    1.8            899     黑蹄先生  木   1.3\n399      黑蹄先生  木    1.6            999     黑蹄先生  木   1.4\n499      黑蹄先生  木    1.5            1099    黑蹄先生  木   1.4\n599      黑蹄先生  木    1.5            1199    黑蹄先生  木   1.4\n\n夜叉(三隻)   过劫奖励:2000两 (1199劫奖励绿衣仙子)\n天劫    怪物    属性   倍数          天劫     怪物    属性  倍数\n99         大刀    土     1.5            699     紫蹄先生  木   1.5 \n199       大刀    土       2            799     紫蹄先生  木   1.4\n299       大刀    土     1.8            899     紫蹄先生  木   1.3\n399       大刀    土     1.6            999        大刀    土   1.4\n499     紫蹄先生 木     1.5            1099    紫蹄先生 木    1.4\n599     紫蹄先生 木     1.5            1199    紫蹄先生 木    1.4\n\n天仙(随机二隻)  过劫奖励:2000两 (1199劫奖励金歇龙)\n天劫    怪物      属性   倍数       天劫    怪物       属性   倍数\n99   拽刺头 中刀  金 土  1.8        699   独行 大刀     金 土  1.4\n199   拽刺头 中刀  金 土  1.5        799   独行 大刀     金 土  1.4\n299   拽刺头 中刀  金 土  1.5        899   露露鸟 大嘴鳄 金 胎， 特点：按1300级投胎算（一般5转投都选择飞的是尚武），每次投胎加红利点数是25点+10点奖励=35点. 加的修是1000级（地仙）+1000级（天仙）+1300级（大罗）+1300级5转+(1300现行等级)*2.5的奖励=7850级。\n       优势：红利多。加红利的同时修也加的不少，\n       劣势：1：需要时间和钱搞仙子或是黄龙。\n                2：由于到地仙开始一直到飞了5转前都是每100级要过劫。所以除非人守着机器.不然就耽误很多的时间。（5转是每300级过劫）\n                3：能保持1天3解的人，5转投胎估计3天每投。条件是有仙子或龙。\n                4:  必要的时候需要一个做药的小号配合(带仙子或是黄龙吃药)     \n      比较：我们分别拿99天和198天的时间来做一个比较（当然只是纯数字的，除开了人为和机器的因数）\n\n     99天地仙投胎：每天1投，99天就是能到最高的99投，奖励红利是(10点红利+10点飞升奖励)*99=1980点，修按都是1200级投胎算是( 1200+1200)*99=237600级。\n     99天五转投胎：每3天一投（多少借助九转一点），99天就是33投，奖励红利是(25点+10点)*33=1150点。按每次1300级投胎算，修是7850*33=259050级。\n\n     第一结论：地仙99天比5转多1980-1150=830点红利(优势明显)，而5转比地仙多的修是259050-237600=21450级(没有什么优势)，\n  \n   198天地仙投胎:还是每天1投,99天到99投,红利是1980,修是237600,因为不能再投胎了.剩下的99天兵解加修,一天3解800级为例 ,修是3600级/天*99天=356400,加上前99天的修=594000.\n    198天5转投胎:还是每3天一投,198天是66投.红利是35*66=2310点.修是518100.\n     \n    第二结论:5转198天66投比地仙多2310-1980=330点.修比地仙少594000-518100=75900(只要懂锻造的人都知道,对于这个修行级别来说,这点修不算差距),由此可见,到此时5转投胎的优势就显示出来了.而且越往后面,优势越明显.\n\n     最后总结一下：地仙投胎是在短期内看效果，而5转投胎则是着眼将来，可以说，选择地仙投胎的人，在自己99投以前的时间内都是比较风光的。因为速度快。能在短时间内加N多的红利，相比较而言，5转投胎一直比较被动。。但是5转投到60投以上的话。效果就出来了。\n     \n    当然.各位玩家的想法是仁者见仁,智者见智.该用哪个方法.我想大家会根据自己的实际情况选择,重要的是.我们是人玩游戏..不要让游戏来玩我们就行了.呵呵.最后感谢我风之谷的几个朋友给我具体的数据.希望能给大家一点参考.\n\n    PS:其实在投胎中。还有一个隐藏的飞升奖励。比如我以前20投1级凡人点是400。散仙就是665。而21投的时候凡人则是410点。但是散仙却是687点，就是说比正常算发多了2点。对与这个2点的说法。大家意见不一。但是不能忽略的。大家注意了。。\n", "source": "幻灵宝典"}, {"idx": 98, "orig_path": "炼化资料", "orig_data": "\n\n\n\n哎呀这个装备前宽后窄，左重右轻的，带上去饭吃不好觉睡不着，前一段时间我在张家庄认识了个铁匠他物美价廉，童叟无欺，这个是他名片，你就说是我介绍的，还会给你打9。5折呢！", "source": "幻灵宝典"}, {"idx": 99, "orig_path": "炼化资料->新手炼化", "orig_data": "新手地带，高手勿进\n把你这个高手也误倒了就不太好了嘛", "source": "幻灵宝典"}, {"idx": 100, "orig_path": "炼化资料->新手炼化->锻造炼化攻略", "orig_data": "锻造炼化攻略\n\n\n\n一、乾坤五行炉的基本概念 \n\n道家学说认为，世间的万物都是有金、木、水、火、土五种元素组成，也各自具备其对应的五行属性。在乾坤五行炉内，所有的物品在五味真火的作用下，都可还原到上述的五种基本元素，然后根据一定的规律组合成为新的物品。这就是乾坤五行炉的基本原理。简单地说，就是大家可以把任何东西都丢进五行炉内，得到新的东西。 \n\n二、如何使用乾坤五行炉 \n\n使用乾坤五行炉很简单，首先你完成相关任务得到一个炉子，然后点击\"乾坤五行炉\"的指令，将宠物、物品，甚至是银子都丢进五行炉内，然后系统会提示，问你这次炼化的主要成份是什么，选择主炼成份后，系统就会预测炼化的产物，如果满意，就进行炼化，不然就试一试调整一下物品在五行炉内的位置，说不定会有意外的效果。 \n\n三、乾坤五行炉的炼化规则 \n\n每次炼化都有一个主炼成份，其它的一起丢进去的物品根据你的炼化经验值的高低，可以有1－7个。\n主炼成份一般决定了炼化出来的产物的类型。炼化炉的内部有非常复杂的计算和八卦五行的运用，规则非常的繁琐，所以大家如果不是很想成为炼化专家，不用再看下去，只要重复利用系统的预览功能，多试试也会逐渐熟悉其中的规律。\n\n注意：\n1、以下炼化规则只在炼化的物品之间起作用。用武器店和饰玩店里买到的物品来锻造，就会有一定的偏差。\n2、炼化的物品不但属性会发生变化，其使用等级也会发生变化。炼化的时候可以运用增强或者减弱某属性的方法来调整出合适你的使用等级。\n\n1、以装备为主炼成份的炼化 \n装备包括武器、防具、鞋、身饰和头饰。以装备为主炼成份的炼化，出来的产物还是这些装备，不过根据\"陪炼物品\"的不同，得到的装备属性会有不同的变化。变化的规则主要遵循五行生克的关系。 \n装备各自具有五行属性：武器＝火、防具＝金、鞋＝水、身饰＝木、头饰＝土。（其中身饰主要指加内力的装备，其他的身饰作特殊物品对待。）\n\n当两个装备进行炼化的时候： \n如果装备是同一种的，那么这种装备的主属性就可能上升，如两个鞋子炼化，一般可以得到敏捷更高的鞋子。 \n\n如果主炼物的五行\"生\"陪炼物，那么主炼物中的对应陪炼物的那个属性就会上升。如武器（火属性，主加攻击）为主炼物，加上头饰（土属性，主加血），那么锻造出的武器就可能有了加血的功能。 \n\n如果主炼物被陪炼物\"生\"，那么主炼装备的对应属性和陪炼装备的对应属性都会上升，不过主要是升主炼装备的对应属性。如武器 （火属性，主加攻击）加上身饰（木属性，主加内力），那么这把武器的攻击会上升，同时内力也会上升。 \n\n如果主炼物五行\"克\"陪炼物，那么主炼物中对应陪炼物的那个属性就会下降。如武器（火属性，主加攻击）加上护具（金属性，主加防），那么这把武器的防御就会下降（甚至变为负值）。这一种炼化其实很重要，举例说明，比如我有一把攻击加500的刀，这把刀要求修行等级8000才可以装备，我的修行等级只有3500，那么我可以把对我不重要的防御的属性降低一些，直到这把刀的使用等级降低到3500。\n\n如果主炼物五行被陪炼物\"克\"，那么就会直接降低主炼物的对应属性，加入的陪炼装备越好，降低得越多。如武器（火属性，主加攻击）加上鞋子（水属性，主敏捷），那么得到的武器，攻击就要下降了。 \n\n灵活利用上面的规则，就可能得到最适合自己用的装备。\n\n2、以宠物作为主炼成份的炼化 \n宠物作为主炼成份时，根据陪炼的物品的不同，得到的东西完全不同。 \n\n当宠物加上宠物时，可能得到装备，药物，暗器，毒药等等，主要还是看主炼宠物在五行炉的位置以及它和陪炼宠物的五行生克关系。 \n\n当宠物加上装备时，就是五行炉非常重要的\"强化\"作用。\n强化就是根据陪炼装备的属性特点，在等级不变的前提下，移动宠物的属性点分配。你是不是有一只敏捷很高，防御却很低的蝴蝶仙子啊？ 现在你有办法将敏捷的一部分点数移动到防御上！这种移动的效果，还可以通过幻化继承下来。\n因此，通过认真的安排，充分利用五行炉的强化和幻化系统，你可以得到自己最理想的属性点数分配比例的宠物，那样才是真正的养宠大师！\n需要注意的是，点数移动的多寡主要和陪炼装备的好坏有关系，另外，如果宠物强化过后，可以再次强化，不过效果不可以叠加，而是后来的强化作用取代了原来的强化作用。 \n\n3、以药物、毒药和暗器为主炼成份 \n这些方面的效果主要是得到更好的药物、毒药和暗器。 \n\n4、用银子作为主体 \n用银子作为主体只有加入宠物才有用，效果类似将宠物就地卖掉，不过价钱收到炼化经验，宠物位置、主炼的银子数目等等因素的影响。 \n\n四、乾坤五行炉的二期功能 \n乾坤五行炉的二期功能主要是根据秘方，炼化出各种特效的药物和符咒等等，如升级药，宠物加忠诚药，或者是复活的符咒等等。 这些功能的设置不久即会推出。 \n\n小资料：\n五行、八卦的对应关系：\n五行分为：金、木、水、火、土，其分别对应的八卦脉象为：\n乾、兑属金，坤、艮属土，震、巽属木，坎属水，离属火。\n那么，根据五行相克关系：水克火，火克金，金克木，木克土，土克水，就不难将八卦的相克关系总结出来：坎克离，离克乾、兑，乾、兑克震、巽，震、巽克坤、艮，坤、艮克坎。同样，我们也可以根据五行的相生关系：水生木，木生火，火生土，土生金，金生水的道理来总结出八卦的相生关系：坎生震、巽，震、巽生离，离生坤、艮，坤、艮生乾、兑，乾、兑生坎。\n\n幻灵世界的五行属性规划：\n在游戏中点击【帮助】里的【世界地图】，或者点CTRL+F1，就可以看到《幻灵游侠》的总地图了。\n其中，中原山水片区为土属性；西域大漠片区和地狱为火属性；北国风光片区和海底为水属性；天空之城为金属性；椰风海岸片区为木属性。\n了解了五行八卦的对应关系，再结合幻灵地图的五行属性来锻造和幻化，那阁下的造诣就是太上老君也得谦让三分啦！", "source": "幻灵宝典"}, {"idx": 101, "orig_path": "炼化资料->新手炼化->乾坤五行炉", "orig_data": "乾坤五行炉\n\n道家学说认为，世间万物皆由金、木、水、火、土五元素组成，也各自具备独立而又互相联系的五行属性。乾坤五行炉就是根据这个原理，把任意两件或者几件物品在炉内用五味真火进行炼化，就可以得到新的物品出来。\n\n具体操作如下：\n\n点击此键可弹出乾坤五行炉的炼化面板。左侧是宠物栏和物品栏，左键点击某物，在中间的资料栏可以看到该物品的图像及属性。下方是银两，两边的\"＋\"、\"－\"可以用来调整你投入炉内的银两，每次以1000两为基本单位。这三部分东西都是可以用来炼化的。\n\n中间部分是选定物品的资料，可以显示炼化前、后物品的属性。\n\n面板右侧是乾坤五行炉，上面有8个位置可以放置物品，从左侧的宠物栏和物品栏点击某物，可以拖到其中任意一个位置上。 按照上述步骤，放置2个或者多个炼化的物品后，用右键点击一个物品，指定它为主炼成份，然后可以点击下面的\"预览\"，可以在中间部分弹出一个物体栏，显示出炼化得到的物品及其属性。\n\n如果满意，就可以关闭这个物体栏，点击\"炼化\"后点击确定，此时系统会要求你输入密码，以确认你准备炼化，系统确认密码无误，太极鱼即开始转动，炉内的物品会被炼化，在物品栏里你就可以看到你想得到的物品了。\n如果对预览的结果不满意，你可以试着调整一下各炼化物品的位置，再看看预览，说不定会有意外的效果。\n\n详细的炼化方法请参看锻造炼化攻略", "source": "幻灵宝典"}, {"idx": 102, "orig_path": "炼化资料->新手炼化->五行生克关系", "orig_data": "五行生克关系\n\n首先让我们简单了解五行的生、克关系。五行学说也是古人确定的一种物质构成关系，他们认为世界万物都是由金、木、水、火、土五种元素构成的。人们将每种事物的五项内容都分别显示成木、火、土、金、水的五行顺序。五行有生成、相生、相克的顺序。生成的顺序是木、火、土、金、水。相生的顺序是木生火、火生土、土生金、金生水、水生木。相克的顺序是：水克火、火克金、金克木、木克土、土克水。\n\n五行生克在阵形中的表现 无 木 火 土 金 水 \n普通 鸟栖 虎翼 龟背 金鳞 龙游 \n                                 \n                      \n                                 金\n\n\n\n                        火                 木\n\n\n\n\n                            \n                           水           土\n                                           \n顺时针为相克\n在里面画五角星以木到火开始画则为相生\n（因为实在太难画了画不了，十分抱歉） \n\n装备、宠物自身的属性和幻灵世界的各地区里也按照五行原理设置了金、木、水、火、土五种属性，在捉宠和战斗的时候要注意彼此间的相生相克关系，就会得到事半功倍的效果。\n\n另外，宠物的幻化、五行八卦炉的炼化都和五行原理有密切的关系，详情可参看各自的说明。", "source": "幻灵宝典"}, {"idx": 103, "orig_path": "炼化资料->新手炼化->煅造新手入门、煅造基础知识", "orig_data": "煅造新手入门、煅造基础知识\n\n\n\n一  如果你的炼化经验还是0，那么请查看任务资料里功能任务的五行炉开启\n\n二  一些基础知识\n<所谓“连炼”：1000炼化经验=6连炼、1200炼化经验=7连炼、1500炼化经验=8连炼>\n\n1   五种装备五行属性：武器（火）防具（金）鞋（水）身饰（木） 头饰（土）\n     通常我们也叫身饰为 内带或左饰 ；叫头饰为 血佩或右饰\n     通常也把五行炉的位置叫做 1点、3点、9点、12点 之类的<拿起手表或看看时钟就知道了 ^_^>\n     \n\n\n\n2   宠物 + 装备 = 宠物的三围调整 （最好装备等级是宠两倍以上的）\n如果想加防减敏攻击不变   推荐使用逍遥战衣炼化到20W修行，再和宠物煅造\n如果想加攻击减敏防不变   就用加防的武器做原料 或 高等级的武器加低等级的衣服\n如果想加敏减攻击防不变   就用加防的鞋做原料 或 高等级的鞋和低等级的武器\n\n如果想单加、其他的不管   就用加单属性的装备原料\n如果攻、防都要加         推荐用武器和衣服一起来锻造宠物\n\n\n3   宠物 + 宠物 = 装备、药物、暗器\n宠物要炼化成装备时，根据宠的属性放在乾坤五行炉的对应位置\n乾、兑位煅造出衣服    离位煅造出暗器   坎位煅造出鞋子   其他两方位出的均为饰物\n\n例如：主炼方位出的物品\n\n金属性宠（主）+ 宠 = 加血的药\n木属性宠（主）+ 宠（离） = 内药 （放在左下）= 出饰品加内（或防且同副宠有关）\n水属性宠（主）+ 宠 = 毒药\n土属性宠（主）+ 宠 = 加血的头饰\n\n\n4   各种装备的属性原理（攻、防、敏、血、内）\n衣服：减内 |  如果想要给衣服加内、必须找件原始就+内的衣服 \n武器：减防 |  如果要给武器加防、必须找原始就+防的武器\n鞋子：减功 \n身饰：减血 |  要给身饰加血、同样必须找原始+血的身饰\n头饰：减敏 |  同上说法、目前有恋之守护+30敏的和绝版的思念发钗+50敏的\n\n\n5   药物和暗器 = 更好的药物、暗器\n-5000毒药练法 = -100毒 + 暗器重复炼得到\n+20000内的药 = 林天的玉佩 + 止血草（只要是身饰都可以）\n+20000生命20000内的药 = +20000内的药（坤）+暗器（离）= +20000血20000内的药\n\n\n6   极限、超极限；极限的煅造方法\n衣服、武器、鞋子：3168      头饰、身饰：4251\n半极限装备 + 半极限装备 = 超极限 （用处不大）\n\n衣服放11点、毒药放12点、其他炉位全放暗器\n武器放9点、毒药12点、其他炉位全放暗器\n鞋子放3点、毒药12点、其他炉位全放暗器\n头饰放6点、毒药12点、其他炉位全放暗器\n身饰放2点、毒药12点、其他炉位全放暗器\n\n\n7   如何降修及降修的含义、如何微调装备的属性\n->不管衣服、鞋子、武器、头饰还是身饰，降修行都是用草药或银两（通常都用止血草；加血效果越少的，降的程度越大）\n\n降修的含义：\n衣服降修 = 给衣服降防 <衣服9点、草12点>\n武器降修 = 给武器降攻 <武器12点、草9点>\n鞋子降修 = 给鞋子降敏 <鞋子9点、草12点>\n身饰降修 = 给身饰降内 <身饰9点、草12点>\n头饰降修 = 给头饰降血 <头饰9点、草12点>\n\n\n->微调：\n简单的说就是用毒量不高的毒药与装备炼化，一般都是用药店里卖的毒药(自己炼化毒量不高的毒药也行)；\n在我们成功炼化出一件装备时，通常要降到自己需要的等级\n\n打个比方：\n你已经成功煅造出一双 -1995攻 -300防 +6651敏的鞋子\n你要把它降到1000级使用，鞋子放9点、止血草放11点，循环炼之\n会得到一双 1000级 +2600敏 -1995攻 -300防 的鞋子\n而+2600敏并不是1000级的最佳敏捷\n此时你要到药店买一个毒药，鞋子放3点、毒药放12点，循环几次\n就会得到一双1000级 +2694敏 -1995攻 -300防 的鞋子(1000级最佳敏捷)\n\n", "source": "幻灵宝典"}, {"idx": 104, "orig_path": "炼化资料->新手炼化->目前最好的煅造材料", "orig_data": "目前最好的煅造材料\n\n防具\n1   堕天甲 -70攻 -80敏 (5转飞升堕天魔尊任务物品/目前最好的防衣材料)\n2   云锦天衣 -70攻 -80敏 +100血 +150防 (云锦天衣任务)\n3   日月甲 +300防 -100敏 (兄弟天关第30关)\n4   正气甲 +800内 +100防 (兄弟天关第30关)\n5   正气战衣 +400血 +2000内 -100攻 +300防 +100敏 (正气战衣的得到方法/最好的血内衣、血敏衣材料)\n6   罗星护甲 +160防 -30敏 (沙城武器店)\n7   天蚕衣 -50攻 -50敏 +500防  (5转飞升功德天神、泯灭魔尊任务物品)\n\n\n\n武器\n1   醉龙舞雪剑 -100敏 +100防 +400攻 (醉拳任务)\n2   青枫剑 -100敏 +100防 (5转飞升巡游天神任务物品)\n3   金光刀 +100防  -150敏 (5转飞升堕天魔尊任务物品)\n4   情剑 +120防 (山城武器店；西门吹雪、淑女、高丽女的武器)\n5   赤刃 +50防  (名剑山庄降妖任务)\n6   邪王摄魂刀 +232攻 -70敏 (沙城武器店)\n7   子母环 +100攻 +50防 -140敏 (云锦天衣任务)\n8   梅花钩 +100攻 +50防 -140敏 (云锦天衣任务)\n9   龙纹扇 +100攻 +50防 -140敏 (云锦天衣任务)\n10  青玉腿甲 +100攻 +50防 -140敏 (云锦天衣任务)\n\n\n\n鞋子\n1   飞羽 +500敏 -300防 (兄弟天关第30关/目前最好的防鞋、各类PK鞋的材料)\n2   凤凰战靴 +500敏 -280防  (凤凰战靴、狂狼战靴的得到方法)\n3   狂狼战靴 -100血 +1000内 -50攻击 ＋500敏 \n4   真武靴 +400敏 -100攻 (5转飞升巡游天神任务物品)\n\n\n\n身饰(左)\n1   磐龙樽 +200血 +230防 +200敏 (磐龙樽的得到方法/目前最好的左饰)\n2   仙风七宗佩(“仙侠浩然佩”) +200血 +220防 +200敏 (转800级/修1600级)\n3   妖灵寄魂佩(“妖魂佩”) +100血 +300内 +200防 +100敏 (转600级/修1400级)\n4   梦之链 +100血 -300内 +100防 (2002年、2003中秋节任务、0级使用)\n5   御天宝环 +120防 +120敏 (山城饰物店)\n6   经天镯 +150防 (山城饰物店) \n7   碧血扳指 +240敏 (山城饰物店)\n8   上古魔戒 +100攻 +150敏 (山城饰物店)\n9   疾风之瓶 +110攻 (兄弟隐藏关第76关、50级宠装)\n10  疾风之镯 +100防 (兄弟天关隐藏关第76关)\n11  疾风之戒 +120敏 (兄弟天关隐藏关第76关)\n12  云淡风轻瓶 +300功 (兄弟天关隐藏关第70关)\n\n\n\n头饰(右)\n1   丹凤钗  -120攻 +1200血  (5转飞升功德天神、泯灭魔尊任务物品/目前最好的防佩、PK佩材料)\n2   太乙珠  -100攻 +1000血 (5转飞升巡游天神任务物品)\n3   思念发钗 +10攻 +50敏 (已绝版的头饰/目前最好的加敏右饰)\n4   长命锁　+300血 -50攻 (长命锁的得到方法)\n5   人鱼项链  +10攻 +10防 +10敏  (乒乓鱼任务)\n6   恋之守护  +30敏  (恋之守护任务)", "source": "幻灵宝典"}, {"idx": 105, "orig_path": "炼化资料->新手炼化->装备新理论", "orig_data": "装备新理论\n\nby：robin1108\n\n\n\n\n先要说明这个是我自己到现在对锻造的理解所写，可能有不对的地方，不是权威．\n再就是这个帖子研究的是做最高极限状态的属性填加，不是在第１次极限以前的属性填加．\n\n先说下装备有属性相生，相克，被克，相离这４个状态．以武器做列：\n武器属火，相克金，相生土，被克水，相离木．\n于是武器要减属性只可以减金，可以加土水木．\n这里以下部分是我自己的总结了，希望可以得到补充和批评．\n相生＝可以吧正属性点全部加上去，１００％\n相克＝这个就不说了，全世界都是，减多少属性的现在数据全有了．\n被克＝（３１６８＋减的副属性）＊０.３＊０.７４４\n相离＝正属性点的７０％可以转过去．\n\n以武器醉剑为实例：武器醉剑极限加攻击6361,锻造基础里就有锻造只可以转正属性的30%\n于是6361*0.3=1908\n相生=1908*100%=1908                      由于是血还要*3  1908*3=5724\n相克=1908                                于是减攻击1908\n被克=(3168+1910)*0.3*0.744=1133    于是加敏捷1133\n相离=1908*0.7=1335.6                     由于是内还要*3  1335.6*3=4007\n\n再说下加属性的办法:\n相生=直接往上加极限,相生状态下加极限正属性点是不变的.\n相克=个各帖子离都有,就是加负极限加正极限加副极限......\n被克=这个是最难的,被克状态下加副属性后正属性的修行会往下掉,要计算出合适的点才可以加到.\n相离=把正属性降修后加副属性,副属性极限加上去后正属性修行也会提高,这个加起来也简单,不停的往上加就可以.\n\n最后要说的是所有状态下,相生是个很特别的情况,只要正属性的纯点在那,就可以加极限,加到那个点为止.\n有实际例子可以证明,1把加1134的武器,加了血以后状态是+血4620+功5134-防1910+敏1134.\n\n可能新手看不懂,锻造高手可以一起来研究下.\n再就是不要去死盯着那几个点的出入,这个是理论性的东西,误差不是太大就可以.\n帖子里的加属性方法很实用,这个是锻造高手要知道的.\n\nPS:很久以前玩的锻造,现在极限满天飞就研究了下超过第1次极限下锻造的理论,自己看看没什么问题了.大家可以一起探讨.", "source": "幻灵宝典"}, {"idx": 106, "orig_path": "炼化资料->高手炼化", "orig_data": "高手高手高高手，新人勿进，免得倾家荡产", "source": "幻灵宝典"}, {"idx": 107, "orig_path": "炼化资料->高手炼化->PK装备完全攻略", "orig_data": "PK装备完全攻略\n\nby:pan\n本贴属原创,版权是作者的,别让我看见有任何形式的盗,转,偷,不然我跟你没完,特指某几个人[/COLOR] [/SIZE]\n\n一：基本知识\n1:练造成装备对应属性： \n武器（火） 防具（金） 鞋（水） 身饰（木附加内） 头饰（土附加血）\n2:装备误区\n装备常会在练到属性点4300左右时到达第一次假极限，其实这时候可以通过多加一个同样的装备得到更大的属性\n双加得到的正属性极限装备效果是一样的，上述只适合有负属性的装备\n3：位置误区\n请留意装备对应属性，尽可能的不要放在相克的位置\n\n二：装备间煅造主炼加副炼效果对照图\n\n\n\n三：计算公式\n1:材料计算\n公式：副练＊30%＋主练１０００级纯属性点+副１０００级纯属性点＝主练需要属性点（适用鞋子/兵器/衣服 ）\n公式：副练/３乘90%＋副练１０００级纯属性点＝主练需要的属性点（适用头饰/身饰）\n注：公式计算的值是至少初步值，可用毒微调到最合适的可利用值\n\n2：各种装备的1000级纯属性点计算方法\n衣服     ： 防+敏+攻+内/3+血/3=499\n鞋子/兵器： 防+敏+攻+内/3+血/3=399\n头饰/身饰： 防+敏+攻+内/3+血/3=149\n\n3：点数换算\n敏，攻，防点互换是一比一\n敏，攻，防点换血点内点是一比三\n\n四：PK装备之衣服篇\n纯敏衣\n主材料：500元轻布衣\n副材料：680元的草鞋\n位置   ：衣服金位（11和12点） 鞋子水位（三点）\n具体做法：\n第一步：\n计算所需材料\n副材料：假设副材料使用加敏3168的极限鞋\n主材料：3168*30%+499=1449（按公式1计算得出主材料衣服需加防1449）\n第二步：在衣服加防为1449的基础上一个个毒慢慢调节得到下面数据\n           极限鞋功+3168，甲防+1501甲11点鞋3点甲做主炼出来甲敏+446\n第三步：反复用公式计算衣服的初步所需防点\n第四步：按个人等级计算最高可加敏点，计算方法如下\n           用毒练一个你能穿的等级的加敏鞋子得到其纯点，鞋子的纯点就是你的衣服可加的敏点\n第五步：用草药或银子降级，注意位置\n\n纯血衣\n主材料：500元轻布衣\n副材料：水城1200元的水纹坠\n位置   ：衣服金位（11和12点） 血佩土位（五点和六点）\n具体做法：请参看纯敏衣。佩加衣同时升防和血，衣服的防点关系的能减的血点，可用毒草再加防\n\n纯攻衣\n主材料：500元轻布衣\n副材料：水城200元的乌云剑 草鞋\n位置   ：衣服金位（11和12点） 攻剑火位（三点）鞋子水位（三点）\n具体做法：请参看纯敏衣，剑加衣有降级作用，请注意用毒草加衣服的防，以免衣服的防不足以得到攻\n\n血攻衣\n主材料：轻布衣 \n副材料：乌云剑 水纹坠\n位置  ：衣服金位（11和12点） 攻剑火位（9点）血佩土位（五点和六点）\n具体做法：请参看纯敏衣，先把需要的血加够，再用刀来降级得到攻\n注意：敏点换攻是一比一，敏点换血点是一比三\n\n血敏衣\n主材料：轻布衣 \n副材料：水纹坠 草鞋\n位置  ：衣服金位（11和12点） 鞋子水位（3点） 血佩土位（五点和六点）\n具体做法：请参看纯敏衣，请先把需要的血加够，降级后就是可用的敏点。\n注意：敏点换攻是一比一，敏点换血点是一比三\n\n\n五：PK装备之兵器篇\n纯攻剑\n主材料：自己适用的武器\n副材料：轻布衣 \n位置  ：衣服金位（11和12点） 攻剑火位（9点）\n公式  ：1000级的攻击=399+减去的防御\n具体做法：\n第一步：兵器放在火位 +毒药=炼化武器\n        衣服放在金位 +毒药=炼化衣服\n第二步：炼化武器（火位）+炼化衣服（金位）=减防御的刀 \n第三步：减防御的武器+毒药=减防御的武器2（有更高的攻）\n第四步：减防御的武器2+锻造衣服=见防御的武器3\n第五步：循环下去 最后得到最高可减到1867的防 加攻6300的兵器\n第六步：用草药降等级，注意位置，兵器属火，按五行相生相克 的原理，兵器不要放在火位\n第七步：注意问题当你无法再进一步减攻时请再多加一把兵器\n\n攻内剑\n主材料：自己适用的武器\n副材料：轻布衣 水城珠宝店的黄绵带\n位置  ：衣服金位（11和12点） 攻剑火位（9点） 内佩木位（1 点）\n具体做法：参看纯攻兵器，计算好个人等级的纯点，内点换攻是一比一，敏点换血点是一比三得到最好的兵器\n\n攻血剑\n主材料：自己适用的武器\n副材料：轻布衣 水城珠宝店的水纹坠\n位置  ：衣服金位（11和12点） 攻剑火位（9点） 血佩土位（5点）\n具体做法：参看纯攻兵器\n\n纯内剑\n主材料：自己适用的武器\n副材料：轻布衣 黄绵带\n位置  ：衣服金位（11和12点） 攻剑火位（9点） 内佩木位（1点）\n具体做法：参看纯攻兵器，请先把剑减防到最尽后加内\n\n纯血剑\n主材料：自己适用的武器\n副材料：轻布衣 水纹坠\n位置  ：衣服金位（11和12点） 攻剑火位（9点） 血佩土位（5点和6点）\n具体做法：参看纯攻兵器，请先把剑减防到最尽后加血\n\n敏内剑\n主材料：自己适用的武器\n副材料：轻布衣 黄绵带\n位置  ：衣服金位（11和12点） 攻剑火位（9点） 内佩土位（1点）\n具体做法：参看纯攻兵器，加佩后同时加敏和内\n\n六：PK装备之饰物篇\n纯血饰\n主材料：水纹坠（右边装备）\n副材料：减5000毒\n位置  ：血饰土位（1点） 毒位（不克的就可以）\n具体做法：反复用毒加到你需要的等级\n公式：饰物类1000级纯点为149。换算为血点等于149*3\n\n纯内饰（左边装备）\n主材料：黄锦带\n副材料：减5000毒\n位置  ：内饰木位（5和6点） 毒位（不克的就可以）\n具体做法：反复用毒加到你需要的等级\n公式：饰物类1000级纯点为149。换算为内点等于149*3\n\n血攻饰（右边装备）\n主材料：水纹坠\n副材料：乌云剑\n位置  ：血饰木位（5点和6点） 剑火位（9点）\n具体做法：直接加练造剑\n公式：饰物类1000级纯点为149。换算为内点等于149*3\n\n内敏饰（左边装备）\n主材料：绵腰带\n副材料：鞋子\n位置  ：内饰木位（1点） 剑火位（9点）\n具体做法：直接加练造鞋同时升敏和内\n公式：饰物类1000级纯点为149。换算为内点等于149*3\n\n八：PK装备之鞋子篇\n纯敏鞋\n主材料：草鞋\n副材料：乌云剑\n位置  ：草鞋水位（3点） 剑火位（9点）\n做法  ：与纯攻兵器做法相同，换上对应的位置就可以了\n\n血内鞋，纯内鞋等做法请参照兵器篇\n\n后言：PK装备与使用者常用招数和关，招的最大杀伤通俗中我们认为是打怪物的杀伤数一半为我们加装备所需的混攻点。请玩家们注意本身使用的招的杀伤来练造出最合自已使用的PK装备。\n祝福大家情场得意，战场常胜！\n\nPS：本篇幅涉及的装备太多，可能性存在一些错漏的地方，如有发现请跟贴指正，以免误导新手，谢谢\n\n\n———————————————————————————————————————————————————————以下为 慕容山水 的跟贴\n\n\n\nPK装必然涉及PK人的加点问题，因这一点比较复杂，且仁者见仁，智者见智，在下也不是很精通，只能就个人所知简单说一下\n\nPK装基本包括： 攻剑（武器）、敏鞋、血敏衣、加血的头饰、血内剑、敏攻剑\n以上采用不同组合可产生不同效果，做法如下：\n攻剑：武器9点 毒随便，极限后加衣服减防降修行，衣服减到不能减时，在做一把极限剑合成一下，继续用衣服减\n\n血敏衣：衣服防到1500左右，用极限鞋加敏，可以到400敏，再用头饰加血\n\n血内剑：先内后血，用攻剑和加内佩作，再加血\n\n敏攻剑：攻剑加鞋\n\n以上是本人的一点做法，请高手指点\n\n———————————————————————————————————————————————————————以下为 HotBoy 的跟贴\n\nPK人用的右饰最好是减222敏加1113血的那种，这样你在人点数上再加222敏又可以多74点血！\n其他装备也一样，也就是说PK装备最好是靠装备就把血内加够，防能减多少减多少，其他属性\n用人自己的点数加，充分利用每一点！\n（本人只造装备不PK，所以有什么说错的地方请见谅！）", "source": "幻灵宝典"}, {"idx": 108, "orig_path": "炼化资料->新手炼化->鲁班秘籍所记载的特殊装备和物品的炼法", "orig_data": "鲁班秘籍所记载的特殊装备和物品的炼法\n\n兑卷（10点）：霸王钳艮位，凤凰羽毛离位，龙麟艮土，象牙震木，佛经乾金，主练佛经，得到震卷秘录。\n\n离卷（20点）：皂角鞋坎水，狼爪离火，霸王钳震木，龙林乾金，鳄鱼骨艮土，主炼皂角鞋，即可得到狂狼战靴。-100生命，+1000内力，-50攻击，+500敏捷的鞋子。\n\n震卷（30点）：人鱼之泪坎水，凤羽离火，象牙震木，龟壳乾金，水纹坠艮土，主炼水纹坠，得到长命锁。+300血，-50攻的800级头饰（右）。\n\n坤卷（40点）：玄金镯震木，人鱼之泪坎水，狼爪离火，龟壳乾金，龙鳞艮土，主炼玄金镯，得磐龙樽。+200生命，+230防御，+200敏捷，修行19200的头饰（左）。\n\n艮卷（50点）：正气甲12点（主）正气甲11点,鄂鱼骨9点,象牙7点,霸王钳5点,龙鳞3点.正气战衣，+400生命，+2000内力，-100攻击，+300防御，+100敏捷，修行19200的衣服。\n\n坎卷（60点）：龟壳乾12金,霸王钳兑11金,象牙震7木,人鱼之泪坎3水,凤凰羽翼离9火,龙鳞5土,主练龟壳乾12金,可得到宠物谨慎枝能.\n\n巽卷（70点）：玄武丹乾位,穿云丹震位,柔肠丹坎位,神凰丹离位,青龙丹艮位,主练乾位,得到相当于五个顶级毒药的蓝水晶。\n\n乾卷（80点）：紫阳丹放乾金、无极草震木、冰石坎水、无忧失心草离火、千年仙芝艮土，主炼乾位。得升级药。\n\n飞锻造的时候拿到的秘录：鳄鱼骨放金，11、12点。凤凰羽毛放火，9点。布鞋放水。3点。布鞋主练，得到凤凰战靴。-280防御，+500敏捷，修行800的鞋子。\n\n龟壳——坠泪岗战斗奖励。（45，25）（39，8）（37，17） \n龙鳞——吓死人洞2层战斗奖励。（11，29） \n狼爪——踏雪原战斗奖励。（59，73） \n凤凰羽翼——凰之谷战斗奖励。（33，55） \n鳄鱼骨——东码头战斗奖励。 \n象牙——西雪岭战斗奖励。（27，35） \n霸王钳——不归海岸战斗奖励。（62，67）\n人鱼之泪——拿乒乓鱼任务物品的人鱼项链，到深蓝海城找人鱼三公主（34，44） 交换得到。\n\n至此，所有的东西偶想都全了！在此感谢yinplaying和davids朋友，让我写全了这些配方。\n\n最后，我还是开始的一句话，与人方便，与己方便，嘻嘻……\n", "source": "幻灵宝典"}, {"idx": 109, "orig_path": "炼化资料->高手炼化->用最快的速度锻造极限!", "orig_data": "用最快的速度锻造极限!\n\n特别感谢会员snyjw提供原始资料\n\n\n大家知道用变速齿轮对幻灵加速太快的话，幻灵就会掉线\n但是有没有想过对HLHL进行加速呢?\nHLHL为什么比RWX锻造极限的速度慢呢,就因为HLHL在买银蜂针的时候速度太慢,不像RWX一样,买同样的物品是速度很快，所以大家可以使用变速齿轮对HLHL进行加速,但是具体加到多少HL不会掉我还没实验过,不过的确速度比以前快了不少!\n还有要注意的就是,一定要选择HLHL进行加速,而不要把所有程序都加速,尤其是不要对幻灵加速哦~\n只要你的网速够快的话,嘿嘿,不多说了，自己去体验吧\n\n给个变速齿轮的下载地址:\nhttp://www.skycn.com/soft/5744.html\n也希望大家把自己的经验贴上来，就是最多能开到多快\n\n我们的宗旨:我为人人!人人为我!\n\n附:使用说明\n1,先打开幻灵,买好一个原材料，然后用草锻造一次,最小化幻灵窗口\n2,打开HLHL0.799,选择相应的极限脚本，开始工作\n3,打开变速齿轮(98系统不可用,2000或者XP用NT版)\n4,在变速齿轮左下的任务框里选中HLHL(不要隐藏HLHL,否则任务框里就显示不出来了),然后点加入,就可以看到在右边的要加速程序框里，有了HLHL了\n5,调节加速速度,根据个人网速和机子配置不同,自己调节就OK了~\n\n\n\n\n\n此帖属原创,如需转帖,请注明出自天下网游论坛,谢谢!!", "source": "幻灵宝典"}, {"idx": 110, "orig_path": "炼化资料->高手炼化->云锦天衣清血的方法", "orig_data": "云锦天衣清血的方法（淘气鬼~~~~~提供）\n\n炼化一个+1200血的头饰 ，衣服12点头饰5点，主练衣服\n再把衣服的防降到0，在买个水纹坠和衣服炼化，血就清0了", "source": "幻灵宝典"}, {"idx": 111, "orig_path": "炼化     加防743甲\n\n\n\n\n步骤   简单说明  攻击属性     内力属性   \n1   降修到：200修 2154攻     +705内<刀9点、内带12点/将刀降修到200`2154攻加极限内带、得到+705内的刀>\n2   降修到：200修 1912攻     +1410内  <刀9点、内带12点>\n3   降修到：200修 1677攻     +2115内 <刀9点、内带12点> \n4   降修到：200修 1434攻     +2796内 <刀9点、内带1点>\n5   调整到：848000修 2794攻 +3165内 <刀9点、内带1点>\n6   调整到：100w修 3220攻   +3432内 <刀9点、内带1点>\n7   调整到：100w修 3529攻   +3648内 <刀9点、内带1点>\n8   调整到：100w修 3791攻   +3828内 <刀9点、内带1点>\n9   不降修、不调整            +3969内 <刀9点、内带1点>\n\n\n步骤  简单说明\n1   加第8把极限武器、使当前金光刀的攻击属性达到极限\n2   武器9点、极限头饰5点；直接砸极限头饰\n3   连砸41个极限头饰、得到：+4611血、+3969内 <是否还能更高、有待验证>\n4   降修；得到：+4611血、+3969内、0攻、-1931防、-150敏 <修行在54000左右>\n", "source": "幻灵宝典"}, {"idx": 142, "orig_path": "炼化资料->高手炼化->武器->普通纯加攻武器的数据", "orig_data": "普通纯加攻武器的数据\n\n自己在锻造方面是个新手，参考精华里的普通武器的数据，给自己做了一个环女用的加攻的铁环。\n\n因为精华里只有前半部分的数据，所以现在把保存的全部数据发上来，希望对刚开始学的朋友有用。\n\n\n所需材料：普通武器(是最便宜的那种）\n          极限衣服20件\n          极限武器7件\n\n1.武器-----------加攻1502\n  极限衣服-------减防 -444防+1502攻\n\n2.武器-----------加攻2406\n  极限衣服-------减防 -704防+2406攻\n\n3.武器-----------加攻3003\n  极限衣服-------减防 -894防+3003攻\n\n4.武器-----------加攻3497\n  极限衣服-------减防 -1041防+3497攻\n\n5.武器-----------加攻3937\n  极限衣服-------减防 -1160防+3937攻\n\n6.武器-----------加攻4314\n  极限衣服-------减防 -1260+攻4314\n\n7.用极限武器加攻，位置是武器9，极限是7\n  极限武器-------减防 -1260+攻5540\n\n下面开始用极限衣服加防（用6件极限衣服）\n8.极限衣服-------减防 -1314+攻5540\n9.极限衣服-------减防 -1370+攻5540\n10.极限衣服------减防 -1427+攻5540\n11.极限衣服------减防 -1486+攻5540\n12.极限衣服------减防 -1546+攻5540\n13.极限衣服------减防 -1608+攻5540\n\n14.用极限武器加攻\n  极限武器-------减防 -1608+攻5966\n\n下面用极限衣服加防（用3件极限衣服）\n15.极限衣服------减防 -1660+攻5966\n16.极限衣服------减防 -1714+攻5966\n17.极限衣服------减防 -1769+攻5966\n\n18.用极限武器加攻\n   极限武器------减防 -1769+攻6127\n\n19.用极限衣服减防\n   极限衣服------减防 -1821+攻6127\n\n20.用极限武器加攻\n   极限武器------减防 -1821+攻6179\n\n21.用极限衣服减防\n   极限衣服------减防 -1853+攻6179\n\n\n22.用极限武器加攻\n   极限武器------减防 -1853+攻6211\n\n23.用极限衣服减防\n   极限衣服------减防 -1863+攻6211\n\n24.用极限武器加攻\n   极限武器------减防 -1863+攻6221\n\n25.用极限衣服减防\n   极限衣服------减防 -1866+攻6221\n\n26.用极限武器加攻\n   极限武器------减防 -1866+攻6224\n\n27.用极限衣服减防\n   极限衣服------减防 -1867+攻6224\n\n\n最后得到最高可减到1867的防 加攻6224的兵器(极限）\n\n28.用草降修\n\n最后得到最高可减到1867的防 加攻2264的兵器（1000级）\n\n极限武器加攻：武器9点，极限7点\n极限衣服减防：武器9点，极限12点\n降修：武器3点 止血草11点\n", "source": "幻灵宝典"}, {"idx": 143, "orig_path": "炼化资料->高手炼化->首饰", "orig_data": "什么珠宝玉器的通通来这找吧！", "source": "幻灵宝典"}, {"idx": 144, "orig_path": "炼化资料->高手炼化->首饰->右饰", "orig_data": "不用讲这么多了吧……每次这个页面没什么资料很麻烦啊…………\n右饰…………………………右…………就是用筷子的那边吧（左撇子除外）", "source": "幻灵宝典"}, {"idx": 145, "orig_path": "炼化资料->高手炼化->首饰->右饰->丹凤钗锻造 +235防 右饰的数据(旧数据)", "orig_data": "丹凤钗锻造 +235防 右饰的数据(旧数据)\n\n严重感谢￥火*烈*鸟￥提供敏清零的方法\n\n天下论坛原创，转帖请注明天下论坛，谢谢！\n\n本帖是根据北歐の神話所写之丹凤钗锻造 +235防-235敏-120攻 右饰数据的基础上更新的\n\n\n\n->材料清单：丹凤钗1把、极限鞋子5双、极限血佩3个、极限衣服6件\n\n步骤  所加血    煅造说明    所减敏\n1       +4020    第1双极限鞋子   -134   \n2       +5013    第2双极限鞋子   -167  \n3                    第1个极限血佩\n4                    第3双极限鞋子   -218  \n5                    第2个极限血佩\n6                    第4双极限鞋子   -233\n7                    第3个极限血佩\n8                    第5双极限鞋子   -235  |  PK装备做到这一步就可以了\n\n9 (连用6件)     第1件极限衣服\n10                  第2件极限衣服\n11                  第3件极限衣服\n12                  第4件极限衣服\n13                  第5件极限衣服\n14                  第6件极限衣服\n15(准备清敏)   给丹凤钗降血、一直降到360上下(钗7点 草12点)\n16                  丹凤钗7点、草鞋3点  |   预览得到-12敏的丹凤钗\n17                  继续给丹凤钗降血、一直降到0为止(钗7点 草12点)\n18                  丹凤钗7点、草鞋3点  |   预览得到-120攻、235防的丹凤钗\n19                  丹凤钗7点、武器9点  |   预览得到 +235防 不减任何属性的丹凤钗\n20                  要不要清掉攻击、就看你自己了、个人建议不要清攻", "source": "幻灵宝典"}, {"idx": 146, "orig_path": "炼化资料->高手炼化->首饰->右饰->太乙珠煅造+233防右饰的全部数据(旧数据)", "orig_data": "太乙珠煅造+233防右饰的全部数据(旧数据)\n\n太乙珠：-100攻 +1000血\n\n(太乙珠为5转飞升巡游天神的任务物品)\n\n所需煅造材料：太乙珠1条 极限血带4条 极限鞋5双 极限衣服5件 草鞋2双(水城饰物店买)\n\n顺序  所加血   所减敏      煅造说明\n1        +3964                   直接煅造+血\n2        +3964      -132       第1双极限鞋子\n3        +6049      -132       第1条极限血带\n4        +6049      -194       第2双极限鞋子\n5        +6883      -194       第2条极限血带\n6        +6883      -229       第3双极限鞋子\n7        +6988      -229       第3条极限血带\n8        +6988      -232       第4双极限鞋子\n9        +6997      -232       第4条极限血带\n10      +6997       -233      第5双极限鞋子\n11 (连用5个极限衣服加防) 用极限衣服加防\n12                                  用极限衣服加防\n13                                  用极限衣服加防\n14                                  用极限衣服加防\n15                                  用极限衣服加防\n16                                  用草降血降修行到100级\n17                                  草鞋3点 佩6点\n16                                  用草降血到不能再降\n17   草鞋3点  佩6点         得到 -100攻 +233防的太乙珠\n", "source": "幻灵宝典"}, {"idx": 147, "orig_path": "炼化资料->高手炼化->首饰->右饰->长命锁加防227右饰的锻造数据(旧数据)", "orig_data": "长命锁加防227右饰的锻造数据(旧数据)\n\n感谢风之谷的真心真意1提供最后一步数据\n\n人鱼之泪 坎位\n凤羽     离位\n象牙     震位    < 主练水纹坠、可得长命锁 +300血 -50攻 >\n龟壳     乾位\n水纹坠    艮位\n\n\n长命锁1个、极限鞋5个、极限衣5个、极限头饰3个\n\n1. 长命锁--->+血3846\n   极限鞋3168减敏------>+3846血 -128敏 -50攻\n2. 长命锁--->+血4785\n   极限鞋3168减敏------>+4785血 -159敏 -50攻\n3. 极限头饰4251加血---->+6567血 -159敏 -50攻\n4. 极限鞋3168减敏------>+6567血 -210敏 -50攻\n5. 极限头饰4251加血---->+6780血 -210敏 -50攻\n6. 极限鞋3168减敏------>+6780血 -226敏 -50攻\n7. 极限头饰4251加血---->+6828血 -226敏 -50攻\n8. 极限鞋3168减敏------>+6828血 -227敏 -50攻\n9. 极限3168衣服加防---->+6828血 -227敏 -50攻 +50防\n10.极限3168衣服加防---->+6828血 -227敏 -50攻 +97防\n11.极限3168衣服加防---->+6828血 -227敏 -50攻 +142防\n12.极限3168衣服加防---->+6828血 -227敏 -50攻 +185防\n13.极限3168衣服加防---->+6828血 -227敏 -50攻 +227防\n14.用草降血降修行到100级,佩1点\n15.水城最便宜的鞋，草鞋3点，佩6点（主炼）---->+168血 -5敏 -50攻 +227防的头饰\n16.用草降血到0-->0血 -5敏 -50攻 +227防\n17.草鞋3点，佩6点（主炼）---->0敏 0血 -50攻 +227防的头饰（6000修用）\n\n18.用最便宜的剑在把-50攻清掉 （剑9点、佩6点）", "source": "幻灵宝典"}, {"idx": 148, "orig_path": "炼化资料->高手炼化->首饰->右饰->恋之守护煅造+222防(不减任何属性)右佩的数据(旧数据)", "orig_data": "恋之守护煅造+222防(不减任何属性)右佩的数据(旧数据)\n\n材料：恋之守护（或其他右佩也可以）、极限鞋子5双、极限血佩3个、极限衣服5件、草鞋1双\n\n\nA  先将头饰（右佩）炼到加血3798（头饰5点，药9点）用极限鞋子减敏（头饰5点 鞋子3点） \nB  再炼头饰到加血4620（位置同上），用极限鞋子减敏 （位置同上） \nC  然后边用极限4251头饰加血（原头饰5点 极限头饰6点）边用极限鞋子减敏（位置同上），循环3次头饰炼至减敏222 \nD  用极限3168衣服加防（头饰5点 极限衣服11点），重复5次 一直加到222防 \nE  最后用草降修行（头饰7点 草1点），微降（头饰11点 草9点）\nF  把修行降到100级，+9血+222防御-222敏的时候，应该降不下去了\nG  买一个水城最便宜的鞋子，鞋子3点，佩6点，得到一个+血9点，+防御222，得到16000修的右佩\nH  继续用草降一次（头饰7点 草1点），得到一个+防御222，修行1W5的右佩，不减任何属性\n", "source": "幻灵宝典"}, {"idx": 149, "orig_path": "炼化资料->高手炼化->首饰->左饰", "orig_data": "疾风之令的锻造方法--龟壳乾金，火行令五离火，恋之守护坤土。主练火行令五＝疾风之令", "source": "幻灵宝典"}, {"idx": 150, "orig_path": "炼化资料->高手炼化->首饰->左饰->盘龙尊锻造宠物装备的数据(300级 +230防、10敏)", "orig_data": "盘龙尊锻造宠物装备的数据(300级 +230防、10敏)\n\n声明：制作思路和数据由  云淡风也轻  提供给我，我本人验证并整理了一下\n\n->因论坛升级导致图片丢失，由本人最后进行编辑－－柳之剑\n\n1：制作材料\n盘龙尊\n水城买到最便宜草鞋×1\n水城买到最便宜头饰×1\n极限头饰（血佩）×4\n极限身饰（内带）×3\n极限鞋子若干\n\n2：制作步骤\n①盘龙尊6点，水城最便宜鞋子3点\n  此步锻造降其敏捷为0\n\n②盘龙尊6点，水城最便宜头饰5点\n  此步锻造降其生命为0\n\n③给盘龙尊加内至3339左右、加第1个极限头饰，得到-333血 +3339内\n  位置：盘龙尊7点、极限头饰5点\n\n④使用第1个极限身饰给盘龙尊加内，得到-333血 +5268内\n  位置：盘龙尊7点、极限身饰1点 \n\n⑤使用第2个极限头饰给盘龙尊减血，得到-501血 +5268内\n  位置：盘龙尊7点、极限头饰5点\n\n⑥使用第2个极限身饰给盘龙尊加内，得到-501血 +5811内\n  位置：盘龙尊7点、极限身饰1点\n\n⑦使用第3个极限头饰给盘龙尊减血，得到-579血 +5811内 <此步可不用极限头饰>\n  位置：盘龙尊7点、极限头饰5点\n\n⑧使用第3个极限身饰给盘龙尊加内，得到-579血 +5889内\n  位置：盘龙尊7点、极限身饰1点\n\n⑨使用第4个极限头饰给盘龙尊减血，得到-588血 +5889内 <此步可不用极限头饰>\n  位置：盘龙尊7点、极限头饰5点\n\n\n3：用极限鞋子给盘龙尊加敏捷\n300级是+10敏\n500级是+40敏\n600级是+55敏\n用草药降到你的级别就ok了", "source": "幻灵宝典"}, {"idx": 151, "orig_path": "炼化资料->高手炼化->首饰->左饰->身饰的减血方法", "orig_data": "身饰的减血方法，献给内人的好东东！\n\n1:把一般的内带加内到3780，加个极限血，得到-378血+3780内的左饰（内1点血5点）。\n2：把内加到4629，加个极限血，得到-462+4629内的左饰（位置同上）。\n3：给-462+4629内的左饰加个内带（内7点，减血内带1点），在加个极限血得到-612+6408内的左饰。\n4：再加极限内带，用极限血佩减血，方法如（3） 得到-660血+6612内的左饰。\n5：最后在加个极限内带加内，用半成血减血（注：这里不用极限血了,+900血的就可以了）。\n", "source": "幻灵宝典"}, {"idx": 152, "orig_path": "炼化资料->高手炼化->首饰->左饰->PK血内药的最佳炼法", "orig_data": "PK血内药的最佳炼法\n\n人在水城珠宝店,用任我行做以下记录:\n1.买1个锦腰带,再买4个银蜂针,1个蒙汗药,腰带7点主炼毒12点针位置任意,炼成一个加内144的炼化内力带\n2.买一个止血草11点,炼化内力带1点,止血草主炼得到一个2W内的PK药.\n3.再买银蜂针1个放9点,药11点主炼就得到18500血,2W内的药.\n这种方法不必跑华山拿无极草换佩,省时省力,1000炼化经验就够,PK人进PK场前必备的药就此炼成.\n\n补充：a.必须加入延迟，才能确保全速炼而不掉线，在第2步和第3步加多一些延迟，因为炼的物品较少。加多少延迟看各位网速而言。\n         b.第2步再炼一次或加两个镖就可以得2W血2W内的药。\n         c.可在最后加入炼完的药给另外一个号的记录，更为方便。", "source": "幻灵宝典"}, {"idx": 153, "orig_path": "个性幻灵", "orig_data": "吃饭时用脚拿筷子\n睡觉时以打禅式睡\n四角底裤外面穿着\n\n\n\n\n这些才叫做个性\n因此，我一点个性也不具有", "source": "幻灵宝典"}, {"idx": 154, "orig_path": "个性幻灵->帮派总攻略", "orig_data": "帮派总攻略\n\n【创造帮派】\n\n等级在800级以上, 进入江湖，有100万两银子作帮派基金。\n已经加入帮派的玩家不可以再创新帮派。\n\n达到以上条件的玩家可以点击帮派里的\"创建门派\"申请开门派。\n在弹出的帮派面板里你会看到以下几项需要填写：\n\n帮派名称：\n帮派全称：\n帮派宗旨： \n帮主头衔：\n弟子头衔：\n\n【加入帮派】\n\n等级高于50级的初级武士，进入江湖后，再点选【加入帮派】，\n然后右键点帮派引荐人，经他批准后即可入帮。\n帮派引荐人必须是该帮长老以上级别才可以。\n\n\n【脱离门派】\n\n已加入门派的人员可点击【脱离门派】命令退出门派。\n不过选择这个命令前要仔细考虑，脱离帮派要交50万、\n帮内所学会的武功也会被废弃，不可再用。 \n\n\n【帮派升级】\n\n1级升级2级帮派需要40人\n在紫禁城找到巫将军(70,55),他会让你带上他的令牌去剿灭强盗。\n到黄泥岗找到强盗（26，50），跟他说话进入战斗（5只800级的西皮），打赢以后得到强盗战刀。\n再回来找到巫将军，身上放500万两，他就会帮你的帮派升级了。\n\n2级升级3级帮派需要75人\n\n二级以上的帮派帮主、副帮主在紫禁城找到巫将军(70,55),\n到华山顶找到符冲（28，16），打败了他的5只800级大刀，得到无双剑\n带着无双剑找到巫将军，身上带着现金1000万帮派升级费用就可以升级了。\n再走到里面太和殿内找到吴大人，就可以找他购买帮派地图了。\n升级帮派的好处：三级以上的帮派才会有资格拥有自己的帮派地盘，还可以自己开设赌场、收取摆摊杂税等等。 \n\n帮派总坛\n\n三级帮派就可以占领一般地图来设立总坛，京城太和殿内的吴大人（20，20）负责出售帮派总坛，在相中自己喜爱样式的总坛以后，帮主或者副帮主级别的帮派领导人物与出口的售房NPC交谈，就可以将帮派基金划拨三千万给NPC，会得到一个帮派龙虎令，再找该NPC就可以领取到相应的房产证。（前提条件本帮派等级已达到三级，帮派基金有三千万以上\n带着房产证选择一张地图作为自己的帮派总坛所在地之后，只需使用该房产证，放置好帮派传送NPC就大功告成了！一张地图只可以被一个帮派占领，早来早得，可不要错失良机哦。 \n\n注意事项：\n1、当成功占领一块地图后，帮派龙虎令会被收走。如果没有成功占领地图或者将房产证不慎遗失时，只要帮派龙虎令还在，就可以重新向NPC领取房产证。如果帮派龙虎令丢失，那...就白白损失了三千万了。\n2、可以占领的地盘的列表如下：\n浮影水城外郊、青风原、坠泪岗、四桥原、闲情园、松竹林、怨灵洞口、剑池谷、石壁洞口、西码头、枯井原、断魂涯、观日桥头、东码头、断壁、银罐谷、绿洲东郊、金轮谷、落雁谷、羁马谷、华山顶、情人谷、梦佛窟、赏月谷、羁马谷、酒鬼冢、流沙原、净沙原、独孤亭、晚枫林、斑鸠小舍、回首亭、守望林场、暮归道、双印谷、镜雪原、松雪野、踏雪原、斧青谷、犁春原、黄泥岗、鸟鸣谷、羊肠道、独木原、春水桥、雪融谷、炊烟谷\n\n\n【帮派职位】\n\n一级帮派：一个帮主、一个副帮主\n二级帮派：1个副帮4个长老\n三级帮派：2个副帮 10个长老 \n5个堂口 每个堂口：1个堂主 2个副堂主\n要是用并帮的方法，可以多一个堂口（也就是1级帮、2级帮1个，三级帮6个）\n\n\n【篡位全功略】\n\n本贴作者：怎能忘怀　\n\n一，成为一个帮派的副帮主，这是前提条件。\n成为副帮有2种比较简单的方法：\n1，创个小帮，表示愿意并入别帮，条件是副帮主。即可。\n2，加入帮派，和帮主说一天能招30个人。条件是副帮主，没达到即可解除职务。\n\n二，和帮主结拜，这点相当重要。名义上是方便联系，其实是监视帮主是否在线。\n三，在帮主没在线的情况下，疯狂铲除异己势力。开除所有弟子，副堂主先解除职务，然后开除。这样帮派就剩下的反对势力（帮主1个，副帮1个，长老10个。堂主6个）一起18人。那我们就加入36人向副帮主效忠。能够效忠的弟子必须捐款10万才可以效忠，一起成本360万。（也就是要效忠你的比帮主多一倍才能成功）\n四，准备200万，按篡位指令\n\n\n【抢占总坛秘籍】\n\n抢占别人的帮派总坛\n1.本帮已经是三级帮\n2.可以到帮派排行里查一下欠费资金，帮派欠费200W会被系统强行收回总坛\n3.到帮派排行榜查询欠费帮派，查看每天欠费数量增加数，计算出被系统强行收回时间。\n4.晚上12点，整点的时候注意看系统消息,到被收回的帮派总坛，点帮派NPC，进行抢占\n5.HOHO手快的有，手慢的无哦\n6.并帮占领总坛\n并完之后，去那个被并帮的总坛占领，不必花3000万，点NPC直接占领就可以了\n记得得在被占领的帮派总坛并帮，要不可能会帮没有了。可是总坛还是以前的帮的，得第二天才能占领，这是幻灵的BUG，他害我少了一个总坛！！！！\n\n\n【帮派秘籍】\n\n多建堂口秘籍\n已经有了5个堂口，可是帮里人才太多，怎么办？\n多建堂口？\n呵呵，叫朋友建几个帮，然后合并掉，你就可以发现你的帮多了几个堂口了\n此方法最适用于1级帮、三级帮还适用，好象最多只能6个堂口\n\n总坛宝箱\n总坛里可放6个20W一个的箱子(只有此价格的箱子才能存物品)。一个箱子存8个物品，只有帮主能取出来。驯庞师只一个箱子位，一个总坛只能有一个驯庞师。驯庞师只存8只宠，只有帮主能取出来。(即一个总坛可取5箱子1驯兽师)\n放进去谁都可以，但只限帮主能拿出来，副的可不行\n\n帮派收费问题\n总坛10W 多了一个小区的话就会在加10W 如果有一个总坛4个小区的话每天会收50W\n一个帮派总坛欠费超过200(or206)W会被系统强行收回总坛\n帮派总坛欠费处理，我以前的帮，2个总坛每次剩500万以下的钱，没有几天就给系统吃掉，后来并了2个帮，有了4000多万基金，呵呵，钱反加，估计只要你的钱上一个度，你的总坛就不会被收回\n\n帮派传送点\n有2个以上总坛可以添加传送，先在第1个总坛点击添加传送、再跑到第2个总坛再添加一下，就可以了\n\n帮派小区添加\n三级帮派且有帮派总坛的长老级以上领导人物,在皇城可以找到负责销售建房许可证的林大人(111,62)...只要花500万就可以买到建房许可证,使用建房许可证就可以在帮派占领的地图上建立一个住宅小区...\n找林大人旁边的刘大人(111,70)购买地皮开发许可证后,就可以在帮派住宅小区里建立一块地皮...(如果有玩家要买地皮,可以先谈好价格,然后在开发地皮哦.....)\n注意：购买建房许可证与地皮开发证都是需要使用帮派基金...\n\n", "source": "幻灵宝典"}, {"idx": 155, "orig_path": "个性幻灵->游戏时辰与标准时间对照", "orig_data": "游戏时辰与标准时间对照\n\n方便大家做任务\n把古代的时辰和现在的时间贴出来下：0\n\n\n子时：夜11点至1点\n丑时：凌晨1点至3点\n寅时：凌晨3点至5点\n卯时：凌晨5点至7点\n辰时：上午7点至9点\n已时：上午9点至11点\n午时：中午11点至1点\n末时：下午1点至3点\n申时：下午3点至5点\n酉时：下午5点至7点\n戌时：傍晚7点至9点\n亥时：晚上9点至11点", "source": "幻灵宝典"}, {"idx": 156, "orig_path": "个性幻灵->如何使用3行传音...", "orig_data": "如何使用3行传音...\n\n1.在幻灵目录下的 ini 文件中找到 TxtAction \n2.查看里面所有动作的词语\n3.按照里面原来的格式, 自己添加一个进去....\n4.把发送的形式改成传音, 发送出去就可以了\n", "source": "幻灵宝典"}, {"idx": 157, "orig_path": "个性幻灵->黄龙使、飞天鼠变小鸟或鸠的方法", "orig_data": "黄龙使、飞天鼠变小鸟或鸠的方法及全部宠物和人物的代码\n\n感谢yuyu1126提供黄龙使`飞天鼠修改小鸟的方法, 邪影狂灵收集的宠物代码, 高级会员、不洗澡的魚提出的部分宠物代码, LiYingDa提供人物代码\n\n本帖属天下论坛原创、请不要擅自转载！\n\n\n一、快速做九转，黄龙使、飞天鼠变小鸟法```\n\n1  备份幻灵目录下的 ani  这个文件夹，做以后恢复用\n2  在ani 文件夹里，把pet40001复制一个出来，重命名为pet62002.ani再贴回去，就是把黄龙使改成小鸟\n3  把pet40001复制一个出来，重命为pet41011再贴回去，就是把飞天鼠改成小鸟\n4  这样就改好了\n\n\n二、快速做九转，黄龙使、飞天鼠变拂叶鸠法```\n\n1  备份幻灵目录下的 ani  这个文件夹，做以后恢复用\n2  在ani 文件夹里，把pet41001复制一个出来，重命名为pet62002再贴回去，就是把黄龙使改成拂叶鸠\n3  把pet41001复制一个出来，重命为pet41011再贴回去，就是把飞天鼠改成拂叶鸠\n4  大家说鸠比小鸟快，之此再发表一个！\n", "source": "幻灵宝典"}, {"idx": 158, "orig_path": "个性幻灵->赌钱详解", "orig_data": "赌钱详解——成就赌神不是梦\n\n对赌有兴趣的玩家可以试试以下的几种赌法：\n\n豹子篇：（这里面记载了本人1个星期摸索出的一些经验）\n    1：注意到豹子出来的对称性；比如：111-444-111-444，555-333-111-555-333，等等。还有些特殊的对称，如：111-333-111-444-333-555-333，等。（这条是最关键的一条）\n    2：注意到豹子的另一个重要特性--偶把他称为升级性）；比如：222-333，444-555，等。这个特性一般都会出现在一连串的对称性后面，如：出现444-666-222-444-666-222-333。（这一条需要细心的朋友耐心的观察）\n    3：注意到豹子的连续性。比如；222-666-444-444-444-444-666-444，等。（一般这种情况出现的不多）\n    4：注意到豹子出现的时间性。一般的规律是40分钟左右出现一次。另外有一个小时左右出现的，出现这样的情况需要朋友们耐心等待。还有就是80分钟左右开豹子，这种情况不是很多，假如出现了，必然会连续出现豹子的，一般在30分钟之内有3个以上的豹子出现。\n    5：以上的一点点经验可能有些难度，对大部分不是职业赌徒的朋友最好不要按部就班，在这里偶强调的是豹子的出现的一些特性，举出的列子只是偶在压豹子时记录下来的，不是说豹子就得按我列出的点数逐个出现，希望朋友们看后提出宝贵意见！", "source": "幻灵宝典"}, {"idx": 159, "orig_path": "个性幻灵->老虎机攻略(如何积攒你的赌币)", "orig_data": "老虎机攻略(如何积攒你的赌币)\n\n条件：\n1、有老虎机外挂－欢乐幻灵的链接地址\n2、银子(废话，没银子你赌个啥、呵呵)\n3、有足够的时间－如果运气好、老虎机的10亿大奖就会降临到您的身上\n\n秘技：\n1、每次看见老虎机上的赌币上了500，就马上去找NPC兑换后再继续赌。/(关键)\n2、当你老虎机上的赌币<200时，连击几次老虎机的“投”(机器人此时应在工作状态)，机器人以后都会自动帮你加币到200，可以防止人走后，赌完200赌币不能赌了。\n3、兑换所得的“筹码”使用方法以：双击使用。当身上带满了十五个兑换的“筹码”后，可以将全部“筹码”双击使用，然后再去兑换成一个大的“筹码”。\n\nPS:注意“筹码”的制作人应是：※吉祥赌坊(树城的我不记得了，反正前面必定有个※号)，今天我一时心急，被一个摆摊的骗了，他用一个外形和筹码一样物品锻造后改名为“筹码1000个”，制作人是“树城赌场”。(那人的名字就叫做“树城赌场”)，大家小心啦!\n\n附赌场宠物资料：\n水城赌场：\n电球宝宝：500筹码  火 \n穿山兽：1000筹码   金\n镇水麒麟：10000筹码  土\n小幽灵：50000筹码    火\n\n树城赌场：\n神甲：500筹码     金\n风翼龙：1000筹码  金\n小僵尸：10000筹码 土\n帅帅：50000筹码   火", "source": "幻灵宝典"}, {"idx": 160, "orig_path": "个性幻灵->幻灵挣钱基本法", "orig_data": "幻灵挣钱基本法[分享]\n\n挣钱基本法\n基本法中的价格仅是提供的参考价,请各位大虾小虾们根据实际情况衡量价格(宠爱一生,毒药:1W-2W,极限甲:70-80W)\n1、关于下面所述的基本任务条件,主要是按照出现的敌宠的等级衡量的,敌宠属性计算方法以个人经验主义为主,参照天关守护兽的计算方法天关守护兽属性计算法:守护兽等级*3*所需属性的成长分配百分比(攻、防、敏) 具体参见图鉴例：1700级黑蹄先生 攻击点数=1700*3*50%=2550。在你熟读基本法以后,勤劳+智慧+运气+勇敢+……=亿万富翁\n以下难度等级分为0-9级,9级为最难，推荐度分为0-5级,5级为强烈推荐\n第一章 宠物篇\n1、7级的琳琳 \n价格:1.5W-2W(单价) \n任务条件:无 （以10级以下最佳，那个通灵会抓琳琳卖？）\n地点:水城郊外 \n薪水:35-50万(按照1小时计算) \n难易程度:1\n推荐度:0\n任务简介:在水城郊外,抓3-4级的琳琳,带到7级,卖给需要的人\n忠告:不推荐的原因很简单,需求量小,一次也就有人收购几十只,换句话说,只有找到了买家才能做 \n2、碧水洞窟抓蒙蒙\n价格:1W(固定,因为是系统给的)\n任务条件:人宠防御过1600,不要带土、金系宠\n地点:碧水洞窟\n薪水:100万\n难易程度:4\n推荐度:1\n任务简介:在碧水洞战斗,随机出现900的蒙蒙,抓来卖给NPC小枫,获得6000 小枫位置:该地图坐标(25.10)\n忠告:这是一个累死人不偿命的任务,但是属于可以创造钱的那种,和上面抓琳琳有一点区别\n3、猎人洞穴抓嗷日犬\n价格:3000（一样固定）\n任务条件:人宠防御750就行了\n地点:猎人洞穴 \n薪水:50万\n难易程度:3\n推荐度:3\n任务简介:到西码头和(12.37)的猎人李进交谈后,进洞后抓就行了,250级的,交给李进旁边的PLMM就可以领钱了\n忠告:这个任务很简单,是在缺钱可以考虑。而且打到迷药就可以发一比了（宠爱生级可以卖到200W），是新人练级的赚钱的好任务\n4、华山顶抓天狼\n价格:6000-50W(因为有时候会抓到极品)\n任务条件:人防3700,宠物,属性水,级别1200最好,防御不能低于2800。带只飞仙1300级的龟足够。\n地点:华山顶\n薪水:120-200万\n难易程度:6\n推荐度:2\n任务简介:在华山顶抓就是啦!运气好看见1级的狼或者抓到极品,又小发一笔了,抓了狼到宠物店卖了即可（宠爱瞬移很快的）\n忠告:比较难,没有实力的不要去试验,因为旁边还有大刀,全是BT的敌宠\n5、天关蝴蝶\n价格:20W-9000W（5.5以下没人要，6.0的可以卖100W，7.5的话可以卖到9000W以上是没问题的了，不过一般是没什么人买的，也没人会卖。）\n任务条件:单人天关、夫妻天关 2个人(呵呵),人防都过5500最好,宠物最好是妖MM和金龙（个人的宠没有30+的去不了，[引用小楼的话，50关记录后10+的金龙就可以，就是累ing]，夫妻的妖MM和金龙有12+就没什么问题了）\n地点:个人天关、夫妻天关\n薪水:无法估计,总之是发了,一夜可以成为亿万富翁\n难易程度:9\n推荐度:5\n任务简介:详细请参照个人天关和夫妻天关攻略\n忠告:条件不足不要尝试,去了白去,奖品当然拿蝴蝶了，推荐夫妻天关，这里的蝴蝶成长好，一次还2只。\n6、养宠物:金蝎龙,绿衣仙子,黄龙使等\n价格:1000W以上\n任务条件:准备1级的宠物养\n地点:华山,防人不变的选择;敏人海底、华山自己衡量，高级后进新山\n薪水:2天一只,主要看你养的情况了\n难易程度:6\n推荐度:4\n任务简介:人的级够了就比较简单,主要还是繁琐,垃圾飞3转的宠物可以卖到1000W-1500W万（成长越高越值钱）,垃圾金蝎龙卖系统，能秒新山的可以卖2500W以上。\n启动基金有100万就可以,挂机很快的,2天一个,每天16小时.忠告:没事、无聊的时候做,反正是挂机不累,买家还会很感谢你,不是吗?就当是积德了\n7.做图\n价格:10-100万\n任务条件:级别高,图库全\n地点:整个幻灵\n薪水:几百万吧\n难易程度:7\n推荐度:2\n任务简介:就帮人抓1级的宠物\n忠告:自己飞大罗也要用,11级的废物卖给别人\n8、卖九转小鸟\n价格:40-50W\n任务条件:随便一只混级宠就可以\n地点:夫妻天关和火任务 \n薪水:难说，看你养的数量算\n难易程度:4\n推荐度:4\n任务简介:人的级够了就比较简单，到天怪4关去抓小鸟或做火任务的时候抓800的小鸟都可以\n忠告:高级人推荐800的小鸟，低级人就只好400的觅雾鸠了\n第二章 装备篇\n1、逍遥战衣\n价格:10万\n任务条件:人防1800,宠物500-600级的金蝎龙就行\n地点:华山腰道,武当炼丹房,水城、山城、榕城、沙城、雪城(随机)\n薪水:\n难易程度:5\n推荐度:0\n任务简介:去华山腰道要无极草,然后去武当炼丹房换无极天魔丹,打完5只800的狒狒就得到了,然后在上面所说的5城找浪子剑阿枫就可以得到逍遥战衣了\n忠告:强烈建议至少2个人一起做,最好是5个人一起做,因为无极草和天魔丹身上有了就不能接任务了!这个任务鸡肋。\n2、真爱仙履\n价格:10-20万\n任务条件:人防3700,宠物,属性水,级别1200最好,防御不能低于2800\n地点:华山顶\n薪水:200万\n难易程度:7\n推荐度:3\n任务简介:任务流程比较长\n忠告:一天可以做很多，是帮派收新人的好东西。（还有羽彩衣也是收新人的好东西，多少水任务累，吓死人，不推荐）\n3、守护之项\n价格:3W-5W\n任务条件:女号就行,人妖也行\n地点:栖月谷,雪城\n薪水:50W\n难易程度:0\n推荐度:1\n任务简介:\n忠告:这个任务有3种情况有经济效益:（1）新人（2）碰到了比较懒的朋友（3）不知道除了守护之链还有别的右佩。\n4、人鱼项链\n价格:10W-15W\n任务条件:人防2000,宠物,金属性,总之能闯地狱就行了\n地点:地狱2层,雪城宠物店,沙城宠物店\n薪水:200W\n难易程度:4\n推荐度:1\n任务简介:到地狱2层(33.44)抓小叮当,出现几率不高,平均6分钟一个,然后到雪城宠物店换人鱼项链\n忠告:人鱼项链卖给新人,也可以到沙宠换成鱼15W一只\n第三章 药品篇\n1、升级药\n价格:200W\n任务条件:人防570, 推荐宠物苦行龟\n地点:猎人洞窟、水城\n薪水:200W-500W\n难易程度:3\n推荐度:3\n任务简介:猎人洞窟(14,33)打嗷日犬,随机得到\"迷药\".拿\"迷药\"跟李月蝶(14,36)换\"猎刀\".再到水城(57,89)找快手老王,得到\"升级药\"\n忠告:和运气关系太大了,有的人一小时出三个,有的三小时一个没出,感觉上65分钟可以出一个。这是和上面抓狗的任务是一起的。\n2、三转药品——玉露丹 天魔散\n价格:（1）玉露丹（2）天魔散  30W-50W\n任务条件:（1）人防1700,宠物推荐乌龟\n（2）人防3700,宠物推荐大象,防成长2.8-3的\n地点:（1）古铜洞窟、仙客厅（2）华山顶、天灯地狱\n薪水:100万\n难易程度:（1）简单 （2）比较难\n推荐度:2\n任务简介:（1）古铜洞窟打玉露丹，到仙客厅找青云仙子（16，27）\n（2）华山顶打天魔散，到天灯地狱找地狱飞龙（49，37）\n忠告:（1）不愁卖不出去\n（2）和抓天狼、真爱任务一起做,收获多多,所以推荐;单纯看本任务,不推荐,条件要求太高,再有就是说\"神仙是混出来的,魔鬼是练出来的\"。敢飞阿修罗的肯定不会为天魔散发愁,平时需要天魔散的不多就是证据\n3、毒药\n价格:1W-2W\n任务条件:有个五行炉就行了\n地点:离药店和武器店近的地方\n推荐:水城\n薪水:30W\n难易程度:0\n推荐度:0\n任务简介:得到五行炉,随便找个小虾问一下\"GG,怎么做毒药?\"\n忠告:希望成为锻造大师的人,这是入门第一课,既练习手法又考验耐心。\n4、九转天仙丹\n价格:180W-200W\n任务条件:没有好宠是做不了的\n地点:好多地方\n薪水:3000W\n难易程度:9\n推荐度:5\n任务简介:请看九转任务的攻略\n忠告:现在由于物品袋和宠物袋的出现，一次可以做大量的九转，而现在养宠人也多，所以强烈推荐。\n第四章 BT篇\n1、锻造、锻造、还是锻造\n价格:不定\n任务条件:炼化1500以上（有任我行或会用按键最佳）\n地点:随便\n薪水:和你的耐心+技术成正比\n难易程度:0\n推荐度:4\n任务简介:这里区分一下1.极品装备,如2558防1000级的甲等 2,极限装备,如3168防100万修行的甲等 3.大众装备,如1200防1000级的甲,1100敏1000级的鞋 4.毒药、PK药、暗器\n忠告:1.越变态，越快乐2为了幻灵的平稳发展,尽情锻造吧!这可能是幻灵里面唯一可以让大家心甘情愿消耗幻币,而且效率极高的办法,要有心里准备的是，你的极品装备很可能在最后一刻变成了标。呵呵!最新消息,宠爱一生服务器已经出现价值3000万的暗器了!大家热烈鼓掌!\n2、过劫创招、拿钱拿宠物\n价格:2.5万/次\n任务条件:地仙、天仙\n地点:过劫的地方\n薪水:250W-700W/小时\n难易程度:9\n推荐度:5\n任务简介：地仙1199劫和天仙1099劫都是25000一次。我强烈推荐天仙1099劫\n忠告:强烈推荐！！TQ说就要改了，呵呵，没赶上的朋友只有等待下一个赚钱的机会了。（这里怎么赚的快请看精华贴http://218.72.250.194/web1/bbs/dispbbs.asp?boardID=3&ID=399）\n3、赌博\n价格：？？？？\n任务条件:已经有点钱了\n地点:水城\n薪水:谁会算,快点告诉我!\n难易程度:1(毕竟还是有一点技术含量的工作嘛!)\n推荐度:0-5(人各有志)\n任务简介:一个字“赌”\n忠告:小赌糊口,大赌发家.不赌无罪,烂赌无泪!\n4、游乐场\n价格:增值不多\n任务条件:有50万就行了\n地点:榕城,水城\n薪水:不知道\n难易程度:0\n推荐度:3\n任务简介:机器人挂机,人睡觉,一晚上多多少少都有收获\n忠告:新的宠物已经摆上游乐场货架,挣点换宠卖也不错噢!\n5、销售月卡点卡价格:月卡2000W,920点卡900W,100点卡120W，60点卡80W\n任务条件:你真的为了钱很着急\n地点:能站的地方都可以\n忠告:新人朋友的选择。碰到骗子就惨了。新人卖卡不先卡没人要的，不过对买家要要求对方有但保和传音说他要和你买，大家见证。\n6、临时小秘、情人\n任务条件:男女都可以\n地点:夫妻天关\n薪水:同拿蝴蝶\n忠告:这要看机会。看有没有人传音要老婆（老公）\n7、水城宝箱\n任务条件:有钥匙\n地点:水城客栈的地下\n推荐度:2\n任务简介:枯井园抓独行,换黄色钥匙,可卖3000元/把,开宝箱就行了,一般都能出10万的东西,100万的几率是0.2%\n忠告:对于某些BT来说,这是离整点还差5分钟时的必修课,和某些人一样\n8、偷\n任务条件:学会了偷\n地点:到处都有可能\n薪水:不定\n推荐度:0\n任务简介:敏捷、偷技要高\n忠告:最好不要，因为会被打死的。偷挂机人的钱和兵解人的钱更是可恶。\n9、加帮赚钱\n任务条件:开小号\n地点:到处都有可能\n薪水:30W-50W\n推荐度:1\n任务简介:看见有帮派招人就练习一个小号,50级不难练习,10分钟吧!轻轻松松几十万到手。\n忠告：新帮派的恩人。\n10、兵解\n价格:70W-230W/人\n任务条件:地仙801以上\n地点:下死人洞\n薪水:280W-920W/次\n难易程度:4\n推荐度:4\n任务简介:不多说了\n忠告:多多益善!\n还有很多新人任务，但是觉得都很鸡肋。这里就不多说了。", "source": "幻灵宝典"}, {"idx": 161, "orig_path": "个性幻灵->自动加点", "orig_data": "自动加点，不需任何外挂！\n\n升级后有很多点，有时后加的手都累了。\n有个方法：右键点+号，按住右键，往旁边移动，松开右键，等半秒钟，看看什么效果吧！\n\n如要停止加点，只要用左键按一下+号，就停下来了！\n\n跟朋友学的，发给大家一起共享！", "source": "幻灵宝典"}, {"idx": 162, "orig_path": "个性幻灵->新山城客栈用功德换宠物、武功等东西的解说", "orig_data": "新山城客栈用功德换宠物、武功等东西的解说\n\n☆指代不推荐、★指代推荐\n◆本帖与无量殿的更新而更新◆\n\n\n①：换轻翼龙需要消耗3000功德值(金属性)  ※推荐度：★★★☆☆\n\n\n\n②：换波萝蜜需要消耗6000功德值(木属性)  ※推荐度：★★☆☆☆\n\n\n\n③：换小精卫需要消耗3000功德值(金属性)  ※推荐度：☆☆☆☆☆\n\n\n\n④：换丸子鱼需要消耗7000功德值(水属性)  ※推荐度：☆☆☆☆☆\n\n\n\n⑤：换小令当需要消耗7000功德值(土属性)  ※推荐度：☆☆☆☆☆\n\n\n\n⑥：换水晶儿需要消耗＿＿＿功德值(金属性)  npc无提示、目前估计所耗功德值在30W以上\n\n\n\n⑦：学习少林七十二绝技之般若掌需要消耗50000功德值(系统显示：500内 1100杀伤 300级使用 根据玩家学到的结果得知系数是2.63)  ※推荐度：★★☆☆☆\n\n\n\n⑧：换无量水晶需要消耗150功德值(效果相当于五个-5000毒药)  ※推荐度：★☆☆☆☆\n\n\n\n⑨：换10级等级需要消耗1000功德值(不能过劫`无聊的东西`浪费功德)  ※推荐度：☆☆☆☆☆", "source": "幻灵宝典"}, {"idx": 163, "orig_path": "幻灵杂类->关于五行相生相克，破阵方法详细见解", "orig_data": "关于五行相生相克，破阵方法详细见解！ 找阵眼，其实真简单，自己1个人组队，用完每个阵，自己站的地方就是阵眼了！也就是蛇，龙，虎打右1，鸟打中间亮点的后面那只，地载打右数第2个亮点后面那只，一般都是第2排第2只！注意看亮点！天复，右数最后一排第1个亮点后面那只！ 虎阵--虎是自动加防100左右的！虎大克地；小克鸟；小克天复；虎对龙；龙自动加防300左右，但龙是降攻的，所以对虎的伤害没什么；蛇小克虎！问题不大！虎就怕虎，虎对虎，敌方伤害会加50左右！所以总伤害会比对别的阵多150左右 龙阵--龙是加防300，降攻100的阵，但被鸟大克，[看见鸟记得跑路哦！如果你的防不是很高的话！呵呵！本人防2600，打迷茫，因为被鸟克，挂了！]龙小克虎！地小克龙   蛇阵 --蛇阵也没有被别的阵大克的；蛇小克虎，但虎阵是自动加防100左右的，所以也问题不大；蛇大克鸟；小克地载！ 地载--地载被虎大克，地被鸟中克！地遇蛇宠自动加敏！地小克龙！ 鸟阵--鸟大克龙，中克天复，大克地载，鸟被蛇大克，被虎大克！ 天复--天复目前没有克什么，但被鸟克得也算厉害！很多阵都小克天复！ 所以我建议大家现在用虎，或者蛇阵！因为它们没有被什么大克的！比较安全！切记别用鸟和地载！被大克太多！有朋友说虎阵不好，那请问什么阵最好呢？呵呵！龙对虎根本没什么伤害的！只是龙对虎，龙的防加得多而已！攻够了！怕什么呢？一样秒！ 以上是本人一下午的详细研究！95%准确的\n本帖已于2004-4-21 19:21:42 被狂风￠静影修改过。", "source": "幻灵宝典"}, {"idx": 164, "orig_path": "幻灵杂类->新手专用0级装备", "orig_data": "新手专用0级装备彩云衣加防150。 \n水任务真爱仙屐：加敏200。 \n雪狼湖任务恋之守护：加敏30， \n右饰，御雪暖服任务药王佩;加敏20加防20， \n左饰，开五行炉任务草缕鞋：0级+15敏， \n飞行石任务梦蝶佩：右饰+30防 \n端午节任务飞龙香囊：加血50，攻50，防50，敏20， \n左饰彩蝶香囊：加血50，攻50，防20，敏50，左饰", "source": "幻灵宝典"}, {"idx": 165, "orig_path": "宠物资料->关于宠物三围的锻造", "orig_data": "关于宠物三围的锻造 \n练宠人如果不会锻造宠。那么你不算是一个会练宠的人。下面是我的一些心得。跟大家一起分分。 \n\n\n1。首先：宠物锻造后是不会改变宠物成长，不会改变宠物忠诚度，不会改变宠物三围总的属性点的，也不影响锻造后宠物三围的实际成长（例如：你的宠物防成长是3，锻造后还是3），它只影响幻化后的三围分配。 \n2。其次：下面就是按照您的需要来进行炼化 \n（1）加攻：买把武器来炼上去，然后同宠物炼 \n只+攻击的武器， 炼出的是把宠的防和敏加到攻上去 敏防都减 \n+攻+敏的武器， 炼出的是把宠的防主要加到攻上去，敏随着武器加的敏点数高而变高。 \n  +攻+防的武器， 炼出的是把宠的敏主要加到攻上去，防随着武器加的防高而变高。（2）加防：买件衣服来把炼化上去，然后同宠物炼 \n只+防的衣服。炼出的是把宠物的攻和敏加到防上去，攻和敏都减  \n+防+敏的衣服，炼出的是把宠的攻主要加到防上去，宠的敏随着衣服加的敏点数变高而变高。 \n+防+攻的衣服，炼出的是把宠的敏主要加到防上去，攻随着衣服加的攻击点数变高而变高。 \n（3）加敏：买双鞋子来炼化上去，然后同宠物炼 \n只+敏的鞋子，炼出的是把宠的攻和防加到敏撒去，攻和防都减 \n+敏+防的鞋子，炼出的是把宠的攻加到敏上去，鞋子加的防越高。宠加的防也越高。 \n\n\n+敏+攻的鞋子，炼出的是把宠的防加到敏上去，攻随着鞋子加的攻击变高而变高。 \n\n\n关于炼化的位置 \n（1）装备都按属性放 \n武器放火位（9点）；衣服金位（11点或12点）；鞋子水位（3位） \n（2）宠物也按属性放调整的最多 \n不过如果你用鞋加水系宠的敏，那把宠放水位，装备自己看吧 \n土系（5点）木系（1点或7点） \nPS：第一次和宠炼化的装备的修行是N。那么第二次想再用装备和宠炼化。那么第二次的装备的修行一定要比第一次高。以此类推。如果想变回原来没练化过的三围。可以用在装备店直接买的装备和宠练化。\n本帖已于2004-4-21 15:29:01 被狂风￠静影修改过。", "source": "幻灵宝典"}, {"idx": 166, "orig_path": "宠物资料->巧用三化 —— 塑造极品高防宠", "orig_data": "巧用三化 —— 塑造极品高防宠 \n幻灵从开放幻化，进化，炼化后。许多爱宠之人把爱宠或进化，或幻化，或二者合一。但只有少数人，想到用炼化来提高宠物的某项成长（如防成长）。 \n\n以我的一幻苦行龟为例（我是散仙） \n宠物：5.8苦行龟1只防成长为3.2 \n5.5宝洞露露鸟1只 \n物品：极限甲1件 \n3000修行防衣3件 \n般若镇魂佩2个 \n过程：\nA.5.8苦行龟满血升301级，用极限甲炼化一次，炼化后成长为6.2。装备般若镇魂佩 \nB.5.5成长露露鸟满血升到101级，练到501级用3000修行防衣炼化一次，进化为觅雾鸠，人升级到801级-兵解。觅雾鸠满血升到101级，练到501级用3000修行防衣炼化一次，进化为凤凰。凤凰满血升到101级，练到301级用3000修行防衣炼化一次，成长为9.7。 装备般若镇魂佩\n苦行龟（主宠）和凤凰（副宠）幻化，得到成长为10.5的苦行龟防成长为6.2。\n\n解释：\n1.主宠被副宠的五行生，幻化后成长比用别的宠做副宠高（副宠相同的成长的情况下） \n2.宠物和防衣练，只是提高防长，减低敏和攻。不加总成长(调整三围属性)_ \nPS：你有只高防的宠总比低防高攻，高敏的强吧 \n又附：宠物和防衣练，如果防衣等级高的话，加1~2点属性是有的 \n3.副宠选可进化的宠物，是为了提高副宠的成长 \n4.练101级满血是为了保证成长不掉，如果你有时间的话就都满血吧\n5.宠物进化后不要急着练，人练到801再兵解，既可带忠又可赚钱。练宠最好还是散仙，可以兵解又不用过劫\n6.有人说10成长的乌龟是※※※※，可我不这样认为，高防的宠就是极品，至少宠不会比低防的极品宠死得快，哈哈\n", "source": "幻灵宝典"}, {"idx": 167, "orig_path": "宠物资料->利用五行相生做高成长宠", "orig_data": "利用五行相生做高成长宠 \n有许多网友和我联系，讨论利用五行相生做高成长宠的问题\n\n主要有以下几个缺陷\n1。材料的收集困难，天关琳琳成长要找只6.5+的不是难事，\n但要找只6.5+的旺旺和露露，恐怕有些困难。\n2。紋地龍 、琳琳可以四进，而旺旺和露露不能四进（现在已经\n可以了旺旺可以用火任务进到紫衣，露露可以用养宠换龙）。\n\n虽然3进宠利用五行相生幻化的成长和4进宠的成长相差不多，但\n少了一进毕竟会少点成长，因此我把利用五行相生做高成长宠稍\n微修正了一下，全部改为4进宠幻化，这样成长会高点。\n\n注意：\n1。宠物幻化时带减血装备，成长会稍微加一点点，\n2。宠物应该在五行生它的地图进化和幻化 \n琳琳应该在金的地图进化和幻化 \n露露应该在土的地图进化和幻化 \n纹地龙应该在火的地图进化和幻化\n旺旺应该在木的地图进化和幻化\n3。有了爱宠精灵，可以99%的满血练宠\n4。所有进化和幻化后的宠先带几点忠再去练级 \n5。做主宠的都要练到1000级，旺旺练到800级可以去做火任务加200级，\n2幻旺旺做火任务做到紫衣\n-----------------------------------------------------------\n利用五行相生高成长 妖姬 地藏兽 做法 \n\n妖姬 做法 \n\n材料 最低成长要求\n\n紋地龍 1个 （土） 5.8+\n天关旺旺1个 （火） 5.6+\n天关琳琳6个 （水） 5.9+\n\n做法： \n-----------------------------------\n紋地龍 + 琳琳>地藏=1幻紋地龍 \n琳 琳 + 琳琳>地藏=1幻琳琳A \n\n旺 旺 + 琳琳>地藏=1幻旺旺 \n琳 琳 + 琳琳>地藏=1幻琳琳B\n-----------------------------------\n1幻紋地龍 + 1幻琳琳A>地藏=2幻紋地龍 \n1幻旺 旺 + 1幻琳琳B>地藏=2幻旺 旺 \n-----------------------------------\n2幻紋地龍 + 2幻旺 旺>紫衣=3幻紋地龍 \n-----------------------------------\n3幻紋地龍 进化黄龙使 飞 白发妖姬 \n\n------------------------------------------------------------------\n地藏兽做法 \n\n材料： 最低成长要求\n琳琳4只， 水 6+ \n露露或嘟嘟1只 金 6+\n纹地龙2只 土 5.8+\n旺旺1只 火 5.5+\n-----------------------------------\n做法： \n\n琳琳 + 琳琳>地藏=1幻琳琳A\n琳琳 + 琳琳>地藏=1幻琳琳B\n\n露露 + 纹地龙>妖姬=1幻露露\n紋地龍 + 旺旺>紫衣=1幻紋地龍 \n-----------------------------------\n1幻琳琳A + 1幻琳琳 B>地藏=2幻琳琳 \n1幻露露B + 1幻紋地龍>妖姬=2幻露露 \n-----------------------------------\n2幻琳琳 + 2幻露露>凤凰>=3幻琳琳 \n-----------------------------------\n3幻琳琳 进化绿衣 飞 地藏兽 \n\n------------------------------------------------------------------\n其实练其他属性的宠也可以按这样做\n只要把主宠换成你要的宠，2幻副宠换成生主宠的宠就可以了\n\n要是五行任务都开放的话，用纯五行生克来幻化宠物（也就是我以前发表的文章）\n成长肯定比蝴蝶做副宠来得好，就是材料难找。\n", "source": "幻灵宝典"}, {"idx": 168, "orig_path": "宠物资料->利用五行相生高成长 妖姬 地藏兽 做法", "orig_data": "利用五行相生高成长 妖姬 地藏兽 做法 \n妖姬 做法\n材料 \n紋地龍 1个 （土）\n旺旺（天关小狗）3个 （火）\n魯魯（天关猴子）3个 （木）\n琳琳（天关蝴蝶）1个 （水）\n做法：\n紋地龍 + 旺旺>天狼=1幻紋地龍\n旺 旺 + 魯魯>神猿=1幻旺旺A\n\n旺 旺 + 魯魯>神猿=1幻旺旺B\n魯 魯 + 琳琳>地藏 =1幻魯 魯\n\n1幻紋地龍 + 1幻旺旺A>天狼=2幻紋地龍\n1幻旺旺B + 1幻魯 魯>神猿=2幻旺 旺\n\n2幻紋地龍 + 2幻旺 旺>天狼=3幻紋地龍\n\n3幻紋地龍进化黄龙使 飞 白发妖姬 \n\n地藏兽做法\n材料：琳琳1只， \n露露3只 \n纹地龙3只 \n旺旺1只 \n做法：\n琳琳 + 露露>凤凰=1幻琳琳\n露露 + 纹地龙>黄龙使>妖姬 =1幻露露A\n\n\n露露 + 纹地龙>黄龙使>妖姬 =1幻露露B\n紋地龍 + 旺旺>天狼=1幻紋地龍\n\n1幻琳琳 + 1幻露露A>凤凰=2幻琳琳\n1幻露露B + 1幻紋地龍>黄龙使>妖姬 =2幻露露\n\n2幻琳琳 + 2幻露露>凤凰=3幻琳琳 \n\n3幻3幻琳琳 进化绿衣 飞 地藏兽 \n\n\n五行属性可进化宠\n\n水系： \n琳琳>霓裳>綠衣仙子 >地藏兽\n盈盈>羽衣>粉衣仙子 >幻云兽\n珍珍>靈衫>白衣仙子 >敖雪兽\n蛋蛋魚>魚娃娃>凌波仙子 \n丸子魚>魚妞妞>戲水仙子 \n乒乓魚>魚妹妹>逐浪仙子 \n\n火系 \n旺旺>嚙風犬>幻變天狼 \n匆匆>嗷日犬>墜落天狼 \n西皮>追影犬>奇變天狼 \n阿弟>阿格>阿努比斯 \n\n金系 \n露露鳥>拂葉鳥>雪鳳凰 \n努努鳥>浴露鳥>火鳳凰 \n嘟嘟鳥>覓霧鳥>蓝鳳凰 \n\n木系 \n魯魯>剛雷狒>中岳神猿 \n陶陶>吼雷狒>西岳神猿 \n蒙蒙>奔雷狒>東岳神猿 \n\n土系 \n伏地龍>烏漆龍>黑龍使 >红发妖姬 \n紋地龍>黃金龍>黃龍使 >白发妖姬 \n瞬地龍>蓝暴龍>青龍使 >蓝发妖姬 \n\n\n有人说用高成长的地藏去幻化，那要好多号飞地藏啊。。。晕\n", "source": "幻灵宝典"}, {"idx": 169, "orig_path": "宠物资料->宠物底章专区", "orig_data": "宠物底章专区 \n1.30级以下斗宠`~~~~~~~~~~~ \n2.组队打，5个人的对最容易得章。而且队伍不要锁，队伍里的人进出的频繁得章的机会就大！ 想要就去组队挂机~！最好是1200级的宠，而且要保证你的宠在队伍里是最优秀的机会才大，不然只会给别人做嫁衣`~~~~~~~~~~~ \n3.全※※运气啊`~~~~~~~~~~~ \n4.极品满血升级到101后得章机会大，我的143金蝎龙就是满血升级到101后1个小时得了2勇猛。2果敢,`~~~~~~~~~~~ \n5.打被自己宠克的怪物\n6.组队时你的宠最后一击打死怪物（2人组队时，你的人宠敏低于对方）\n7.骂一下GM和系统，可能`~~~~~~~~~~\n", "source": "幻灵宝典"}, {"idx": 170, "orig_path": "宠物资料->我的极品之路", "orig_data": "我的极品之路 \n\n\n练了那么久的宠物我得出了几相结论\n(一)极品宠一级属性有以下几特征\n1.超防超敏或超攻如金蝎龙防一般是超过很可能是极品\n2.宠物一级属性与图鉴上的平均属性接近\n3.身份牌尾数为0时\n4.宠物换一级宠物如纹地龙换苦行龟成长高的去换可能是极品\n5.宠物刚得到时生命与最大生命是相同而不是差一点如不是的可能是极品\n(二)如何练好极品宠物\n1.宠物已登陆过图鉴再练过级\n2.练宠经验尾数最好是49或99\n3.30级以下可以去斗宠物多得几相勋闪电章\n4.尽量不要让宠物死如果死了先不要练级让人物带别的宠出征先升十级让宠物加工点忠诚再去练级这样成长才不会掉太多\n5.宠物别送来送去夫妻除外即使不掉顾也不会加\n6.宠物最好去打被自己无的怪物在生自己的地图练级\n(三)满血升级大家都注意到可是满血升级有两种一种是我要升级了第二种是每次战斗以前都补满血有人说要那么麻烦吗举个例子我有两只5.2的苦行一只升级前满血升级一只升级后满血升级到了级前一只成长5.3另一只长成5.7到了生命超过一千以后满血升级有新的意义有人说是5%算是怎么练的反正我用第二种方法到了级我成长一般加0.5以上到级我成长加左右\n4.被打自己宠克的怪物,在生自己宠的地图打除生已和克已外的怪物.第一句话比较好理解第二句话的意思是打怪物的地点和宠成长有很大关系为什么有个很普遍的现象同是终极宠物金蝎龙比其它如绿衣仙子黄龙使天狼还高其原因何在因为练一级宠的水城外郊五行属土而土生金因此金系的宠物在这时能练出很高的成长最高到而仙子龙等其它属性的宠物能超过的已经是极品了\n（三）极品中的极品\n顾名思议极品中的极品有一个很大的特征就是11级成长与101级成长一般都差了一点在练到后来还会升不象普通的极品尽管11级成长是8到了级成长还不超过8.5可以说是级品中的※※※※了如何知道你的宠物是极品中的极品\n1.每次升级点数变化大如我11级5.8成长的苦行龟到了12级加了8点13级加了7点14级加了6点最少也是5点到了21级时已经变为6.13练到级变成了7.2\n2.随便加入一个队伍马上就能得章我一个朋友的兔子就是这种类型成长时才升到级就得了两个攻章两个敏章真是羡慕死人了得章快的宠物就是极品\n3.越级打怪不费力气这是极品的基本条件\n4.没有极品中的极品那你去幻化一条吧\n", "source": "幻灵宝典"}, {"idx": 171, "orig_path": "宠物资料->幻灵赚钱方法", "orig_data": "幻灵赚钱方法\n现在幻灵人气指数日升，我想玩幻灵的玩家对这个游戏中的幻币的赚取方法还是摇头吧，原因是这里的钱真的是难赚呀。而且装备真的贵得让人心疼哟，一些玩家为了买到好装备，不惜以卖月卡来换取幻币，不过这里面可能有骗子哟，呵呵………只要有人存在的地方，欺骗是不可少的，不必奇怪哦。\n\n现在本人介绍一些赚钱的方法，虽不是太有效，呵呵，但是足够应付自己的装备情况喽。这可是本人的经验之谈哦，法不传六耳的哦。呵呵…………好好看看吧，你总会有点收获的哦。\n\n赚钱方法1：打战，在练级中，一战系统都会奖励一些幻币的，不过要看你打的怪物的等级哦，当然高等级的怪物得到的钱会多些的哦。我七百级的时候在华山上练级一晚能赚二十万，如果每晚都有二十万的话，也是很可观的哦。不过好像这是费话哦，大家都知道，嘻嘻………\n\n赚钱方法2：骗，找那些级数高的大哥哥大姐姐们说些好话，表示一点可怜就行了，嘻嘻………那些前辈们顾及身份，也不会少给的哦，不过那就要看你的耐性和厚黑程度了。也不是每个人都能骗来的哦。\n\n赚钱方法3：捉宠，现在虽然没有极品宠捉，一次可以卖几十万的。但一只垃圾二三千，多捉几只也是可以聚沙成塔的哦。你最好做好宠的宠物图鉴，这样捉宠好捉哦，最好要等级比捉的宠高，敏要高些，捉宠好捉。本人认为，捉宠在树城龙洞捉三百多级的纹地龙最好捉，也捉得快。一次捉四只，而且离宠店近，这样一个来回可以赚大约九千左右吧，一个来回用2分钟，那么一个小时就会有三十万了呀，也不是很难哦。不过现在好像没有那么执着的人了哦。\n\n赚钱方法3：卖物品，不管你得到什么物品（打战的时候系统会随机奖励一些物品，比如皇金佩，腰带，鞋……`）你可不要卖到店里哦，那样的话，你只能卖到半价了，要等待时机，总会有幻灵玩家会要的，比如一条腰带店里卖12万，你就可以10万卖出了，这样可比在店里卖的6万多了4万哦。不过这就要看你跟玩家讨价还价的功力了。就算你的还价功夫差，也至少可以卖到8万是不，那也比店里多，记住奇货可居，千万别随意卖了自己的物品，到时会后悔的哦。有的玩家急用的时候你可以多砍点价的哟。（留着物品会占物品栏，不要留那种太烂的东西，没有人会要的那种没什么用的东西。不然会影响你升级的哦。）自己要换新装备的时候，最好能到别的玩家手中买，这样不管怎么样都比店里便宜，多省点钱也就是多赚点钱哦。（我可曾经＊＊这项收入赚了一百多万哦。）记住物品的行情是很重要的哦。还有一点行情都是先给钱，再给货。不要先给了货对方不给钱被骗可就冤了哦，本人到现在还没有被骗的记录，呵呵，幸运是吗？？不完全是吧。希望大家做个诚实的商人哦，不然你欺诈一次，大家都知道你是骗子，你以后就做不下去生意了，呵呵…………\n\n赚钱方法4：养极品宠，我个人认为练黄龙使最合算也最快。一只黄龙使，即使成长只有4.5，练到一百级也能卖个20万。（如果是成长5.2以上就可以留着自己养了，那可就不是为了练来卖钱了。）一只成长4.5的黄龙使，练到一百级只要二个小时左右就行，因为水属性的宠满街都是，这不用我说了吧，龙可是克水的哦，不过黄龙使的获得自己想办法哦。可以跟前辈们要，不过现在的人好小气，呜呜………只好自己破费花个二三万买只吧，说不定是只极品。如果不是极品的话就练来卖钱吧，既然是卖钱用的，你就不必满血升级了，那样会很累的。而且影响不了多大的成长，你的钱照样得，嘻嘻…………如果能找到玩家卖给玩家能卖个好价钱，这我就不说了，看自己的喽。\n赚钱方法5：如果你有一定的等级，到沙洞捉900的猴子卖给NPC，也是个不错的赚钱方法哦。一只猴子6000，运气好的话，三分钟会有一只，一小时捉20只的话就会有12万喽，也能兼顾到你练级，多好，嘻嘻………本人不赞成捉天狗卖，在猎人谷的天狗300多级的，但却很难捉，而且一只只能卖3000，没有多大的收获的，最主要的是太难捉了，除非有捉宠高手在。我曾经捉一只天狗用了三四分钟，而且还是运气好才能捉到，运气不好，捉几十次都捉不到，浪费时间，又气人。哎，真伤情绪…………\n\n赚钱方法6：有句话说脸皮厚吃个够。不要以为跟别人要钱会没面子。在这幻灵世界没钱真是难熬的哦。遇到那样高人前辈们飞仙,结婚等等，上前说两恭喜两个字，一般都会给钱的哦，运气好的话，一次是发给88888，至少也不会低于18888，呵呵，用这些数字是讨个吉利哦。这样好吧，不用动手，赚钱真轻松，本人就有一个晚上遇到两个朋友飞，两个不是朋友的飞，一个结婚的记录。结果让我轻松要到八尽万。怎么样，容易吧？/呵呵，遇到这种事你可要快哦，不快的话，就没有喽，别人散场了呀。\n\n赚钱方法7：帮你过天劫，不过这要是地仙以上的级的人才办得到。对于初欺新手没什么用哦。当然如果你的防有2800的人也可以，但你必须有一只防成长至少2.4以上的1000级的刺头，那天劫就……！…呵呵，过一次可收对方红包20万到80万不等，就看你怎么敲了。\n\n赚钱方法8：到猎人谷打迷药，换到升级药，那可是好卖的哦。升级药曾最高价卖到280万一颗哦。不过现在的行情只有80到100万左右吧。那得有耐性的朋友才去打迷药，我没有那耐性，因为在那打得运气好才有，又不能兼顾到我升级，所以，本方案只为有耐性者提供。\n赚钱方法9：帮人带宠，（新手1-100级），带到忠100，可得10-20万\n当然赚钱还有别的方法，也不是这几种，不过这几种是有效的而且最为实用的方法，其它诸如传功给别人收钱啦，给别人带路收钱了。\n", "source": "幻灵宝典"}, {"idx": 172, "orig_path": "宠物资料->幻灵捉宠秘籍", "orig_data": "幻灵捉宠秘籍 \n什么时候宠物不可以抓：\n\n1、 当你还没有飞升的时候（还是凡人），高出你的级别150级以上的宠物是抓不到的。散仙以上的没有这个限制。\n2、 当宠物的等级超过1200级别，就没有办法抓了。\n3、 别人的宠物不可以抓。\n4、 身上宠物已经满了，就暂时不可以抓更多的宠物了。\n\n如何提高抓宠的成功率：\n\n1、 你的等级尽量比怪物高（飞升后的仙魔更好）；\n2、 你的敏捷尽量比怪物高；\n3、 出征宠物的等级比怪物低（出征宠物1级最好）；\n4、 出征宠物和要抓的怪物是五行属性被克最好其次五行属性相生，相同五行属性再次之，相克最不好（宠物克怪物）；\n5、 出征宠物的忠诚越高越好；\n6、 怪物身上的血越少越好；\n7、 怪物中了魔法更容易被抓；\n8、 进化过的宠物比一般的宠物难抓；\n9、 1级的怪物，生长率越高越难抓；\n10、 怪物已经登录到宠物图鉴的，容易抓。\n", "source": "幻灵宝典"}, {"idx": 173, "orig_path": "炼化资料->高手炼化->衣服->日月甲锻造-5877内的防衣数据", "orig_data": "日月甲锻造-5877内的防衣数据\n\n\n所需原材料：日月甲1件、7件极限衣服、17条极限内带、半成品内带6条\n(日月甲1000级属性：-5877内 +2558防)\n\n步骤   加防 减内  \n1   1564 1407 毒药加防  第1个极限内带\n2   2480 2232                第2个极限内带\n3   3127 2811                第3个极限内带\n4   3624 3261                第4个极限内带\n5   4035 3630                第5个极限内带\n6   4395 3945                第6个极限内带\n7   5759 3945 第1个极限衣服\n8   5759 4101                第7个极限内带\n9   5759 4263                第8个极限内带\n10  5759 4428                第9个极限内带\n11  5759 4599               第10个极限内带\n12  5759 4773               第11个极限内带\n13  5759 4860               第12个极限内带\n14  5759 4953               第13个极限内带                  \n\n15  5759 5181              这里可以不用极限内带, 100W修行+2147内力的就可以\n16  6299 5181 第2个极限衣服\n17  6299 5331               第14个极限内带\n18  6299 5484               第15个极限内带\n19  6299 5640               第16个极限内带                 \n    \n20   6299 5667             这里可以不用极限内带, 100W修行+2147内力的就可以\n21  6461 5667 第3个极限衣服\n22  6461 5814               第17个极限内带\n23  6510 5814 第4个极限衣服\n24  6510 5859              这里可以不用极限内带, 100W修行+2500内力的就可以\n25  6525 5 7件极限衣服    +1305\n12                1000级     +1305防+1089敏-1995攻 鞋子\n\n\n三,-1995攻+1305防鞋加血数据，最终成品1305防2559血\n\n所需材料：成品防鞋一双.+4251血的极限血饰一个,半成品血饰七个.\n\n步骤:\n1:防鞋子的敏为2531的时候,加一个极限血饰                    加血1773.\n2:防鞋子的敏为3268的时候,加一个+血为3147的半成品血饰       加血2103.\n3:防鞋子的敏为3158的时候,加一个+血为2505的半成品血饰       加血2262.\n4:防鞋子的敏为3105的时候,加一个+血为2205的半成品血饰       加血2373.\n5:防鞋子的敏为3068的时候,加一个+血为1917的半成品血饰       加血2448.\n6:防鞋子的敏为3043的时候.加一个+血为1608的半成品血饰       加血2496.\n7:防鞋子的敏为3027的时候,加一个+血为1445的半成品血饰       加血2535.\n8:防鞋子的敏为3014的时候,加一个+血为1212的半成品血饰       加血2559.", "source": "幻灵宝典"}, {"idx": 175, "orig_path": "炼化资料->高手炼化->鞋子->飞羽椴造极限内血鞋(+5985内 +2289血)的数据", "orig_data": "飞羽椴造极限内血鞋(+5985内 +2289血)的数据：\n\n严重感谢星光男孩、冰冷雨丝、ye华提供部分数据及修正错误\n\n所需材料：-300防 -1995攻的鞋子、极限内带58条、极限血佩2个、半成品内带1条、半成品血佩6个\n\n\n\n步骤  制作过程及数据\n1   完成飞羽制作的-1995攻 -300防的敏鞋\n\n\n\n原材料：飞羽/兄弟天关30关商人处购买\n消耗材料：6双极限鞋子、16把极限武器、4把半成品武器\n(飞羽1000级纯敏鞋的属性：+2694敏 -1995攻 -300防)\n\n步骤 敏捷 攻击     材料\n1    1696    -508       第1把极限武器\n2    2663    -798       第2把极限武器\n3    3335    -999       第3把极限武器\n4    3845    -1153     第4把极限武器\n5    4272    -1279     第5把极限武器\n6    4625    -1387     第6把极限武器\n7    5886    -1387     第1双极限鞋子\n8    5886    -1443     第7把极限武器\n9    5886    -1501     第8把极限武器\n10   5886    -1561    第9把极限武器\n11   5886    -1622    第10把极限武器\n12   5886    -1685    第11把极限武器\n13   5886    -1750    第12把极限武器\n14   5886    -1765    半成品武器(+攻2000左右)\n15   6423    -1765    第2双极限鞋子\n16   6423    -1817    第13把极限武器\n17   6423    -1871    第14把极限武器\n18   6423    -1926    第15把极限武器\n19   6584    -1926    第3双极限鞋子\n20   6584    -1975    第16把极限武器\n21   6633    -1975    第4双极限鞋子\n22   6633    -1989    半成品武器(+攻1661左右)\n23   6647    -1989    第5双极限鞋子\n24   6647    -1993    半成品武器(+攻1100左右)\n25   6651    -1993    第6双极限鞋子\n26   6651    -1995    半成品武器(+攻1100左右) \n \n\n\n不要降修行)\n2   直接砸鞋极限内带、连砸58条极限、中间不需要加极限鞋子 (鞋子3点 内带7点)\n(数据我没记下来、砸到第58条时`鞋子+内5966上下)\n3   最后再加 +2200左右 的内带、得到极限+5985内   \n\n4   直接加第1个极限血佩、得到+1202血 +5985内 +1882敏的鞋子 (鞋子5点 血佩6点)\n5   将鞋子煅造到+3068敏、第2个极限血佩、得到+1818血 20 ）身饰（木） 头饰（土）\n     通常我们也叫身饰为 内带或左饰 ；叫头饰为 血佩或右饰\n    通常也把五行炉的位置叫做 1点、3点、9点、12点 之类的<拿起手表或看看时钟就知道了 ^_^>\n                \n2   宠物 + 装备 = 宠物的三围调整 （最好装备等级是宠两倍以上的）\n    如果想加防减敏攻击不变   推荐使用逍遥战衣炼化到20W修行，再和宠物煅造\n    如果想加攻击减敏防不变   就用加防的武器做原料 或 高等级的武器加低等级的衣服\n   如果想加敏减攻击防不变   就用加防的鞋做原料 或 高等级的鞋和低等级的武器\n\n   如果想单加、其他的不管   就用加单属性的装备原料\n   如果攻、防都要加         推荐用武器和衣服一起来锻造宠物\n\n\n3  宠物 + 宠物 = 装备、药物、暗器\n    宠物要炼化成装备时，根据宠的属性放在乾坤五行炉的对应位置\n    乾、兑位煅造出衣服    离位煅造出暗器   坎位煅造出鞋子   其他两方位出的均为饰物\n\n    例如：主炼方位出的物品\n\n            金属性宠（主）+ 宠 = 加血的药\n            木属性宠（主）+ 宠（离） = 内药 （放在左下）= 出饰品加内（或防且同副宠有关）\n            水属性宠（主）+ 宠 = 毒药\n            土属性宠（主）+ 宠 = 加血的头饰\n\n\n            4   各种装备的属性原理（攻、防、敏、血、内）\n            衣服：减内 |  如果想要给衣服加内、必须找件原始就+内的衣服 \n            武器：减防 |  如果要给武器加防、必须找原始就+防的武器\n            鞋子：减功 \n            身饰：减血 |  要给身饰加血、同样必须找原始+血的身饰\n            头饰：减敏 |  同上说法、目前有恋之守护+30敏的和绝版的思念发钗+50敏的\n\n\n            5   药物和暗器 = 更好的药物、暗器\n            -5000毒药练法 = -100毒 + 暗器重复炼得到\n            +20000内的药 = 林天的玉佩 + 止血草（只要是身饰都可以）\n            +20000生命20000内的药 = +20000内的药（坤）+暗器（离）= +20000血20000内的药\n\n\n            6   极限、超极限；极限的煅造方法\n            衣服、武器、鞋子：3168      头饰、身饰：4251\n            半极限装备 + 半极限装备 = 超极限 （用处不大）\n\n            衣服放11点、毒药放12点、其他炉位全放暗器\n            武器放9点、毒药12点、其他炉位全放暗器\n            鞋子放3点、毒药12点、其他炉位全放暗器\n            头饰放6点、毒药12点、其他炉位全放暗器\n            身饰放2点、毒药12点、其他炉位全放暗器\n\n\n            7   如何降修及降修的含义、如何微调装备的属性\n            ->不管衣服、鞋子、武器、头饰还是身饰，降修行都是用草药或银两（通常都用止血草；加血效果越少的，降的程度越大）\n\n            降修的含义：\n            衣服降修 = 给衣服降防 <衣服9点、草12点>\n            武器降修 = 给武器降攻 <武器12点、草9点>\n            鞋子降修 = 给鞋子降敏 <鞋子9点、草12点>\n            身饰降修 = 给身饰降内 <身饰9点、草12点>\n            头饰降修 = 给头饰降血 <头饰9点、草12点>\n\n\n            ->微调：\n            简单的说就是用毒量不高的毒药与装备炼化，一般都是用药店里卖的毒药(自己炼化毒量不高的毒药也行)；\n            在我们成功炼化出一件装备时，通常要降到自己需要的等级\n\n            打个比方：\n            你已经成功煅造出一双 -1995攻 -300防 +6651敏的鞋子\n            你要把它降到1000级使用，鞋子放9点、止血草放11点，循环炼之\n            会得到一双 1000级 +2600敏 -1995攻 -300防 的鞋子\n            而+2600敏并不是1000级的最佳敏捷\n            此时你要到药店买一个毒药，鞋子放3点、毒药放12点，循环几次\n            就会得到一双1000级 +2694敏 -1995攻 -300防 的鞋子(1000级最佳敏捷)\n\nPS:有些数据可能会有点误差.只要最终得到的结果是一样的就行.", "source": "幻灵锻造宝典"}, {"idx": 250, "orig_path": "◆极品彪装系列◆->◆彪衣◆", "orig_data": "标衣属性：+血3138 -内3885 +攻1170 +防4317 +敏1294\n\n一件极品放衣，减内5940，-70攻，80敏。+6602防\n极限数量：2把极限武器，6把半极限武器。8件极限血佩。一件极限衣。37双极限鞋子\n\n第一步：给衣服加攻击，把防降到3543\n  防        极限武器   得出==》   防     攻击   （衣服12点，武器9点）\n  \n  3543      +极限                   3130   939\n  4289      +极限                   3358   1007\n  4221      +1931                  3558   1066\n  4162      +1664                  3684   1104\n  4124      +1448                  3768   1130\n  4098      +1256                  3833   1148\n  4080      +1063                  3887   1160\n  4067      +963                    3899   1170   \n第二步：给衣服加血\n  防        极限血佩   得出==》  防    血  （衣服12点，血佩5点）\n降到90级    +极限                2623  705\n降到90级    +极限                2388  1410\n  1048      +极限                2263  2034\n  1933      +极限                2653  2385\n  2349      +极限                2937  2643\n  2652      +极限                3189  2850\n  2898      +极限                3373  3027\n  3373      +极限（直接加极限）  3488  3138\n接下来直接加一件极限衣服得到： 4317防  1169攻  3138血\n再直接砸鞋子37双得出敏：1294敏（衣服12点，鞋子3点）", "source": "幻灵锻造宝典"}, {"idx": 251, "orig_path": "◆极品彪装系列◆->◆彪右饰◆", "orig_data": "新标右饰：+6198血 +172攻 +206防 -206敏\n\n材料：单风 -120攻击  （5双极限鞋子，5件极限血佩，5件极限衣服，3把极限武器.1把2100左右的半极限武器）\n\n步骤      血         极限       攻     敏\n\n1       +4020       +极限鞋子        -134   \n2       +5013       +极限鞋子        -167  \n3                       +极限血佩\n4                       +极限鞋子        -218  \n5                       +极限血佩\n6                       +极限鞋子        -233\n7                       +极限血佩\n8                       +极限鞋子        -235\n9   降到+1257左右   +极限武器  +113  -235(武器9点.丹凤6点)\n10                  +2100武器  +125  -235\n11                  +极限血佩  +125  -235\n12                  +极限武器  +172  -235\n直接砸血佩得：+6189血 +172攻击 -235敏（极限血佩6点，单风5点）\n再直接砸5见衣服即可！（衣服12点，单风5点）\n\n全极限数据.\n原始丹凤1个.极限血5个.极限鞋5双.6件极限衣.\n\n第一步.丹凤6点.极限血5点.得到+4683血.主练丹凤\n第二步.止血草12点.丹凤9点.连续降2次.降第一次+4386血.降第二次+4182血.主练丹凤\n第三步.丹凤6点.极限鞋3点.得到+4182血.-123敏.\n第四步.丹凤6点.极限血5点.得到+6198血.-123敏.\n第五步.丹凤6点.极限鞋3点.得到+6198血.-183敏.\n第六步.丹凤6点.极限鞋3点.得到+6198血.-206敏.\n第七步.丹凤6点.极限血5点.得到+6978血.-206敏.\n第八步.丹凤6点.极限鞋3点.得到+6978血.-232敏.\n第九步.丹凤6点.极限血5点.得到+7056血.-232敏.\n第十步.丹凤6点.极限鞋3点.得到+7056血.-235敏.\n加血到极限7065,然后连续砸上6个极限衣,加防235.(丹凤6点.极限衣12点)\nPS:全极限数据只对减敏.加攻的话请勿加防.", "source": "幻灵锻造宝典"}, {"idx": 252, "orig_path": "◆极品彪装系列◆->◆彪左饰◆", "orig_data": "新标左饰：+1000血，+3936内，+186攻击，+75防， +94敏\n\n  材料：  原始暗神，+1000血，-200攻击  6件内极限 9把极限武器 1件极限衣2件半极限 2件极限鞋\n\n第一步：直接砸2件内带 得到：1000血 5601内 -200攻（暗神1点，极限内带7点）\n第二步：直接加一个银针 得到：1000血 5601内 -186攻\n第三步：直接加极限武器9把 得到：1000血 5601内 186攻（武器9点，暗神1点）\n第四步：直接加极限衣 得到：1000血 5601内 186攻 48防（衣12点，暗神1点）\n第五步：砸极限内带后加件半极限衣+1366 得到：1000血 5601内 186攻 70防（衣12点，暗神1点）\n第六步：砸极限内带后加件半极限衣+836  得到：1000血 5601内 186攻 75防（衣12点，暗神1点）\n第七步：降内到1551 加极限鞋 得到：1000血 5601内 186攻 70防 76敏（鞋3点，暗神1点）\n第八步：直接加极限鞋子 得到：1000血 5601内 186攻 70防 94敏（鞋3点，暗神1点）\n第九步：直接砸2见极限内带 即可！（暗神1点，极限内带7点）\n想省极限的注意：第5，6步可以不用加极限内，自己把内练上去浏览看有加到适合的防就OK！\n\n新标左饰：+200血，+4512内，+150攻击，+230防， +200敏\n    材料：一个盘龙，2件极限内带，4把极限武器\n第一步：直接砸2件极限内（盘龙1点，极限内带7点）\n第二步：直接砸极限武器4把（盘龙1点，武器9点）即可！\n\n有钱的可以弄个云淡风清瓶.\n第70关，如果队长出征宠物成长率超过50，和守关npc说话，则进入隐藏关，并且如果宠物满足条件，完成地图上npc要求的简单任务，除了战斗中可以抓到新宠物强盗，还可得到20000修行可装备的＋300攻的身饰“云淡风清瓶”奖励。而且无论任务完成与否，都可以得到一颗锻造用的水晶。\n换取云淡风清瓶需要一只1级100忠的强盗.\n\n有云淡风清瓶后.直接砸2-3个极限内.把内砸到极限即可.(风清瓶1.极限内7点.这2个位置随意)", "source": "幻灵锻造宝典"}, {"idx": 253, "orig_path": "◆极品彪装系列◆->◆彪左饰◆", "orig_data": "新标鞋：+血3063 +内3843 +防1059 +敏997\n材料：一件满修纯敏鞋，-1995攻击 -300防 +6652敏\n\n加血：\n步骤  敏       血       极限      得出        血     \n1     6652     0        +极限血               1200   \n2     4552     1200   +极限血               2901\n3                           +1383血             2979（得不到2979就再砸件极限鞋浏览看）\n4     此步如上          +1140                3030\n5     此步如上          +951                  3063\n\n加防：\n1：把敏降到1463敏左右加极限衣（衣服12点，鞋9点）得到：-67防\n2：把敏降到1240敏左右加 "orig_data": "七夕武器\n\n（一）减攻过程\n\n数据参照防武器数据\n\n(二)加敏过程\n\n数据参照防武器数据\n\n（三)加内过程\n\n            1:降攻到1066,加第一个极限内,→加内693(位子武器11点,内带1点)\n            2:降攻到1003,加第二个极限内,→加内1368\n            3:降攻到1311,加第三个极限内,→加内1974\n            4:降攻到1864,加第四个极限内,→加内2322(从这开始武器9点,内1点)\n            5:降攻到2290,加第五个极限内,→加内2577\n            6:降攻到2584,加第六个极限内,→加内2784\n            7:降攻到2784,加第七个极限内,→加内2907(这一步降攻的时候有点过了,大家做的时候降到2850左右的时候就可以加内带了)\n            8:直接加第八个极限内带,加内到3069\n\n            \n\n            最新的加内数据:\n\n            QUOTE:\n            子母环、梅花钩、龙纹扇 锻造数据\n            1139敏武器的加内\n\n            1、攻到1066,加第一个极限内,→加内693(位子武器11点,内带1点)\n            2、攻到1003,加第二个极限内,→加内1368\n            3、攻到1311,加第三个极限内,→加内1974\n            4、攻到1864,加第四个极限内,→加内2322(从这开始武器9点,内1点)\n            5、攻到2290,加第五个极限内,→加内2577\n            6、攻到2584,加第六个极限内,→加内2784\n            7、攻到2763,加第七个极限内,→加内2916\n            8、接加第八个极限内带,加内到3078\n\n(四)加血过程          \n用极限武器把七夕武器的攻加到极限，然后用极限血带砸，砸到不能加为止(血6点或者5点.武器9点)\n最后买减轻步衣减防1200多.(衣服12点.武器9点)", "source": "幻灵锻造宝典"}, {"idx": 275, "orig_path": "◆极品招装系列◆->◆招武器◆->◆醉剑◆", "orig_data": "醉剑\n\n1.减防过程\n\n参照防武器数据\n\n2.加敏过程\n\n参照防武器数据\n\n3.加内过程\n\n1、降攻至910    极限内带，内693 (剑11带1)\n2、降攻至618    极限内带，内1398(剑11带1)  \n3、降攻至1230   极限内带，内1944(剑9带1)    \n4、降攻至1864   极限内带，内2292(剑9带1)      \n5、降攻至2324   极限内带，内2544(剑9带1)            \n6、降攻至2604   极限内带，内2751(剑9带1)            \n7、直接加内带，得剑加内2913(剑9带1) \n8、直接加内带，得剑加内3069(剑9带1) \n\n用极限武器把醉剑的攻加到极限，然后用极限血带砸，砸到不能加为止(血6点或者5点.武器9点)\n最后买减轻步衣减防1200多.(衣服12点.武器9点)", "source": "幻灵锻造宝典"}, {"idx": 276, "orig_path": "◆极品招装系列◆->◆招左饰◆", "orig_data": "黯神灵戒材料的数据\n\n黯神原始戒指1点，极限内带7点     得到1000血   3861内\n\n连续咋3双极限鞋    得到1000血  4437内  54敏\n\n                                 1000血  4278内  108敏\n\n                                  1000血  4116内  137敏 \n\n敏砸完.砸个极限内.+内5190.(内1点.戒指7点.随意)然后再砸极限武器.大概5把左右..根据自己的武功杀伤来砸..(戒指7点或者1点.武器9点)\nPS:该材料已经是绝版材料.只能靠从别人那获得.谨防复制品\n\n磐龙樽材料数据\n\n1.水城买件轻布衣清防(衣服12点.磐龙樽7点或1点)\n2.直接砸2个极限内.+内5202.(内1点.戒指7点.随意)然后再砸极限武器.大概5把左右..根据自己的武功杀伤来砸..(戒指7点或者1点.武器9点)\n\n紫血
