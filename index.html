2280 \n2728         1140          +2304 \n\n加防 \n\n敏0              轻布衣          0防 \n直接             极限衣         213防 鞋9衣12 \n敏380           极限衣         357防 鞋3衣12（以下同） \n敏879           极限衣         456防 \n敏1250         极限衣         532防 \n敏1488         极限衣         594防 \n直接             2314衣        613防 \n直接             极限衣         667防 \n\n加个极限鞋，敏2923，水铁买把乌云剑可降攻", "source": "幻灵锻造宝典"}, {"idx": 280, "orig_path": "◆极品内装系列◆->◆内武器◆->◆七夕武器◆", "orig_data": "+3960内、+4593血血内七夕武器数据\n\n减防过程\n\n参照防武器数据\n\n加内过程\n\n1，武器降修到：200修                    加极限内力带：武器9点，内12点 +705内力 \n2，武器降修到：200修                    加极限内力带：武器9点，内12点 +1410内力 \n3，武器降修到：200修                    加极限内力带：武器9点，内12点 +2115内力 \n4，武器降修到：200修                    加极限内力带：武器9点，内1点  +2784内力  \n5，武器调整到：878000修               加极限内力带：武器9点，内1点  +3147内力  \n6，武器调整到：100w修  3177攻     加极限内力带：武器9点，内1点  +3405内力  \n7，武器调整到：100w修   3501攻    加极限内力带：武器9点，内1点  +3624内力  \n8，武器调整到：100w修   3750攻    加极限内力带：武器9点，内1点  +3804内力  \n9，不降修:                                   加极限内力带: 武器9点，内1点 ：3963内力\n\n加血过程\n\n加把极限武器.5104功3963内\n\n加41个极限血.得刀4593血3963内5104攻\n\n加敏过程\n\n攻~~    鞋         敏\n1484  极限鞋    246    \n1998   2181     335\n1909   1830     385\n1859   1601     419\n1825   1396     443\n1801   1234     460\n1784   1072     473\n1769    795      480\n\n最后用草清攻为0.水武器店买轻布衣合炼使防御为 0\n\n最后在0防的情况下.砸个极限武器.使攻到极限", "source": "幻灵锻造宝典"}, {"idx": 281, "orig_path": "◆极品内装系列◆->◆内左饰◆", "orig_data": "\n普通材料\n\n1.锦腰带为原料\n1:把一般的内带加内到3780，加个极限血，得到-378血+3780内的左饰（内1点血5点）。 \n2：把内加到4629，加个极限血，得到-462+4629内的左饰（位置同上）。 \n3：给-462+4629内的左饰加个内带（内7点，减血内带1点），在加个极限血得到-612+6408内的左饰。 \n4：再加极限内带，用极限血佩减血，方法如（3） 得到-660血+6612内的左饰。 5：最后在加个极限内带加内，用半成血减血（注：这里不用极限血了,+900血的就可以了）。\n6：然后就用极限内带把减好血的身饰的内加到极限，最后直接用极限武器砸，攻的极限是222。\n当然了,其实要不要把攻加到极限是根据个人的红利点和所用招的大小而定的. 没必要一定要把攻加到极限.\n\n全极限数据\n步骤：\n主炼 极限内 （7点）+ 极限血（5点） =主1 [-300+4251]\n           \n主1（1点） + 极限内（7点）=主2 [-300+6096]\n           \n主2（7点） + 极限血（5点）=主3 [-459+6096]\n           \n主3（7点） + 极限血（5点）=主4 [-609+6096]\n           \n主4（1点） + 极限内（7点）=主5 [-609+6609]\n           \n主5（7点） + 极限血（5点）=主6 [-660+6609]\n           \n主6（1点） + 极限内（7点）=主7 [-660+6660]\n           \n主7（7点） +900+血带（5点）=-666血内带 [-666+6660]\n最后砸个极限内把内加到极限.\n\n\n\n黯神戒指材料\n减血732的数据.. \n清掉原来的1000血,把左饰放1点,水城珠宝店的水坠纹放6点,1点主炼. \n1:直接加内到4170,加第一个极限血饰======>减血417. \n2:直接加内到5268,加一个加血2580的半成品血饰.=====>减血525. \n3:加第一个极限内带===>加内7053,然后加第二个极限血饰=====>减血678. \n4:加第二个极限内带===>加内7278,加一个加血2415的半成品血饰===>减血726.. \n5:加第三个极限内带===>加内7326,加一个加血918的半成品血饰===>减血732.. \n90W修加攻的数据.. 加攻的极限是244,把做好减血732的左饰直接加极限内带把内加到极限. 然后加极限武器加攻到不能加为止.(不能降修加攻..) \n\n当然了,其实要不要把攻加到极限是根据个人的红利点和所用招的大小而定的. 没必要一定要把攻加到极限.\n全极限的方法可参照锦腰带的方法", "source": "幻灵锻造宝典"}, {"idx": 282, "orig_path": "◆极品内装系列◆->◆内右饰◆", "orig_data": "\n减敏过程\n\n参照防右数据\n\n加内过程\n\n第一步,直接加一个加内3520左右的半成品内带.===>加内405.\n第二步,加血到4914,加一个1989左右的内带,====>加内441.\n第三步,加血到4878,加一个1236左右的内带.====>加内465.\n\n加防过程\n把丹凤血砸到极限后.连续砸5件极限衣+220防.6660血.衣服12点.丹凤6点\n最后买草鞋.降敏220.草鞋.3点.丹凤6点", "source": "幻灵锻造宝典"}, {"idx": 283, "orig_path": "◆极品内彪系列◆->◆内彪衣◆", "orig_data": "内彪衣\n\n血+1674内+2000攻+540防+2708敏+812\n材料：正气战衣   \n\n材料制作： 正气战衣——练化而成[正气甲12点（主）正气甲11点,鄂鱼骨9点,象牙7点,霸王钳5点,龙鳞3点] \n[+400生命，+2000内力，-100攻击，+300防御，+100敏捷，修行19200的衣服] \n前期准备：把正气降衣用草药降防到0，清血<拿水纹坠6点，衣服12点>。清敏<草鞋3点，衣服12点>\n\n以下是加攻击数据\n\n衣服加防                              武器                       加攻\n\n1657                                极限武器                     301 \n\n砸个极限衣得到2760               2237                      381\n\n砸个极限衣得到2873               1912                      438\n\n砸个极限衣得到2969 -2974     1657                       476\n\n砸个极限衣得到3036               1425                      501\n\n砸个极限衣得到3089               1218                      518\n\n砸个极限衣得到3130                1116                      532\n\n砸个极限衣得到3142                1008                      540\n\n注：衣服防多几点少几点都是正常，只要加的攻击点能对上就行\n\n以上完成后：砸一个极限衣，极限衣放11点，       主衣服12点           得到加3157防540攻2000内的衣服，然后直接砸11个极限血，得到1674血\n\n砸一个极限衣，得到1674血2000内540攻击2708防的衣服，然后砸极限鞋得到1674血2000内540攻击\n\n2708防812敏的衣服  ", "source": "幻灵锻造宝典"}, {"idx": 284, "orig_path": "◆极品内彪系列◆->◆内彪鞋◆", "orig_data": "内彪鞋\n\n飞羽材料\n\n用+2289血5985内-878攻+2927敏\n用草把敏清0.然后买军刀.把攻清了\n最后砸双极限鞋即可\n\n◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆\n\n破甲材料\n\n方法和飞羽的一样\n\n把敏和攻清0.最后砸双极限鞋就可以了", "source": "幻灵锻造宝典"}, {"idx": 285, "orig_path": "◆极品内彪系列◆->◆内彪武器◆", "orig_data": "不管是金光、醉剑、七夕武器\n\n做成极品血内的属性后.把攻砸到极限.不清敏.就是内彪武器了", "source": "幻灵锻造宝典"}, {"idx": 286, "orig_path": "◆极品内彪系列◆->◆内彪左饰◆", "orig_data": "直接用内黯神.或者锦腰带做的就可以了.\n记得把左饰的攻加到极限", "source": "幻灵锻造宝典"}, {"idx": 287, "orig_path": "◆极品内彪系列◆->◆内彪右饰◆", "orig_data": "+5766血+465内+158攻+192防-192敏数据\n材料.-235敏+465内的丹凤\n\n1.降血到1257左右.加把极限武器.得到+97攻.(武器9点.丹凤6点)\n2.直接加1582的半极限武器.得到+107攻.\n3.给丹凤砸个极限血.得到+5295血+107攻(丹凤6点.极限血5点)\n4.加个极限武器.得到+158攻.\n5.给丹凤砸个极限血.得到+5766血+158攻(丹凤6点.极限血5点)\n6.连续砸5件极限衣.得到+192防+5766血+158攻.最后买双草鞋降敏即可", "source": "幻灵锻造宝典"}, {"idx": 288, "orig_path": "◆极品防招系列◆->◆防招衣◆", "orig_data": "防招衣\n\n直接使用+6602防+1980敏的衣服", "source": "幻灵锻造宝典"}, {"idx": 289, "orig_path": "◆极品防招系列◆->◆防招鞋◆", "orig_data": "防招鞋\n\n直接用飞羽做的+4195敏2559血+3774内那双\n或者破甲的血防鞋", "source": "幻灵锻造宝典"}, {"idx": 290, "orig_path": "◆极品防招系列◆->◆防招右饰◆", "orig_data": "防招右饰\n\n直接用挂机用的+7065血+235防的丹凤", "source": "幻灵锻造宝典"}, {"idx": 291, "orig_path": "◆极品防招系列◆->◆防招左饰◆", "orig_data": "防招左\n\n直接用挂机用的+200血+4512内+150攻+230防+200敏的磐龙", "source": "幻灵锻造宝典"}, {"idx": 292, "orig_path": "◆极品防招系列◆->◆防招武器◆", "orig_data": "\n\n防招武器（全极限）需要极限内9个，极限武器1个，极限血25个\n首先买个情剑，用止血草减攻为0，再去水城买个草鞋将敏清0，这时候剑只加防120\n剑11点，极限内1点砸3次\n剑9点，极限内1点砸6次，这时候是加内2439，加防120，加攻多少忘记了\n剑7点，极限武器9点，这时候是加攻3425，内还是2439，加防120\n剑9点，极限血6点砸25次，这时候是加血3081，加内2439，加攻3425，加防120。完成。\n比3081，2436，3426，120的数据有点出入，不介意的可以这样做", "source": "幻灵锻造宝典"}, {"idx": 293, "orig_path": "◆极品防彪系列◆->◆防彪衣◆", "orig_data": "防彪衣\n\n用+1170攻的新彪衣.然后不加血.把防用极限衣加到极限.把敏也加到极限", "source": "幻灵锻造宝典"}, {"idx": 294, "orig_path": "◆极品防彪系列◆->◆防彪鞋◆", "orig_data": "防彪鞋\n\n飞羽材料\n\n把2559血3774内的防鞋清敏.清攻.然后砸双极限鞋把敏到极限\n\n破甲材料\n\n同飞羽一样的做法", "source": "幻灵锻造宝典"}, {"idx": 295, "orig_path": "◆极品防彪系列◆->◆防彪左饰◆", "orig_data": "防彪左饰\n\n直接用挂机用的+200血+4512内+150攻+230防+200敏的磐龙", "source": "幻灵锻造宝典"}, {"idx": 296, "orig_path": "◆极品防彪系列◆->◆防彪右饰◆", "orig_data": "防彪右饰\n\n用+172攻的新彪丹凤", "source": "幻灵锻造宝典"}, {"idx": 297, "orig_path": "◆极品防彪系列◆->◆防彪武器◆", "orig_data": "防彪武器\n\n防彪金光刀\n用原始金光刀.把攻砸到极限.然后连续砸40个血把血砸到极限即可\n\n防彪情剑或者醉剑\n同金光刀一样\n\n防彪七夕武器\n同金光刀一样\n\nPS:其实用个任意穿带武器端就可以了.不需要都弄..", "source": "幻灵锻造宝典"}, {"idx": 298, "orig_path": "◆堕落神戒数据◆", "orig_data": "堕落神戒数据\n\n内                               血 \n4258     加极限血       -423血 \n5035   2277左右血     -501血 \n加极限内 6811内 \n加极限血                   -651血 \n加极限内 7012内 \n加2409半极限血         -699血 \n加极限内 7060内 \n加849 血                   -705血 \n最后再加个极限内 7066内-705血-120防的内戒\nPS:这里要加攻的话应该可以到235攻.自己用极限武器砸下就知道了\n\n\n加敏的做法\n\n降内到2980     加极限鞋     +135敏 \n直接加极限鞋    +159敏 \n562鞋   +160敏 \n直接加极限鞋    +180敏 \n\n最后直接加个极限内 +6526内 \n然后水宝买个水文坠减点血\nPS:这里要加攻的话应该可以到217攻.自己用极限武器砸下就知道了", "source": "幻灵锻造宝典"}, {"idx": 299, "orig_path": "◆磐龙-紫血做宠装数据◆", "orig_data": "磐龙樽+230防宠装数据\n1，准备工作：磐龙樽一个，草鞋一双，水城最便宜头饰一个\n\n   极限（4251）血佩四个，极限（4251）内带三个\n\n\n2，磐龙樽减敏减血\n    \n原料磐龙樽：\n减敏：草鞋9点，磐龙樽7点主炼\n减血：上面得到的装备7点主练，水城最便宜的头饰5点\n     \n3，具体铸造过程：\n\n第一加内3339+\n\n第二加极限血佩（1个）-333血+3339内，位置：主练7点，血饰5点\n\n第三加极限内带（1个）-333血+5268内，位置：主练7点，极限内饰1点\n\n第四加极限血佩（1个）-501血+5268内 ，位置：主练7点，血饰5点\n\n第五加极限内带（1个）-501血+5811内，位置：主练7点，极限内饰1点\n\n第六加极限血佩（1个）-579血+5811内，位置：主练7点，血饰5点\n\n第七加极限内带（1个）-579血+5889内，位置：主练7点，极限内饰1点\n\n第八加极限血佩（1个）-588血+5889内\n\n\n4，数据：\n\n第一加内3339+\n第二加极限血佩（1个）-333血+3339内\n第三加极限内带（1个）-333血+5268内\n第四加极限血佩（1个）-501血+5268内\n第五加极限内带（1个）-501血+5811内\n第六加极限血佩（1个）-579血+5811内\n第七加极限内带（1个）-579血+5889内\n第八加极限血佩（1个）-588血+5889内\n\n紫血制作-585血宠装\n\n材料：1个山城卖+240敏紫血扳指、3条极限内带、2个极限血佩、2个半极限血佩炼化数据： \n血          内        敏 \n备注      3303   240 直接加修 \n-330      3303   240 +极限血 \n-330      5232   240 +极限内 \n-498      5232   240 +极限血 \n-498      5778   240 +极限内 \n-576      5778   240 +3060血佩（可以更多甚至极限血）\n-576      5856   240 +极限内 \n-585      5856   240 +1056血佩 （可以更多甚至极限血）\n\n最后做成品后.把内用草全清了就是低等级用的宠装了", "source": "幻灵锻造宝典"}, {"idx": 300, "orig_path": "◆关于偷装◆", "orig_data": "偷装在这里就不发了.需要偷装的朋友参考其他数据来弄就可以了\n\n偷.注重于.敏和偷.越高越好.内和血越少越好.也是为了偷钱时候买药省钱而已", "source": "幻灵锻造宝典"}, {"idx": 301, "orig_path": "幻灵游侠2.5之宠爱一生", "orig_data": "在充满奇幻色彩的东方大陆，有一个人类与怪兽共同生存的世界。这里群峰山峦迂迥，诸海白浪翻滚，令人不由自主的幻想起天地间的灵气皆汇集于此川岳海洋之中，而在这片这块广阔的大陆上，一直以来都相传有长生不死的秘法，所以引来数不胜数的诸路豪侠剑客在这里苦苦修炼，目的就是希望有朝一日能够参透天地间永恒的奥秘，从而达到天人合一的境界。另外，在东方大上还出没着一种被称作是\"幻灵兽\"的特有生物，据说在修炼的过程中借助于其永恒不灭的奇异力量，就能够尽快的突破凡人之躯。于是，幻灵兽的神秘力量成为这个大陆上各路人马你争我夺的目标，由此引发的纷争也开始涌现……\n　　在这个奇幻的游侠世界中，同制是特立独行的，武功自创就是一个全新理念，它为玩家发挥自己的创造性提供了最大的自由空间，除了个别的初级武功可以在游戏中的NPC身上学到以外，其他所有的武功都要靠自己去创造。等级越高的玩家创出来的武功就越深奥，攻击力也越惊人，附带的效果也越多。在自创武功的进修，武功招式的名称、类型、附带的特殊效果甚至武功招式的特效动画都完全由玩家自己决定。一旦创招成功，系统将把你的喜讯通告给所有玩家，那可绝对是轰动江湖的盛事。玩家自创出来的武功不但可以自己使用，还要以传授给自己的朋友们，让大家一起分享成功的乐趣。 \n　　《幻灵游侠》世界中共为玩家提供了十余类近百种酷到极致的武器，但只为玩家提供初级到中级，更高级的全都要靠玩家们自己在游戏中去创造，包括武器、防具、药品等。游戏里，根据玩家等级的高低，武器也有多个锻造等级。各种武器、的名字属性完全由创造的玩家自由选择，创造成功后物品上还会加上创造者的名字（酷吧！）。\n　　人物等级达到一定的级别后，就可以\"飞升\"，也就是\"轮回转世\"。游戏设置两种转世途径：正道和邪道。正道是玩家达到一定级别一转轮回成为散仙后，依次经历天仙、地仙、大罗金仙，最后成为顶级的幻灵天神。邪道早由散仙依次经历夜叉、魔神、阿修罗王，最终也修练成为幻灵天神。正是所谓的\"正邪双，殊归同途\"。\n　　游戏中的宠物：幻灵兽，它们有自己特殊的攻击方式，比如两次攻击、三次攻击，杀伤效果很不错的哦。还有就是混乱攻击、毒素攻击、睡眠攻击、定身攻击，各有各的妙处啊！至于舍命一击、无痕一击、必中一击，更是绝杀中的绝杀！最令人感动的是：关键时刻幻灵兽还会挺身而出\"忠心护主\"这招惊天地，泣鬼神的英勇壮举，以保住你老人家的性命．．．．．555，很感动是吧？\n　　要想得到它们，你可以花钱买，也可以到野外捕捉。幻灵兽分可进化类和不可进化类两种。前者的进化系统包括升级、幻化、进化三阶段。随阶段的提升，幻灵兽的四围（生命力、攻击力、防御力、敏捷度）也会有相应的提高。当你的两只幻灵兽达到一定级别的时候就可以幻化了，两只幻灵兽进行幻化以后，其二者本身消失，幻化后的幻灵兽会继续上一代的一些优势特性。如果幻灵兽再进行修炼达到一定级别，那就可以进化了。\n　　再提醒大家一句，不要以为有了进化后的终极神兽就天下无敌了。真要这样，天上天下岂不乱做一团！那些不能进化的幻灵兽在前期也许会显的很弱，但是对某一类的幻灵兽有致命克制能力，在战斗中足以让这些终极神兽吃尽苦头，就象自然界中的\"天敌\"。所以呢，在提供的100多个宠物角色中，要选你所能、只能带的5只宠物时，一定要三思而后行哦。\n　　幻灵游侠》为提供最广阔、最方便的交流空间。《幻灵游侠》中的战斗是属于RPG中最常用的回合制战斗模式，但不同是加入了幻灵兽和组队。幻灵兽是玩家们在世界中历练的最好伙伴，在战斗中的作用是不可忽视的！一进入这个世界玩家就会得到系统自动提供的一只幻灵兽，以后玩家可以依靠自己的力量去捕获各种各样的幻灵兽。组队则可以让玩家在游戏中交更多的朋友，一是可以共同练级，二是方便交流练级心得，还可以交换互需的物品、宠物在你受伤的时候别人也可以给 你补药帮你恢复体力。当你自创一门武功成功的话，还可以教给你的队友，如果能从队友那里了解一些锻造兵器、合成药品等的独家心法、经验，对你以后的成功会有很大帮助的，而所有这一切都需要你和队友在相互沟通、交流的基础上互相了解，加深友谊才可以的。\n　　当你的等级已经达到一定级别，就可以向有关NPC申请创立门派了。当你成为某门派的开山鼻祖时，你的大名马上就会响彻江湖，在你的脚上地面也会出现一个代表帮主的光圈，有想加入你门下的玩家看它就会向你下跪拜师。呵呵．．．．．．是不是很得意啊？不过做帮主也很累的，要制定帮规，对于屡教不改的顽劣之徒还要逐出师门，以免影响帮派的声誉。管理好一个帮派，成为一代宗师可不容易哦，还有很多要做的事情，要您在游戏中一步步去学习。\n　　《幻灵游侠》中还有一些十分特殊的功能，如偷盗、点穴、轻功、下毒、暗器伤人等。这些功能让您可以在享受回合制的游戏时同时可以体会即时作战的乐趣。\n　　游戏里特别设计有许多超浪漫的富有意境的场景，分布在幻灵世界中的各个地方，那美丽的景色会使每个玩家驻足留恋，绝对是谈情说爱的佳境。\n　　当一对男女玩家感情成熟以后，自然是要考虑结婚了。在《幻灵游侠》中有全套的结婚服务，玩家既可以一切从简（只是办理结婚手续确定二人关系），亦可大宴宾客，花重金租用婚礼场地，新郎新娘可以广邀亲朋好友甚至GM也可以邀请来主持婚礼哟！而且系统可以根据玩家的要求在场地奏乐、散花甚至下雪、放礼花等等等等，当二人成为夫妻以后可以选择是否购置新房，这里的房屋是可以购置家私以及升级的，可以让你把多余的钱和道具存在家中不怕丢失。\"爱的小屋\"最后还会变成庄园的哟！\n\n\n", "source": "幻灵官服宝典"}, {"idx": 302, "orig_path": "【爱宠区】->五转飞养宠相关问题及宠物技能整理", "orig_data": "一.飞五转养宠的基本条件： \n仙飞养宠需要 \n100级蓝发一只，200级绿妖一只，300级傲雪一只，400级至尊林一只，500级蓝鸟龙一只。 \n魔飞养宠需要 \n500级蓝发，400级绿妖，300级傲雪，200级至尊林，100级蓝鸟龙！ \n另外，飞养宠需要20ｗ基本经验，飞后系统会收回20ｗ经验！ \n\n\n二.五转养宠人的好处： \n抓1级宠100％成功，抓来的野宠不管养宠经验多少都是85忠（抓来就可以变身）.宠物等级上限提升50级。可以用养宠经验换取可进化宠的最终形态的进化！ \n\n\n三.用养宠经验可以进化的宠物种类和需要的经验： \n除属性任务需要的宠物外（绿衣仙子，黄龙使，火属性任务的幻变天狼，水属性任务的彩虹仙子，其他属性任务待考……）都可以在五转人过劫的地方找到通玄天尊，用一定的养宠经验换取最终形态的进化。年卡宠需要20ｗ经验。一般宠需要15ｗ经验！ \n\n\n四.可进化宠物相对应的最终形态： \n水属性 \n盈盈--羽衣--粉衣仙子---幻云兽 \n琳琳--霓裳--绿衣仙子---地藏兽 \n珍珍--灵杉--白衣仙子---傲雪兽 \n\n火属性 \n匆匆--熬日犬--堕落天狼---火妖精 \n西皮--追影犬--奇变天狼--绿妖 \n旺旺--齿风犬--幻变天狼--紫衣 \n阿第达斯---阿格留斯--阿努比斯---超级阿努 \n白骨战士--亡灵武士---招魂使者---小巫师 \n骷髅战士--死灵武士--钩魂使者--小魔师 \n重生战士--忠灵武士--摄魂使者--小法师 \n\n金属性 \n露露鸟--拂叶鸠--雪凤凰---赤龙 \n努努鸟--浴露鸠--火凤凰--金歇龙 \n嘟嘟鸟--觅雾鸠--蓝凤凰--蓝鸟龙 \n\n木属性 \n鲁鲁--刚雷狒--中岳神猿--至尊宝 \n淘淘---吼雷狒--西岳神猿--至尊草 \n蒙蒙--奔雷狒--东岳神猿--至尊林 \n\n土属性 \n伏地龙--乌漆龙--黑龙使--红发妖姬 \n文地龙---黄金龙--黄龙使--白发妖姬 \n瞬地龙---暴蓝龙--青龙使--蓝发妖姬 \n小猪比特--中山猪--北霸天--一戒 \n小猪安特--西门猪--南霸天--八戒 \n小猪芬特--南宫猪--小霸王---不戒 \n\n\n宠物技能的学习地点 \n\n催眠--用苦行龟在雪城宠物店找到小白换得训兽经在沙城宠物店和小红学到 \n\n装死--兄弟天关40关 \n\n忠心护主--兄弟天关50关 \n\n谨慎技能--龟壳乾12金，霸王钳兑11金，象牙震7木，人鱼之泪坎3水，凤凰羽翼离9火，龙鳞5土，主练龟壳乾12金，可得到宠物谨慎技能 \n\n连击技能--兄弟天关60关 \n\n吸星大法--兄弟天关70关 \n\n学习技能--兄弟天关99关 \n\n偷袭技能--个人天关99关 \n\n精确技能--用在兄弟天关55隐藏关打到的训兽经[精确篇]进入63关隐藏关找npc \n\n时光穿梭--夫妻双投后所得的蝴蝶有此技能 \n\n混乱攻击--女娲补天任务得到（新天空之城喷泉（27,39）找到正在补天的女娲，在女娲的帮助下来到西天界，战胜巨鳖得到天柱再交给女娲，女娲给你一块召唤神铁的磁铁，来到深蓝海底（25,27）找到黑龙使，打赢它后将神铁和磁铁取回带给女娲，女娲便信守承诺将宠物“混乱攻击”的技能密笈赠予玩家 \n\n\n各宠物技能的作用 \n连击--宠物连续攻击敌人，根据技能的级别不同使用的攻击的次数不同，但是百分百命中。 \n\n催眠攻击--对手被催眠后丧失三回合的战斗机会，有一定的命中率。可用人物或者宠物的普通攻击解除。 \n\n混乱攻击--对手中了混乱攻击后，三回合之内将不分敌我，随机攻击战斗双方中的任何一位。 \n\n忠心护主--一旦对宠物使用该技能，宠物将奋不顾身的用自己的身体去挡对主人的进攻，这样的技能敏高防低的人应该非常很欢迎。 \n\n装死--使用该技能后，宠物因装死而不被敌人攻击的可能性大大增加，主人有机会给宠物恢复生命，以便东山再起。  \n\n同归于尽--使用该技能后，宠物将用自己残余的气力去给敌方造成最大的伤害，此时的杀伤值将不按照原有的计算关系，而是按照宠物的剩余生命乘以一个攻击系数。在宠物属性被敌方克制时，或者遇到对方高防宠物或者人时，而自己的宠物低成长但是血相对比较多，用这类自杀性的进攻招式将使己方处于有利的位置。放心，这样积极、勇敢的行为，战斗结束后你的宠物是不会掉成长的。  \n\n学习--使用该技能后，宠物将向和自己一类（同一种族、同一颜色都属一类）的宠物学习，使自己的属性在战斗中上升到学习榜样的一定百分比，想一想自己一个成长4。0的****地藏兽一旦向敌方28的地藏兽学习成功，属性暂时暴涨到20几的成长，那时的战斗会……嘿嘿。  \n\n偷袭--表面装作攻击敌方主人，其实是偷袭其宠物，如果成功，则不计算对方宠物的防御，如果失败，则被敌方主人和宠物一起合击。如果自己的敏攻宠物用这个技能对抗敌方高防宠物，而且使用成功，其结果不言而喻。如果一旦攻击对象在攻击之前已经被战友晕了，也可以变假为真，真的攻击敌方主人，不亏吧。 \n\n牺牲--使用该技能的宠物将用自己剩余的生命，来复活战斗中已经晕倒的本方宠物，加血量等于自己剩余的生命乘上一个大于1的系数。战斗中利用本方血高防高的宠物来复活另外一个高成长的宠物，真的是令敌人头痛的妙招啊！ \n\n调虎离山--这个技能更直接，使用该技能成功后，本方宠物将游说对方的宠物一起离开战场。想想敌人高成长的宠还没来得及出手，就和我方的宠物一起双双离开战场了，对方主人靠什么打啊？呵呵。不过这个风险也不小，一旦失败了，可是自己宠物离开，敌人的还在，这样实力对比就……  \n\n时光穿梭--与上面的技能异曲同工，对敌方宠物使用该技能成功后，自己和目标都将变成1级的宠物，不过失败了可只有自己变成1级宠物。放心，战斗后等级会恢复，而且战斗中 敌人也是抓不到的。  \n\n吸星大法--顾名思义，战斗时攻击敌人，可将敌人损失生命的一部分转化成自己的血。但是这个补血只限于战斗中，如果战斗结束了就消失了。 \n\n冲锋--在战斗中暂时提高攻击，但是代价是后手，会先被对方攻击。 \n\n谨慎--战斗中暂时降低攻击来增加防御的技能。 \n\n精确--战斗中通过降低攻击来增加命中率的技能 \n", "source": "幻灵官服宝典"}, {"idx": 303, "orig_path": "【爱宠区】->象牙~煅造 100级+222防--222敏捷的宠物装备的数据", "orig_data": "材料：~象牙~（或其他右佩也可以）、极限鞋子5双、极限血佩3个、极限衣服5件、草鞋1双\n\n\nA  先将~象牙~（右佩）炼到加血3798（头饰5点，药9点）用极限鞋子减敏（头饰5点 鞋子3点） \nB  再炼头饰到加血4620（位置同上），用极限鞋子减敏 （位置同上） \nC  然后边用极限4251头饰加血（原头饰5点 极限头饰6点）边用极限鞋子减敏（位置同上），循环3次头饰炼至减敏222 \nD  用极限3168衣服加防（头饰5点 极限衣服11点），重复5次 一直加到222防 \nE  最后用草降修行（头饰7点 草1点），微降（头饰11点 草9点）\nF  把修行降到100级，+9血+222防御-222敏的  宠物用.\n作者:云淡风也轻小小云儿\n", "source": "幻灵官服宝典"}, {"idx": 304, "orig_path": "【爱宠区】->长命锁做的 100级++227防御 --227敏捷的宠装备的锻造数据", "orig_data": "人鱼之泪 坎位\n凤羽     离位\n象牙     震位    < 主练水纹坠、可得长命锁 +300血 -50攻 >\n龟壳     乾位\n水纹坠    艮位\n\n\n长命锁1个、极限鞋5个、极限衣5个、极限头饰3个\n\n1. 长命锁--->+血3846\n   极限鞋3168减敏------>+3846血 -128敏 -50攻\n2. 长命锁--->+血4785\n   极限鞋3168减敏------>+4785血 -159敏 -50攻\n3. 极限头饰4251加血---->+6567血 -159敏 -50攻\n4. 极限鞋3168减敏------>+6567血 -210敏 -50攻\n5. 极限头饰4251加血---->+6780血 -210敏 -50攻\n6. 极限鞋3168减敏------>+6780血 -226敏 -50攻\n7. 极限头饰4251加血---->+6828血 -226敏 -50攻\n8. 极限鞋3168减敏------>+6828血 -227敏 -50攻\n9. 极限3168衣服加防---->+6828血 -227敏 -50攻 +50防    原料 5 点位置,极限衣服 12 点,\n10.极限3168衣服加防---->+6828血 -227敏 -50攻 +97防\n11.极限3168衣服加防---->+6828血 -227敏 -50攻 +142防\n12.极限3168衣服加防---->+6828血 -227敏 -50攻 +185防\n13.极限3168衣服加防---->+6828血 -227敏 -50攻 +227防\n14.用草降血降修行到100级宠物用.\n作者:飞龙行者\n", "source": "幻灵官服宝典"}, {"idx": 305, "orig_path": "【爱宠区】->太乙珠煅造 100级 +233防 --233敏捷的宠装备的全部数据", "orig_data": "太乙珠：-100攻 +1000血\n\n(太乙珠为5转飞升巡游天神的任务物品)\n\n所需煅造材料：太乙珠1条 极限血带4条 极限鞋5双 极限衣服5件 草鞋2双(水城饰物店买)\n\n顺序  所加血   所减敏      煅造说明\n1        +3964                   直接煅造+血\n2        +3964      -132       第1双极限鞋子\n3        +6049      -132       第1条极限血带\n4        +6049      -194       第2双极限鞋子\n5        +6883      -194       第2条极限血带\n6        +6883      -229       第3双极限鞋子\n7        +6988      -229       第3条极限血带\n8        +6988      -232       第4双极限鞋子\n9        +6997      -232       第4条极限血带\n10      +6997       -233      第5双极限鞋子\n11 (连用5个极限衣服加防) 用极限衣服加防         原料 5 点位置,极限衣服 12 点,\n12                                  用极限衣服加防\n13                                  用极限衣服加防\n14                                  用极限衣服加防\n15                                  用极限衣服加防\n16                                  用草降血降修行到100级宠物用\n作者:柳之剑忘字心中绕，前缘尽勾销。\n\n\n", "source": "幻灵官服宝典"}, {"idx": 306, "orig_path": "【爱宠区】->丹凤钗锻造 100级 +235防 --235敏捷的宠物装备的数据", "orig_data": "->材料清单：丹凤钗1把、极限鞋子5双、极限血佩3个、极限衣服6件\n\n步骤  所加血    煅造说明    所减敏\n1       +4020    第1双极限鞋子   -134   \n2       +5013    第2双极限鞋子   -167  \n3                    第1个极限血佩\n4                    第3双极限鞋子   -218  \n5                    第2个极限血佩\n6                    第4双极限鞋子   -233\n7                    第3个极限血佩\n8                    第5双极限鞋子   -235  |  PK装备做到这一步就可以了\n\n9 (连用6件)     第1件极限衣服\n10                  第2件极限衣服\n11                  第3件极限衣服\n12                  第4件极限衣服\n13                  第5件极限衣服\n14                  第6件极限衣服\n15: 丹凤 5 点位置,极限衣服 12 点,到最后是++235防御\n16: 降修行到宠物用的等级\n作者:柳之剑忘字心中绕，前缘尽勾销。\n\n", "source": "幻灵官服宝典"}, {"idx": 307, "orig_path": "【爱宠区】->300级 ++222攻击 --666血的宠物装备做法", "orig_data": "1:把一般的内带加内到3780，加个极限血，得到-378血+3780内的左饰（内1点血5点）。\n2：把内加到4629，加个极限血，得到-462+4629内的左饰（位置同上）。\n3：给-462+4629内的左饰加个内带（内7点，减血内带1点），在加个极限血得到-612+6408内的左饰。\n4：再加极限内带，用极限血佩减血，方法如（3） 得到-660血+6612内的左饰。\n5：最后在加个极限内带加内，用半成血减血（注：这里不用极限血了,+900血的就可以了）。\n6: 循环炼到减 666 血,用减血装备放 1 点,极限武器放 9 点,循环几次,最后是++222攻击\n7: 降修行到 300级宠物用.\n作者:淘气鬼\n\n", "source": "幻灵官服宝典"}, {"idx": 308, "orig_path": "【爱宠区】->400级 ---585血、+240敏的宠装[紫血]数据", "orig_data": "精华里只提供了磐龙做原材料的减血装（-588血），，所以我一直都是用商店卖的240敏戒指做原材料做宠装，实际效果跟磐龙做的相差无几。 \n材料：1个山城卖+240敏紫血扳指、3条极限内带、2个极限血佩、2个半极限血佩 \n炼化数据：     血               内              敏           备注 \n                                     3303           240         直接加修    \n                  -330             3303           240         +极限血 \n                  -330             5232           240         +极限内 \n                  -498             5232           240         +极限血 \n                  -498             5778           240         +极限内 \n                  -576             5778           240         +3060血佩（可以更多甚至极限血） \n                  -576             5856           240         +极限内 \n                  -585             5856           240         +1056血佩 （可以更多甚至极限血） \n最后降修为-585血、+240敏400级用，就可以给爱宠带上了，  \n作者：~[清月]~ \n\n\n", "source": "幻灵官服宝典"}, {"idx": 309, "orig_path": "【爱宠区】->盘龙尊锻造宠物装备的数据(300级 +230防、10敏)", "orig_data": "1：制作材料\n盘龙尊\n水城买到最便宜草鞋×1\n水城买到最便宜头饰×1\n极限头饰（血佩）×4\n极限身饰（内带）×3\n极限鞋子若干\n\n2：制作步骤\n①盘龙尊6点，水城最便宜鞋子3点\n  此步锻造降其敏捷为0\n\n②盘龙尊6点，水城最便宜头饰5点\n  此步锻造降其生命为0\n\n③给盘龙尊加内至3339左右、加第1个极限头饰，得到-333血 +3339内\n  位置：盘龙尊7点、极限头饰5点\n\n④使用第1个极限身饰给盘龙尊加内，得到-333血 +5268内\n  位置：盘龙尊7点、极限身饰1点 \n\n⑤使用第2个极限头饰给盘龙尊减血，得到-501血 +5268内\n  位置：盘龙尊7点、极限头饰5点\n\n⑥使用第2个极限身饰给盘龙尊加内，得到-501血 +5811内\n  位置：盘龙尊7点、极限身饰1点\n\n⑦使用第3个极限头饰给盘龙尊减血，得到-579血 +5811内 <此步可不用极限头饰>\n  位置：盘龙尊7点、极限头饰5点\n\n⑧使用第3个极限身饰给盘龙尊加内，得到-579血 +5889内\n  位置：盘龙尊7点、极限身饰1点\n\n⑨使用第4个极限头饰给盘龙尊减血，得到-588血 +5889内 <此步可不用极限头饰>\n  位置：盘龙尊7点、极限头饰5点\n\n\n3：这时候把盘龙的内力清除到 0 [盘龙 12 点，血药 11 点，循环几次就可以了]\n自己用 HLHL 挂出一个 1 万多修的半极限鞋\n清完内力的盘龙 1 点位置， 1 万多修的半极限鞋放 3 点位置\n得到 ++230 防御 ++10 敏捷\n这时候再一次把盘龙的内力清除到 0 [盘龙 12 点，血药 11 点，循环几次就可以了]\n得到 300 级++230 防御 ++10 敏捷 的 宠物装备。。。。。。\n\n\n用极限鞋子给盘龙尊加敏捷\n\n500级是+40敏\n600级是+55敏\n\n作者:候鸟不归曾经是叶子 \n\n\n", "source": "幻灵官服宝典"}, {"idx": 310, "orig_path": "【爱宠区】->300级 ++235攻击 --705血的宠物装备做法", "orig_data": "原料:堕落戒指\n\n内                                 血\n4258        加极限血         -423血\n5035        2277左右血     -501血\n加极限内   6811内  \n加极限血                        -651血\n加极限内   7012内     \n加2409半极限血              -699血\n加极限内   7060内\n加849 血                        -705血\n最后再加个极限内    7066内-705血-120防的内戒\n\n要加攻的话   戒指1或7点，武器放9点，循环几次,自己加，攻的极限为235。 \n最后降修行到 300级宠物用.\n作者: 哈狄斯最终毁灭奥义\n", "source": "幻灵官服宝典"}, {"idx": 311, "orig_path": "【爱宠区】->浅谈PK宠", "orig_data": "大家玩幻灵的朋友，有的喜欢PK有的喜欢聊天，我想最主要的还是练宠吧！\n            练宠的朋友也可以分成几类，1，随便练个练级的宠，2要求好看的外加成长高的，3练PK宠。\n            本人就喜欢PK宠，下面我谈谈我练PK宠的经验。\n            首先当然要选终极宠，少进化一次的宠的成长跟不上，还要选每个属性的终极宠里敏成长最高的（落后就要挨打）。现在金系里没有敏宠，所以金系在3。0前，是没有PK宠的！\n            1，PK宠可以说是对成长的要求比较高点，如果你的成长低了，就没有那么多的点数分在攻防敏的上面。我个人意见，现在的PK宠最起码要54+的。\n            2，PK宠对原始攻防敏所分配的比例的要求一点不比成长低。\n            应该知道PK宠的敏捷是决定谁先出手的，先下手为强啊，单P的话谁先出手谁就占了70%以上的胜机，团P的话先出手的一防可以说是占了90%以上的胜机。有的朋友要问你光有敏没有攻秒不了人怎么办？当然攻击也很重要，但是我个人认为攻比敏的重要性差很多。最没有用的当然是防，所有说一个PK宠的好坏，首先看他的防能降到多少低了。\n            PK宠可以分成2种\n            1，攻击2。2万，防2000左右，敏（看你这个宠的成长了，当然越多越好），这样的宠可以秒对方的低防的PK宠。（代表是熬雪）\n            2，攻击在2。7万，防2000左右，敏（看你这个宠的成长了，当然越多越好）这样的宠基本上能全秒，攻击有2。7万还秒不了对方宠的话，那对方的宠根本就没有足够的敏捷能打到你的宠了！（代表是紫衣和幻云）\n            下面我再谈谈练PK宠的过程。\n            有的朋友要说，我把宠锻造一下就行了，问题是大家都会锻造啊，而且锻造是有极限的，所以根本就在于这个宠的原始攻防敏所占的比例了，（最好的第1种比例是攻击在30%左右，防在17%—敏53%+，第2种比例是攻击在45%左右防在20%敏在35%）。要做到这点就要在找原始材料的时候最好找敏型的，在幻化过程中先锻造，再加装备幻化，尽量把原始主宠改造成敏型的。\n            有的朋友要问，你幻化前就锻造会不会影响成长，这个问题我不是很清楚，但是就算影响点成长那也不是很多，所得到的好的3W比例比掉那么一点点成长所得到的好处有用的多！54+的3W比例好的可以赢55。5+的3W比例不是很好的宠，大家可以去看看上榜的的熬雪 \n            幻云 紫衣  !\n            最后总结一下，PK宠就是成长加3W比例！(锻造熬雪和紫衣的方法,全是在没办法的时候实验出来的!)", "source": "幻灵官服宝典"}, {"idx": 312, "orig_path": "【爱宠区】->宠物进化跟幻化的地图", "orig_data": "水系：进化---天空之城--殿廊（1），有仙子加血处（21.11）\n      幻化---天空之城--衡天台，有红大嘴那里（31.22）\n\n火系：幻化---凤只谷，无固定坐标\n      进化---嘞马谷（48.48）\n\n金系：幻化＼\n            大家都知道的，水成龙舟的菏叶上（51.53）\n      进化／\n\n木系：幻化＼\n            海底，无固定坐标\n      进化／\n\n土系：幻化---沙盗洞口（22.22）\n      进化---铜人殿（76.56）\n\nPS：以上地图只是与幻化宠物所属属性相生的地图，对成长比较有帮助，但是对出双没有任何作用```现在幻化宠物不能90%出双，所以希望大家不要过分的依赖地图以增加出双的机率，出不出双全是系统随机，个人运气而已。\n", "source": "幻灵官服宝典"}, {"idx": 313, "orig_path": "【爱宠区】->讲讲宠物炼化", "orig_data": "1。宠物炼化不减成长的，它不减忠，不减3围总点（实际上是差1点，有时是多1点，有时是少1点），也不影响炼后3围的实际成长（也就是攻原来1级+2炼后还是1级+2），不过影响幻化后的3围分配。 \n2。怎样按需要炼化 \n（1）加攻：买把武器来炼上去，然后同宠物炼 \n只加攻 炼出的是把宠的防和敏加到攻上去 敏防都减 \n+攻+敏的武器 炼出的是把宠的防加到攻上去，敏保住，只波动1~2点 \n+攻+防的武器 炼出的是把宠的敏加到攻上去，防保住，波动1~2点 \n（2）加防：买衣服 \n只+防 只+防 敏攻全减 \n+防+敏 保敏+防-攻 波动1~2点 \n+防+攻 保攻+防-敏 波动1~2点 \n（3）加敏：买鞋子 \n只+敏 只+敏 攻防全减 \n+敏+防 保防+敏-攻 波动 \n+敏+攻 保攻+敏-防 波动 \n3。关于炼化的位置 \n（1）装备都按属性放 \n武器放火位（9点）；衣服金位（11点或12点）；鞋子水位（3位） \n（2）宠物也按属性放调整的最多 \n不过如果你用鞋加水系宠的敏 \n那把宠放水位，装备自己看吧~：） \n土系（5点）木系（1点或7点） \n4。关于调整的幅度宠物在一定等级能调整3围幅度是有限制的 \n比如说宠物100级你炼武器把100的防炼到攻上去了，然后你再用几个毒把武器炼上去再和宠物炼，还是只能调整100，就是到了100级的攻极限；不过当宠等级到了101时又能调整一点点 \n5。关于减一加二 \n需要两件纯装备来煅 \n举个例子，想去攻+防+敏，就要煅一个衣服，煅一个鞋子 \n然后把宠扔炉里，装备各就其位（如衣服金位），宠最好占属性位，如果属性位被装备占去，用相生位，也被占就随便呗 \n\nOVER……", "source": "幻灵官服宝典"}, {"idx": 314, "orig_path": "【爱宠区】->野生宠物单属性坐标", "orig_data": "很老的话题了，以前整理过，不知道怎么没了，现重新整理过，希望对大家有所帮助，条件所限，所有坐标并没有一一验证，有什么疏漏和错误，欢迎指正 \n注：所有宠物等级均为约数 \n\n水系  \n盈盈   堕泪岗    (27,18)— 35级 \n红刀   聋耳地狱  (34,22)— 85级  \n琳琳   剑池谷    (41,37)— 150级 \n欧欧   独木原    (29,22)— 180级  \n硬骨鳄 东码头    (28,09)— 225级 \n骑士龟 西码头    (59,86)— 250级 \n蓝牙   不归海岸  (47,32)— 270级 \n珍珍   吓死人洞2 (38,66)— 320级 \n铁甲龟 炮络地狱  (27,50)— 470级  \n摇爷   碾肢地狱  (33,48)— 400级 \n大嘴鳄 镜雪原    (39,55)— 430级 \n厚皮鳄 净沙原    (58,32)— 450级 \n闲情园90级的盈盈，70级的铁甲龟（坐标：全部） \n地狱禁地1500的绿衣仙子（坐标：全部） \n观日桥59级的厚皮鳄，70级的铁甲龟（坐标：全部） \n明月桥50级的大嘴鳄，60级的铁甲龟（坐标，全部） \n西码头250级的大嘴鳄和骑士龟（坐标，全部） \n斧青谷 350骑士龟 380盈盈 \n镜雪原 430大嘴鄂(39.55) 400铁甲龟　　 \n冰清桥 450-500嘎嘎 480-515摇爷 　 　  \n玉 \n\n中级灵兽师       50万      忠诚 85  \n\n高级灵兽师      100万      忠诚 90  \n\n飞5转养宠抓起的宠物忠诚度85W。。。 \n\n", "source": "幻灵官服宝典"}, {"idx": 316, "orig_path": "【爱宠区】->进化幻化全攻略", "orig_data": "一、进化： \n1、宠物多少级进化才好，考虑勋章与满血奖励的话，推荐1200-1250进化。一般认为，500-800级进化很难得到勋章，800-1000级进化得到一个，1000-1200进化得到2个，1200以上得到三个。 \n\n2、在哪里进化好呢，根据天晴提供的资料，个人认为，为保证不产生变异，应去与宠物属性相生的地图进化，而要想增加变异几率，有两种方法，一是去相克地图，理论上比其他地图容易变异，另一种是去兄弟天关70，变异机率又会提高许多。（地图属性见附录） \n\n3、进化时的装备：进化的时候，装备不会被系统收走，所以，考虑到进化后容易练些，一般是戴+150防御的手镯或者+120防120敏的环。 \n\n4、什么样的进化是正常的呢，一般玩家认同这个公式：进化前成长/10+（进化后标准成长-进化前标准成长）+满血奖励，普遍认为是0.5。 \n\n5、注意事项：偶听到一种说法，即进化前把宠物放到配偶的身上，成长容易加的多一些。另外，进化时身上尽量不要带与之属性相克的宠物，不知道是不是真的，也发出来请大家验证。并且，无论进化前伤害度是多少，进化后都会变为1。 \n\n\n二、幻化 \n1、 主宠和副宠的选择，主宠用什么，完全看自己的喜好了，而副宠一般使用地藏或者白发。（在这里要说的是，主副相克，是没有关系的，幻出的宠物的成长主要受地图影响。）而在这两种中，非常多的人是用地藏的。这是因为，首先，地藏的初级形态啉啉，可以在夫妻天关获得，并且成长比较好，而白发的初级形态，除了每年一次的端午节会有“免费”的，一般是靠8元宠卡获得，成长的往往不如啉啉，不是十分经济实惠，其次，地仙劫比夜叉劫容易，也比较近。至于其他副宠的选择，除非经常买年卡，钱多的没处花，可以考虑用啊弟之外，一般都没有更好的选择了。 \n\n2、主宠和副宠的级别，为保证100%成功，主宠的级别相对要高些，由于满血奖励，主副都推荐1200-1250级。其中，有幻化优先级别的影响（可进化宠终极状态优先于可进化宠二进状态优先于可进化宠1进状态优先与可进化宠初级状态优先于不可进化宠），配合地图的属性（见附录），成功率达到100%时主宠的级别也有所区别。这里只举几个简单的例子，终极宠物和不可进化的宠物幻化，主副都是301，也可达到100%，同属性的可进化的宠物和进化2次或终极宠物幻化的几率比不同属性的高10%，如蝴蝶或者鱼同仙子或地藏只需要850级，在金属性的地方是100%，但是，无论副宠再如何优先，只要主宠级别提高10，成功率就增加1%。 \n\n3、幻化代数的计算，没有幻化过的宠物简称为0代，幻化过1次的为1代，2次的为2代，3次为最终形式，不可以再幻化了。下面是公式：0代和0代幻化出来为1代，简称0＋0＝1；0代和1代幻化出来为2代，简称0＋1＝2，2个1代幻化，同样得到的是2代，也就是1＋1＝2（比0＋1得到的宠物成长要高很多喔）；0代和2代幻化得到的是3代，即0＋2＝3，1代和2代幻化得到的也是3代，即1＋2＝3，而2个2代幻化得到的也是3代,即2+2=3，这时宠物成长达到最高，也不可以再进行幻化。 \n\n3、幻化时所在地图的影响，与主宠相生的地图，成功率会增加，相克的地图，成功率会降低。 \n\n4、幻化时戴的装备：根据天晴的资料，幻化时所戴装备所加属性会影响幻化后宠物4围属性，简单说就是，幻化前戴的装备是加攻击的，幻化后攻击会提高一点，另两方面成长会有下降，其他同理。但，总成长是不变的。一般来说，大家喜欢用减血装备，这样有利于提高另外三围的生长率。需要注意的是，幻化后装备可是会不见的喔。 \n\n3、成长公式：主宠成长低于副宠时，幻化出的最低成长大约是：主宠成长50％＋副宠成长的50％；当主宠成长高于副宠时，幻化以后的宠物最低成长大约是：主宠成长的95％＋副宠成长的5％，但是由于有满血奖励，一般会比计算高出1左右。 \n\n3、勋章和技能继承，根据官方攻略，幻化出的宠物可以继承主宠全部的勋章和副宠一半数目的勋章（需要取整），并继承主宠的全部技能。 \n\n4、双胞胎：幻化成功率越高，幻化代数越高，得到双胞胎的几率越小，但不是一定不会出（有种看法认为，地图有一定影响）。 \n\n\n附录：地图属性 \n\n金属性：天空之城 \n金生水，适合幻化水属性的宠物 \n\n木属性：南方 \n指从栖月谷向南，榕盘谷-暮归道方向，到逆之 ...该卷使用后+50点锻造经验 \n上面记录的秘方为： \n正气甲乾金、正气甲兑金、象牙震木、龙鳞坎水、鳄鱼骨离火、霸王钳艮土,主炼乾位正气甲,即可得到正气战衣 \n正气战衣属性：+生命400 +内力2000 -攻击100 +防御300 +敏捷100 2万修行等级用(此处用到2件正气甲,不是错误) \n\n坎卷：带本佛经,和一件自己锻造的1000修行加敏1000以上的靴子,到凰之谷(42,70)天机星换得坎卷....该卷使用后+60点锻造经验 \n上面记录的秘方为： \n龟壳乾金、霸王钳兑金、象牙震木、人鱼之泪坎水、凤凰羽翼离火、龙鳞艮土，主炼乾位龟壳，即可得到宠物[谨慎]技能书 \n\n巽卷：带着村民衣(九转天心丹任务物品)、白色绣球花(雪狼湖任务物品)、妖怪内丹(名剑山庄除妖任务物品)找山城的巧匠凌风,可换得巽卷....该卷使用后+70点煅造经验 \n上面记录的秘方为： \n玄武丹乾金、穿云丹震木、柔肠丹坎水、神凰丹离火、青龙丹艮土,主炼乾位,可得锻造效果相当于五个顶级毒药的蓝水晶 \n\n乾卷：在规定时间内去单人天关、夫妻天关、兄弟天关找归隐的将军楚青鸿购买...具体出现地点为单人天关90关(0点－12点), 夫妻天关第25关(12点－18点),兄弟天关的70关(18点－24点)  该卷使用后+80点煅造经验 \n上面记录的秘方为： \n紫阳丹放于乾金、无极草震木、冰石坎水、无忧失心草离火、千年灵芝艮土,主炼乾位,可得提升人物功力的升级圣药通玄丹(该物品可以提升人物等级10级) \n\n收集齐八卷,放入五行炉中相应位置,主炼乾位,得到鲁公秘录,使用后锻造经验+1000点... \n\n秘方中各个材料来源： \n龟壳：坠泪岗战斗掉物品(45,25)(39,8)(37,17) \n龙鳞：吓死人洞2层战斗掉物品(11,29) \n狼爪：踏雪原战斗掉物品(59,73) \n凤凰羽翼：凰之谷战斗掉物品(33,55) \n鳄鱼骨：东码头战斗掉物品 \n象牙：西雪岭战斗掉物品(27,35) \n霸王钳：不归海岸战斗掉物品 \n人鱼之泪：带着\"乒乓鱼任务\"物品的人鱼项链,到海底城找人鱼三公主(34,44)交换得到  \n", "source": "幻灵官服宝典"}, {"idx": 325, "orig_path": "【锻造区】->鲁班秘籍所记载的特殊装备和物品的炼法", "orig_data": "兑卷（10点）：霸王钳艮位，凤凰羽毛离位，龙麟艮土，象牙震木，佛经乾金，主练佛经，得到震卷秘录。 \n\n离卷（20点）：皂角鞋坎水，狼爪离火，霸王钳震木，龙林乾金，鳄鱼骨艮土，主炼皂角鞋，即可得到狂狼战靴。-100生命，+1000内力，-50攻击，+500敏捷的鞋子。 \n\n震卷（30点）：人鱼之泪坎水，凤羽离火，象牙震木，龟壳乾金，水纹坠艮土，主炼水纹坠，得到长命锁。+300血，-50攻的800级头饰（右）。 \n\n坤卷（40点）：玄金镯震木，人鱼之泪坎水，狼爪离火，龟壳乾金，龙鳞艮土，主炼玄金镯，得磐龙樽。+200生命，+230防御，+200敏捷，修行19200的头饰（左）。 \n\n艮卷（50点）：正气甲12点（主）正气甲11点,鄂鱼骨9点,象牙7点,霸王钳5点,龙鳞3点.正气战衣，+400生命，+2000内力，-100攻击，+300防御，+100敏捷，修行19200的衣服。 \n\n坎卷（60点）：龟壳乾12金,霸王钳兑11金,象牙震7木,人鱼之泪坎3水,凤凰羽翼离9火,龙鳞5土,主练龟壳乾12金,可得到宠物谨慎枝能. \n\n巽卷（70点）：玄武丹乾位,穿云丹震位,柔肠丹坎位,神凰丹离位,青龙丹艮位,主练乾位,得到相当于五个顶级毒药的蓝水晶。 \n\n乾卷（80点）：紫阳丹放乾金、无极草震木、冰石坎水、无忧失心草离火、千年仙芝艮土，主炼乾位。得升级药。 \n\n飞锻造的时候拿到的秘录：鳄鱼骨放金，11、12点。凤凰羽毛放火，9点。布鞋放水。3点。布鞋主练，得到凤凰战靴。-280防御，+500敏捷，修行800的鞋子。 \n\n龟壳——坠泪岗战斗奖励。（45，25）（39，8）（37，17）  \n龙鳞——吓死人洞2层战斗奖励。（11，29）  \n狼爪——踏雪原战斗奖励。（59，73）  \n凤凰羽翼——凰之谷战斗奖励。（33，55）  \n鳄鱼骨——东码头战斗奖励。  \n象牙——西雪岭战斗奖励。（27，35）  \n霸王钳——不归海岸战斗奖励。（62，67） \n人鱼之泪——拿乒乓鱼任务物品的人鱼项链，到深蓝海城找人鱼三公主（34，44） 交换得到。 \n\n至此，所有的东西偶想都全了！在此感谢yinplaying和davids朋友，让我写全了这些配方。 \n\n最后，我还是开始的一句话，与人方便，与己方便，嘻嘻…… \n\n", "source": "幻灵官服宝典"}, {"idx": 326, "orig_path": "【锻造区】->煅造新手入门、煅造基础知识", "orig_data": "一  如果你的炼化经验还是0，那么请点击这里 \n\n二  一些基础知识 \n<所谓“连炼”：1000炼化经验=6连炼、1200炼化经验=7连炼、1500炼化经验=8连炼> \n\n1   五种装备五行属性：武器（火）防具（金）鞋（水）身饰（木） 头饰（土） \n     通常我们也叫身饰为 内带或左饰 ；叫头饰为 血佩或右饰 \n     通常也把五行炉的位置叫做 1点、3点、9点、12点 之类的<拿起手表或看看时钟就知道了 ^_^> \n      \n\n\n\n2   宠物 + 装备 = 宠物的三围调整 （最好装备等级是宠两倍以上的） \n如果想加防减敏攻击不变   推荐使用逍遥战衣炼化到20W修行，再和宠物煅造 \n如果想加攻击减敏防不变   就用加防的武器做原料 或 高等级的武器加低等级的衣服 \n如果想加敏减攻击防不变   就用加防的鞋做原料 或 高等级的鞋和低等级的武器 \n\n如果想单加、其他的不管   就用加单属性的装备原料 \n如果攻、防都要加         推荐用武器和衣服一起来锻造宠物 \n\n\n3   宠物 + 宠物 = 装备、药物、暗器 \n宠物要炼化成装备时，根据宠的属性放在乾坤五行炉的对应位置 \n乾、兑位煅造出衣服    离位煅造出暗器   坎位煅造出鞋子   其他两方位出的均为饰物 \n\n例如：主炼方位出的物品 \n\n金属性宠（主）+ 宠 = 加血的药 \n木属性宠（主）+ 宠（离） = 内药 （放在左下）= 出饰品加内（或防且同副宠有关） \n水属性宠（主）+ 宠 = 毒药 \n土属性宠（主）+ 宠 = 加血的头饰 \n\n\n4   各种装备的属性原理（攻、防、敏、血、内） \n衣服：减内 |  如果想要给衣服加内、必须找件原始就+内的衣服  \n武器：减防 |  如果要给武器加防、必须找原始就+防的武器 \n鞋子：减功  \n身饰：减血 |  要给身饰加血、同样必须找原始+血的身饰 \n头饰：减敏 |  同上说法、目前有恋之守护+30敏的和绝版的思念发钗+50敏的 \n\n\n5   药物和暗器 = 更好的药物、暗器 \n-5000毒药练法 = -100毒 + 暗器重复炼得到 \n+20000内的药 = 林天的玉佩 + 止血草（只要是身饰都可以） \n+20000生命20000内的药 = +20000内的药（坤）+暗器（离）= +20000血20000内的药 \n\n\n6   极限、超极限；极限的煅造方法 \n衣服、武器、鞋子：3168      头饰、身饰：4251 \n半极限装备 + 半极限装备 = 超极限 （用处不大） \n\n衣服放11点、毒药放12点、其他炉位全放暗器 \n武器放9点、毒药12点、其他炉位全放暗器 \n鞋子放3点、毒药12点、其他炉位全放暗器 \n头饰放6点、毒药12点、其他炉位全放暗器 \n身饰放2点、毒药12点、其他炉位全放暗器 \n\n\n7   如何降修及降修的含义、如何微调装备的属性 \n->不管衣服、鞋子、武器、头饰还是身饰，降修行都是用草药或银两（通常都用止血草；加血效果越少的，降的程度越大） \n\n降修的含义： \n衣服降修 = 给衣服降防 <衣服9点、草12点> \n武器降修 = 给武器降攻 <武器12点、草9点> \n鞋子降修 = 给鞋子降敏 <鞋子9点、草12点> \n身饰降修 = 给身饰降内 <身饰9点、草12点> \n头饰降修 = 给头饰降血 <头饰9点、草12点> \n\n\n->微调： \n简单的说就是用毒量不高的毒药与装备炼化，一般都是用药店里卖的毒药(自己炼化毒量不高的毒药也行)； \n在我们成功炼化出一件装备时，通常要降到自己需要的等级 \n\n打个比方： \n你已经成功煅造出一双 -1995攻 -300防 +6651敏的鞋子 \n你要把它降到1000级使用，鞋子放9点、止血草放11点，循环炼之 \n会得到一双 1000级 +2600敏 -1995攻 -300防 的鞋子 \n而+2600敏并不是1000级的最佳敏捷 \n此时你要到药店买一个毒药，鞋子放3点、毒药放12点，循环几次 \n就会得到一双1000级 +2694敏 -1995攻 -300防 的鞋子(1000级最佳敏捷) \n", "source": "幻灵官服宝典"}, {"idx": 327, "orig_path": "【锻造区】->+6994血，+233防太乙珠招人用PK右饰 （90万满修PK装备）", "orig_data": "2.太乙珠\n1:减敏过程 第一步,加血到3985,加第一个极限鞋.====>减敏132. 第二步.加血到4948,加一个加敏2050左右的半成品鞋子,====>减敏164. 第三步,加第一个极限血饰,然后再加第二个极限鞋子.====>减敏215. 第四步,加第二个极限血饰,再加一个加敏1900左右敏的半成品鞋子.===>减敏231 第五步,加第三个极限血饰,再加一个加敏1000左右敏的半成品鞋子.===>减敏233. 2:加防 同理于长命锁,把太乙珠的血加极限6994,然后连续砸上5个极限衣就OK了.加防233.\n", "source": "幻灵官服宝典"}, {"idx": 328, "orig_path": "【锻造区】->+7065血，+235防丹凤钗招人用PK右饰（90万满修PK装备）", "orig_data": "1.丹凤钗\n1:减敏过程 第一步,加血到4017,加第一个极限鞋.===>减敏133. 第二步,加血到5010,加一个加敏2096的半成品鞋子.===>减敏167. 第三步,加第一个极限血饰.加第二个极限鞋子.====>减敏218. 第四步,加第二个极限血饰.加一个加敏1812的半成品鞋子.===>减敏233. 第五步,加第三个极限血饰.加一个加敏1010左右的半成品鞋子.===>减敏235. 2:加防 加血到极限7065,然后连续砸上5个极限衣,加防235.", "source": "幻灵官服宝典"}, {"idx": 329, "orig_path": "【锻造区】->-732血，+7332内，+244攻内人用黯神灵戒左饰（90万满修PK装备）", "orig_data": "黯神灵戒\n(一)减血732的数据..\n清掉原来的1000血,把左饰放1点,水城珠宝店的水坠纹放6点,1点主炼. \n1:直接加内到4170,加第一个极限血饰======>减血417.\n2:直接加内到5268,加一个加血2580的半成品血饰.=====>减血525. \n3:加第一个极限内带===>加内7053,然后加第二个极限血饰=====>减血678. \n4:加第二个极限内带===>加内7278,加一个加血2415的半成品血饰===>减血726.. \n5:加第三个极限内带===>加内7326,加一个加血918的半成品血饰===>减血732.. (二)90W修加攻的数据.. 加攻的极限是244,把做好减血732的左饰直接加极限内带把内加到极限. 然后加极限武器加攻到不能加为止.(不能降修加攻..) 当然了,其实要不要把攻加到极限是根据个人的红利点和所用招的大小而定的. 没必要一定要把攻加到极限.\n\n\n", "source": "幻灵官服宝典"}, {"idx": 330, "orig_path": "【锻造区】->-666血，+6666内，+222攻内人用普通左饰（90万满修PK装备）", "orig_data": "1.锦腰带为原料\n1:把一般的内带加内到3780，加个极限血，得到-378血+3780内的左饰（内1点血5点）。 \n2：把内加到4629，加个极限血，得到-462+4629内的左饰（位置同上）。 \n3：给-462+4629内的左饰加个内带（内7点，减血内带1点），在加个极限血得到-612+6408内的左饰。 \n4：再加极限内带，用极限血佩减血，方法如（3） 得到-660血+6612内的左饰。\n5：最后在加个极限内带加内，用半成血减血（注：这里不用极限血了,+900血的就可以了）。 \n6：然后就用极限内带把减好血的身饰的内加到极限，最后直接用极限武器砸，攻的极限是222。\n当然了,其实要不要把攻加到极限是根据个人的红利点和所用招的大小而定的. 没必要一定要把攻加到极限.\n", "source": "幻灵官服宝典"}, {"idx": 331, "orig_path": "【锻造区】->+2289血，+5985内，-878攻，+668防，+2927敏内人用鞋（90万满修PK装备）", "orig_data": "材料：极品内血鞋1双、轻布衣1件、2391防的半极限衣服1件、极限衣服7件、极限鞋子1双、军刀1把。\n制作方法如下： 鞋子3点，衣服12点 \n1、 将鞋子降敏到敏0，+水城最便宜的轻布衣、得到+2289血5985内-1995攻0防0敏的鞋子； \n鞋子9点，衣服12点 \n2、 直接加第1件极限衣服，得到得到+2289血5985内-1995攻213防1051敏的鞋子； \n3、 直接加第2件极限衣服，得到+2289血5985内-1995攻352防1272敏的鞋子；\n鞋子3点，衣服12点 \n4、 直接加第3件极限衣服，得到+2289血5985内-1995攻432防1834敏的鞋子； \n鞋子11点， 例如27000修，主要用处是内装，用来超越内人的极限\n\n做个无敌内人：）\n", "source": "幻灵官服宝典"}, {"idx": 349, "orig_path": "【锻造区】->内血武器的铸造最佳过程", "orig_data": "先和大家谈谈关于加血和加内的原理，加血加内，主要问题是寻找最佳点，我上次也谈到\n\n过，关于最佳点的理论研究，我以后总结和大家一起讨论，另外我希望广大的朋友和我一\n\n起研究，我希望得到大家的支持，另外一个论坛是大家的，没有大家的支持，再好的文章\n\n还是被淹没，呵呵：）\n\n好了，小步废话不多说了，我现在以铸造内血剑来做说明，另外和大家强调一点，是先加\n\n内还是先加血都影响到最终的结果，在内血鞋子里，我是用先加内做说明的，这里也一样\n\n先加内，再加血，那有人问到，为什么需要先加内呢，我做说明，内血鞋和内血武器都是\n\n适用于点穴，做内人的最好帮手，先加内的好处，是内可以点数比先加血多，这个大家可\n\n以去实验的，慢慢体会，另外这里以—100敏捷的剑做材料来说明，其他的武器，可以参\n\n考这个做法，不会相差很大的结果，基本做法一样：）\n\n（一）武器的加内\n\n1，准备工作：极品攻击武器一把，10极限带子，1极限武器\n\n2，武器修到200，加第一个极限带子，武器9点，带子7点，\n3，武器修到200，加第2个极限带子，位置同上，\n4，武器修到200，加第3个极限带子，位置同上，\n5，武器修到900或者1000，加第4个极限带子，位置同上\n6，武器调整到：左状态，加第5个极限带子，结果是右状态\n7，武器调整到：左状态，加第6个极限带子，结果是右状态\n8，武器加第1个极限武器成左状态，加第7个极限带子，结果是右状态\n9，以下是加极限带子，位置同上\n加第8个极限带子\n加第9个极限带子\n加第10个极限带子\n\n到现在已经不能再加内力了，到极限了，如果是想做内敏鞋子，现在就\n\n可以用草药降修，一般来说，武器内力的极限不会超过3950，对于具体\n\n是剑还是刀等，材料不同，稍微有点偏差：）\n\n（二）内血武器的制作\n\n1，准备工作：极品内攻武器一把，10极限头饰，1极限武器\n\n2，内攻武器调整到左状态，加第一个极限头饰，武器9点，头饰5点\n3，内攻武器调整到左状态，加第2个极限头饰，武器9点，头饰5点\n4，内攻武器调整到左状态，加第3个极限头饰，武器9点，头饰5点\n5，内攻武器铸造到极限成左状态，加第3个极限头饰，武器9点，头饰5点\n6，给武器加第1个极限武器，成下图状态\n从现在开始一直给上面得到的武器加极限头饰，位置武器9点，头饰5点\n加第4个极限头饰\n加第5个极限头饰\n加第6个极限头饰\n加第7个极限头饰\n加第8个极限头饰\n加第9个极限头饰\n加第10个极限头饰\n到现在加血已经到极限了，不能再加了，武器加血加内的极限是个变数，主要是\n\n看加内多少或者加血多少，还有先后的问题，很复杂，我想一般人可以参考我的\n\n做法，不需要再这个问题上做很多的考虑，另外对于极限问题，我会以后专门和\n\n大家一起研究：）\n\n7，给武器降修，我是降到武器攻击为0 ，成下图，这是个样品\n大家有比这个更多的血内点的，希望能提供出来，大家一起研究", "source": "幻灵官服宝典"}, {"idx": 350, "orig_path": "【锻造区】->减70敏刀血内敏刀制作过程", "orig_data": "刚做的血内敏刀~把加血内敏的过程发出来~方便大家一下~\n材料减敏70的刀~沙城有卖~\n步骤一加内:\n按照精华理的方法将刀做到减防1896~\n降等级至200级 加一个极限内带得到加699内的刀 内带1点刀3点\n降等级至200级 加一个极限内带得到加1398内的刀内带1点刀3点\n降等级至200级 加一个极限内带得到加2097内的刀内带1点刀3点\n然后一直内带1点 刀9点极限带加到3090内~\n听说可以到4000内~个人原因没有做到极限~\n步骤二加血:\n降修行到49800加极限血配得到加血1830血得刀~\n加攻击到2800加极限血配得到加血2400左右的刀~\n加攻击到3100加极限血配得到加血2833的刀~\n加攻击到3200加极限血配得到加血2960左右的刀~\n这时候加一个极限武器~\n然后一直加血配血加到3897这时候是加血的极限了~\n步骤三加敏:\n武器9点~极限鞋3点~一直加敏就可以~我的加到315~4W修行~敏还可以加", "source": "幻灵官服宝典"}, {"idx": 351, "orig_path": "【锻造区】->—70敏捷刀制作的最佳过程", "orig_data": "准备：沙城买—70的刀一把，极限武器5把，极限衣服20\n\n1，54次           —462防\n2，72次            —730\n3，66次             —921\n4，64次            —1068\n5，63次            —1185\n6，62次            —1285\n+第一把极限武器（主武器9点，极限武器7点）\n\n给得到的武器减防御，武器9点主位，衣服12点，到御览加极限衣服减少的防御少于30\n\n+第2把极限武器，位置同上\n\n和上面一样，加极限衣服如果减少的防御少于30\n\n+第3把极限武器\n\n一直等防御—1897\n\n就完成了这把武器的铸造\n", "source": "幻灵官服宝典"}, {"idx": 352, "orig_path": "【锻造区】->-70敏捷刀具体最新数据", "orig_data": "-70敏捷刀具体最新数据\n找了好久就是没有具体数字表示的-70刀的做法，步兄的次数表示~~我看起来累\n\n呀，呵呵 今天做了一把，把数据发上来，欢迎高手给予指点一下。\n\n01。+1393攻     -416敏   第1个极限甲\n\n02。+2354       -706       第2个极限甲\n\n03。+3019        -905      第3个极限甲\n\n04。+3515        -1054    第4个极限甲\n\n05。+3907        -1172    第5个极限甲\n\n06。+4234        -1270    第6个极限甲 （以上2-6步感觉功和 防都少了）\n\n07。+4508        -1352    第7个极限甲 这一步并没有加极限武器提功，而是参照survivor在《原创]醉剑减防加敏（极品攻敏剑）锻造过程及详细数据》中的做法，直接加毒药煅到的。\n08。+5780        -1352    第1个极限武器（在+极限武器之前，我用毒药煅到+不动攻后，才+的极限武器。）\n\n09。+5780        -1458    第8个极限甲 \n\n10。+5780        -1513    第9个极限甲 \n\n11。+5780       -1569     第10个极限甲 \n\n12。+5780       -1627     第11个极限甲 \n\n13。+5780       -1685     第12个极限甲 \n\n14。+5780       -1734     第13个极限甲\n    \n15。+6162       -1734     第2个极限武器\n\n16。+6162       -1786     第14个极限甲 \n\n17。+6162       -1840     第15个极限甲 \n\n18。+6268       -1840     第16个极限甲 \n\n19。+6268       -1880     第17个极限甲 \n\n20。+6308       -1880     第3个极限武器\n\n21。+6308       -1892    （+2200多的防衣）\n\n22。+6320       -1892     第4个极限武器\n\n23。+6320       -1896（+1200多的防衣 估计1000左右就可以）\n\n24。+6324       -1896     第5个极限武器\n\n25。+6324       -1897（+1100多的防衣 ）\n\n合计材料：极限武器5个   极限甲17个  半成品+2200防1个   1100防2个\n", "source": "幻灵官服宝典"}, {"idx": 353, "orig_path": "【锻造区】->-70刀 做敏血刀的最新数据", "orig_data": "材料 沙城购买-70刀 锻造到-1897防御 +6324的纯攻刀 一把\n\n1。武器6点       +极限鞋\n    +4132攻      +152敏\n\n2。武器6点      +极限鞋\n     +3318          +557\n\n3。武器9点（以下武器9点）+极限鞋\n     +2710          +821\n\n4。锻造到+攻4244      +极限鞋\n     +3313          +993\n\n5。锻造到+攻4052   +1771鞋\n     +3507          +1039\n\n6。锻造到+攻4011   +1542鞋\n      +3625 856\n这里加把武器：\n6314，加极限甲-1894\n这里加把武器：\n6352，加极限甲-1905\n后面加个极限武器，再加1000防以上衣服的就可以了\n应该要再加3次的。\n分别减1908.1909.1910\n最后完成了。不追求完美的朋友不建议做后3步\n", "source": "幻灵官服宝典"}, {"idx": 356, "orig_path": "【锻造区】->-1910防的极品纯攻剑各修行纯点参考", "orig_data": "特别申明：本文系偶根据老步发表的纯点计算的文章总结而来，我只是做做加法运算而已。目的是想方便大家以-1910防的极品纯攻剑作为原料，锻造有其它附属属性的武器提供方便~~\n\n注意：所列纯点是把敏清零以后的结果，如果不把敏清零，只需要在所列纯点基础上再加100。\n\nPS:毕竟想做大内高手的还是少数。大家PK都喜欢那种把对手打得满地找牙的快感~~从实用的角度考虑，还是做加敏武器的玩家比较多。\n\n修行                      纯点\n\n1000                      2309\n3000                      2319\n3500                      2329\n4000                      2339\n4500                      2349\n5000                      2359\n5500                      2369\n6000                      2379\n6500                      2389\n7000                      2399\n7500                      2409\n8000                      2419\n\n9000                      2429\n10000                     2439\n11000                     2449\n12000                     2459\n13000                     2469 \n14000                     2479\n15000                     2489\n16000                     2499\n17000                     2509\n18000                     2519\n19000                     2529\n20000                     2539\n21000                     2549\n22000                     2559\n23000                     2569\n24000                     2579\n25000                     2589\n26000                     2599 \n27000                     2609\n28000                     2619\n\n31000                     2629\n34000                     2639\n37000                     2649\n40000                     2659\n43000                     2669\n46000                     2679\n49000                     2689\n52000                     2699\n55000                     2709 \n58000                     2719\n\n63000                     2729\n68000                     2739\n73000                     2749\n78000                     2759\n83000                     2769\n88000                     2779\n93000                     2789\n98000                     2799\n103000                    2809\n108000                    2819\n\n118000                    2829\n128000                    2839\n138000                    2849\n148000                    2859\n158000                    2869\n168000                    2879\n178000                    2889\n188000                    2899\n198000                    2909\n208000                    2919\n\n218000                    2929\n228000                    2939\n238000                    2949\n248000                    2959\n258000                    2969\n268000                    2979\n278000                    2989\n288000                    2999\n298000                    3009\n308000                    3019", "source": "幻灵官服宝典"}, {"idx": 357, "orig_path": "【锻造区】->锻造969敏3150内2100血PK剑的数据", "orig_data": "[原创]临界\n\n\n原材料为-1910防的极品纯攻剑\n\n微调至3364攻 加了第一双极限鞋子 敏点为890 \n\n微调至3987攻时加了第二双极限鞋 敏为915攻3004 （感觉这一步攻加小了浪费了鞋：）\n915敏3004攻时加了第一把极限剑 加第三双极限鞋 969敏 3232攻\n\n（但我觉得969敏不是极限 但是这时再加极限剑提攻也不能获得更高的敏点，我听人说剑有加1000多敏的。如果有更好的朋友可以发数据来研究）\n\n降修至400级加第一个极限带 内力699攻击2675\n\n降修至600级加第二个极限带 内力1398攻击2445\n\n将攻击微调至993加第三个极限带 2046内 2282攻\n\n将攻击微调至1934加第四个极限带 内力2400攻击2668\n\n将攻击微调至2436加第五个极限带 内力2649攻击2796\n\n将攻击微调至2656加第六个极限带 内力2862攻击3180\n\n将攻击微调至2988加第七个内力带 内力3036攻击3451\n\n再加第八个极限带 内3180攻击3534 （感觉应该加个极限武器再加内带）\n\n内3180攻击3753 这时内已经加到极限了 至少我是加不上去了（我一不小心晕了 直接给链了 内减到了3138哭）\n\n微调至1422-1425攻击，加第一个极限血饰，血1278\n\n加第二把极限武器 微调至1872攻击，加第二个血饰，血1683\n\n此时：561（1683/3）+969+1050（3150/3）=2580 具体的等级数据我不太清楚，在这一步我想减到0攻的话最少5000级就可以使用了。\n\n然后又加一把2488攻击的剑 加第三个血饰得到 1824血 2571攻\n\n最后又加第四个个极限血饰 得到2100血 2571攻 -1910防 3150内的敏内血剑 我觉得做到这里很漂亮 就停手了 （其实是我修不高 如果修够高的话就继续加血吧） ", "source": "幻灵官服宝典"}, {"idx": 358, "orig_path": "【锻造区】->醉剑减防加敏（极品攻敏剑）锻造过程及详细数据", "orig_data": "[原创]survivor \n\n这篇文章是我参考几位锻造高手的文章，经过自己实践总结而成。本来数据昨天应该可以出来的，可是我加敏微调的时候练成暗器（$#%&^%^&$^*&），郁闷~~~\n不过，在这里还要特别感谢榕榕，他及时提供了一把醉剑给我，使得这篇文章可以在今天跟大家见面~~\n\n第一步，锻造极品攻剑，共需要醉剑1把，极限剑7把，极限甲18件，+1000防以上的衣服2件\n\n\n01、1388       B,  中部\n35. 歌德名著<浮士德>的体裁是什么                     A,  诗剧\n36. 光脸鲷是一种会发光的鱼,它的发光器位于身体什么部位                                                                         A,  眼窝下方\n\n37. 2002年中国女足在哪个国家举行的阿尔加夫杯国际女足邀请赛中夺冠军                                                                                   C,  葡萄牙\n38. <神农本草经>中共收药物多少种                     C,  365种\n39. 人体的平均面积是多少                             B,  2平方米\n\n40. 2002年2月14日国际中足联公布了各国球队的排名,中国队第几位?                                                                                   D,  53位\n41. 目前我国共有70多条国道,最长的是哪一条             C,  318国道\n42. 断桥残雪放眼前(猜一字)                                               B,  霜\n\n43. 堪称目前上海室外最大的\"中国结\"的高度为多少米       B,  6米\n44. 电灯泡中充入一种什么气体可起到保护作用?                   B,  氮气\n45. 世界上第一列永久性人工心脏植入手术使得病人依靠人工心脏活了多少天?                                                                                   D,  112天\n\n46. 我国最早使用军鸽是在哪个时代                    A,  西夏\n47. 17世纪的西印度公司是哪个国家在对外殖民扩张建立的 D,  荷兰\n48. 18世纪的英国国会一共通过了多少圈地法案           C,  3500多件\n\n49. 一般情况下,哪种植物的叶子寿命最长?                          B,  冷杉叶\n50. 女画家玉良与潘赞化结婚时的证婚人是谁?                     A,  陈独秀\n51. 煤燃烧时产生的主要污染是什么                    B,  二氧化硫\n", "source": "幻灵官服宝典"}, {"idx": 382, "orig_path": "【修炼区】->如何把名字竖起来", "orig_data": "使用方法： \n1 .下载 本附件的文件\n2 .打开附件文档，里面有许多黑点，复制一个 \n3. 打开宠物属性，随便打个字，再复制一个黑点，再打个字，再复制黑点，按你所需的字数，依次循环即可 \n4 .创帮也是同样的道理，一样的方法 \n5 .创帮派最好先在宠物栏测试下效果，然后在复制入闯帮属性中  \nhttp://attachment.bbs.91.com:10800/Storage/PostAccessory/2009-01-08/8b8ae15a-c3c3-4930-87b7-dac7fa6dbe4b.rar\n【小黑子】", "source": "幻灵官服宝典"}, {"idx": 383, "orig_path": "【修炼区】->关于WinXP下幻灵不能进入选择人物画面的解决方法", "orig_data": "关于WinXP下幻灵不能进入选择人物画面的解决方法\n\n创建人物的时候\n\n\n提示无法播放Avi，需要驱动程序\n\n然后幻灵关闭。\n\n\n只要安装了这个软件就可以解决了。\n\nhttp://download.pchome.net/php/dl.php?sid=6263\nIntel Indeo Video 5.1【请点这里下载】", "source": "幻灵官服宝典"}, {"idx": 384, "orig_path": "【修炼区】->黄龙使、飞天鼠变小鸟或鸠的方法及全部宠物和人物的代码", "orig_data": "一、快速做九转，黄龙使、飞天鼠变小鸟法````` \n\n1  备份幻灵目录下的 ani  这个文件夹，做以后恢复用 \n2  在ani 文件夹里，把pet40001.ani复制一个出来，重命名为pet62002.ani再贴回去，就是把黄龙使改成小鸟 \n3  把pet40001.ani复制一个出来，重命为pet41011.ani再贴回去，就是把飞天鼠改成小鸟 \n4  这样就改好了 \n\n\n二、快速做九转，黄龙使、飞天鼠变拂叶鸠法````` \n\n1  备份幻灵目录下的 ani  这个文件夹，做以后恢复用 \n2  在ani 文件夹里，把pet41001.ani复制一个出来，重命名为pet62002.ani再贴回去，就是把黄龙使改成拂叶鸠 \n3  把pet41001.ani复制一个出来，重命为pet41011.ani再贴回去，就是把飞天鼠改成拂叶鸠 \n4  大家说鸠比小鸟快，之此再发表一个！ \n", "source": "幻灵官服宝典"}, {"idx": 385, "orig_path": "【修炼区】->如何使用3行传音", "orig_data": "1.在幻灵目录下的 ini 文件中找到 TxtAction  \n2.查看里面所有动作的词语 \n3.按照里面原来的格式, 自己添加一个进去.... \n4.把发送的形式改成传音, 发送出去就可以了 \n", "source": "幻灵官服宝典"}, {"idx": 386, "orig_path": "【修炼区】->游戏时辰与标准时间对照", "orig_data": "方便大家做任务 \n把古代的时辰和现在的时间贴出来下：\n\n\n子时：夜11点至1点 \n丑时：凌晨1点至3点 \n寅时：凌晨3点至5点 \n卯时：凌晨5点至7点 \n辰时：上午7点至9点 \n已时：上午9点至11点 \n午时：中午11点至1点 \n末时：下午1点至3点 \n申时：下午3点至5点 \n酉时：下午5点至7点 \n戌时：傍晚7点至9点 \n亥时：晚上9点至11点 \n", "source": "幻灵官服宝典"}, {"idx": 387, "orig_path": "【修炼区】->全防人快速练级路径", "orig_data": "说明:为了飞妖MM,用一星期的守护天使卡注册了2个小号,5天练到夜叉1000级.练的是全防人.看到有不少练小号的人或是新人不知道怎么练级,现将自己整理的练级路径提供给大家,希望有所帮助. \n\n注:前提是出征宠是高成长,高防低敏的鸟龙.我本人用的为7.1成长, \n比例约2.8/3.7/0.6.这样不用顾虑鸟龙的防.而且攻足够秒. \n\n地点                Lv怪物                所需防 \n水城外郊         \n3铁甲龟,4琳琳                12 \n                9铁甲龟,10琳琳                24 \n                20铁甲龟,25盈盈                60 \n坠泪岗 \n                30盈盈,35铁甲龟                90 \n                35盈盈(26.19)                85 \n四桥原 \n                40酷刺头,50努努鸟        100 \n枯井原 \n                50拽刺头,60独行                130 \n观日桥 \n                60厚皮鳄,75铁甲龟        150 \n四桥原 \n                70骑士龟,80拽刺头        160 \n明月桥 \n                80大嘴鳄,95铁甲龟        205 \n                95嘟嘟鸟(7,15)                200 \n观日桥头 \n        101拽刺头,106嘟嘟鸟        200 \n                111铁甲龟,116淘淘        240 \n                121拽刺头,136蓝萌萌        270 \n闲情园 \n                111铁甲龟,125盈盈        280 \n剑池谷 \n                150大嘴鳄,161琳琳        370 \n                160琳琳(40,37)                320 \n                166大嘴鳄,181琳琳        380 \n松竹林 \n                190呆刺头(22,11)        360 \n断壁 \n                220独行,227嘟嘟鸟        460 \n                230酷毙象,242琳琳        490 \n东码头 \n                227硬骨鳄(29,10)        460 \n断魂崖 \n                272呆刺头,282琳琳        520 \n赏月谷 \n                343迷你象(50,70)        580 \n榕盘谷 \n                424跷跷鼠(40,28)        740 \n羁马谷 \n                580弹簧鼠(62,45)        850 \n悬台 \n                580淘淘,595衰呆象        1000 \n                595衰呆象(55,55)        1000 \n                606淘淘,626衰呆象        1140 \n华山脚 \n                717淘淘,740跷跷鼠        1320 \n                780淘淘,811跷跷鼠        1540 \n                858淘淘,888跷跷鼠        1640 \n华山腰道 \n        1030琳琳,1050鲁鲁        2290 \n                1090鲁鲁,1120琳琳        2400 \n                1150琳琳,1191鲁鲁        2600 \n华山瀑布 \n        1262截拳道,1302硬骨鳄        3200 \n                1330截拳道,1393硬骨鳄        3500  \n\n", "source": "幻灵官服宝典"}, {"idx": 388, "orig_path": "【修炼区】->“传招 ”详细说明", "orig_data": "1：当一个玩家成功地创造出招数后，要将这个招数练习到5层以上，才可以开始传授给其它的玩家： \n① 不过由于自己的武功不是很娴熟，所以自己的功夫不到家，高级招数的效果会有损失(在5层传授时、效果损失40%，6层损失30%，7层损失20%，8层损失10%，9层损失0%)，杀伤力在1000以下的低级招数不受到这个限制 \n② 传授武功给其它的玩家，传授武功的人，要损失自己的10%的武功经验值(500封顶)，传授帮众损失2%的武功经验值(100封顶)，夫妻之间传授不损失武功经验值 \n\n\n2：学习到新武功的玩家，由于对武功不是很理解，所以在武功没有重复练习时，效果受到限制：  \n① 学习到新的武功，经验值从0开始，也就是从入门开始  \n② 入门时,效果只可以发挥出学到的招数的65%，然后每升高1层+5%，到8层,功夫的效果才100%释放出来 \n③ 学来的武功练习到8层，完全发挥出为威力后，可以开始传授给其它的人；不过效果还是有损失，在8层传授时、效果损失20%，9层损失10%，一直到自己练习到10层，才可以无损地传授给其它的玩家 \n\n\n3：如果武功创始人把武功忘却了，从其它玩家那边把武功学习回来，经验是由零开始的 \n\n\n4：学习武功后，攻击原创者，无效 \n\n\n5：从帮派学习的武功，经验从第3层开始；离开帮派后，武功追回、投胎则不会消失 \n\n6：从夫妻那里学习的武功，经验值从第5层开始； \n如果传那招的人是创那招的人。 \n离婚后，如果是授传人离婚，则武功追回、如果是传授人离婚，则不会消失 (选择单人投胎、武功同样不会消失) \n如果传招的人不是创那招的，无论谁离婚，武功都不会消失 \n\n对杀伤在1000以下的武功可以放宽，传这样的武功不应该减经验！ ", "source": "幻灵官服宝典"}, {"idx": 389, "orig_path": "【修炼区】->创招全攻略（入门篇）", "orig_data": "相信有许多人都 喜欢飞创招，因为创招条件比较低，如果条件适合的话，一个礼拜之内飞尚武是很正常的事情，我有个朋友在4天之内把 创招经验弄到了20万，就是他把所有的创招的条件都弄好，差的只是时间问题 \n【创招要求】 \n创招最低要求  \n内力点数为纯点100点以上   \n\n如何分配点数可以创招掉级  \n杀伤过了1000的招都可以掉级（504内以下不掉） \n这里有几个选择方法 \n1 660攻击660内 \n2 782内0攻击 \n\n如何创出2.0和2.5以上的招 \n飞尚武天神可以创出2.5以上的好招 \n除了尚武的话，其他的都只能创出2.0的招 \n最低点数要求 \n2000点以上的纯攻，内力按你要创的招而设 \n就是说你要有2000以上的纯攻，才能创出2.5+的好招 \n\n【创招要点】 \n1.要求你有一定等级，或点数才能创招，要创好招得飞尚武才行 \n2.建议穿上减内的衣服创招，减内要超过你加内点的内，要把内减为零，这样省钱， \n3.千万不要在水城、山城、树城药店创招，以免给人暗算 \n\n【如何创招】 \n1.不掉级招只要随便那里都能创，只要有100以上的纯内，不过加的经验少，更因为刷屏而遭人非议、这种办法毫无意义，而且有刷屏的危险，遇到有心人，会吃大亏，轻则被人塞药，重则给GM踢下线，再严重者，封号处理 \n[推荐指数  ☆☆☆☆☆]不推荐 \n\n2.掉级招有几种方法 \nA.练到一定等级，加800点纯内，开始创招，掉到不能创招了，再挂机练上去，最好是大罗以上，因为大罗一级的点比凡人多了100多点，一般170级以上的大罗就能创招了，要是有投过胎的可以更少级，这种方法不建议采取，意义不大 \n[推荐指数  ★☆☆☆☆] \n\nB.带鸟、刷宠经验、创招一起来，在明月桥创招掉级顺便带鸟忠、这种最划算，我计算过了，10多分钟带出1批鸟（一只20万），也就是80万幻币、520点养宠经验、1000-1500左右的创招经验，不过速度中上，不能长时间挂机、 \n[推荐指数  ★★★★★] \n\nC.天仙299或399创招过劫，就是在天仙299或399的时候，过劫升到300或400，创招掉一级、再过劫、再创招、这种方法速度比带鸟快，可以挂机、也不费钱、 \n[推荐指数  ★★★★☆] \n\nD.加兵解创招，加兵解，然后创招，掉到不能再创了，再加兵解（PS：看到有人兵解就加不过只能加2次）最低、最佳创招等级最好是大罗160-180级左右，点数加800点纯内、加次兵解再创招、创完再加兵解、没有人兵解的话，到华山脚练级创招、加兵解创招，不必练级，但是很费钱，适合想早点飞创招的人、速度快  \n[推荐指数  ★★★☆☆] \n\n【创2.5好招要点】 \n1。先学会怎么算找的系数 \n创招系数 系数用手算是 N层打怪去血/{[1+（N-1）/10]*消耗内力}=杀伤系数 \n2，HLHL创招的要点 \n先看系统显示的数据，如果系统显示杀伤在2.0以上的容易招都留着，出去打一打看效果再决定删或留 \n500内创的招一定要容易招才留，正常招连系数都不用算，直接给咔嚓掉。 \n\n用欢乐幻灵在创招的时候保持容易招.....等容易招满了的时候..用口算算一下.如果杀伤是内的2倍值得去试试,杀伤没两的2倍直接删了.想看他是否是好拳就得先看他系数...不打怪是算不出系数的.... ", "source": "幻灵官服宝典"}, {"idx": 390, "orig_path": "【修炼区】-> 好招是如何练成的.带你走出创招误区.", "orig_data": "最近服里老有人问我怎么出好招,抱怨创了\"几百年\"也不见极品.我一个一个教的口干,又看到各论坛飞了尚武不出好招的抱怨帖成上升趋势~故发此帖~救pk人于水火之中.如觉不屑,当可一笑置之. \n\n今天我们不说创什么样的招怎么分点,不说该穿什么装备,也不说该过劫创还掉级创这些废了1年还嫌废不够的废话.今天主要从系统和感觉入手. \n\n5转尚武创招,非掉级招最高系数可达2.59+,但绝对到不了2.6~这里的非掉级招指的是504内以下的.也不知道什么时候系统改了,以前501内就开始掉了.现在要504. \n而创超过504内力的招.系统判定为掉级的高级招数.这时候,不管是504内招还是1000内招.系统认定都是一样的,即最高系数为2.32,这是极限了,不可能有更高的.谁说有超过这个系数的不是吹就是不会算~大家都别信.我都算了1年多了,应该比较有准头吧........ \n\n但是这里面有一个特例需要注意,那就是系统加上去的内力和你创招时自己设定的内力直是2个不同的概念.比如说:我的招创的时候设为500内,不掉级,但是创出来以后是540内,这时候按上面说理论系数不应该超过2.32,但打完怪以后算出来是2.51,就是说不受内力多寡的影响,这时候系数还是按非掉级招来算.即时系统在加多少内也是如此(越大越好!小招的系数大招的内力,靠!~无敌了). \n\n最后是各种客观因素对招的好坏的影响: \n1.容易招和正常招,首先要确定一点,容易招绝对比正常招好!!创的时候看到正常招一率删无赦!!为什么好?正常招出来打怪的实际杀伤绝对比系统显示的要低,而容易招反之.且容易招每级杀伤成长都要比系统多出12点左右(如0层时打怪1200,那么每升一级应该是长120,然后在这个基础上+12)这样的话练到12层就等于多出来了一层杀伤!!!至于某些传言所说的容易招比正常招在pk的时候出招快,纯属无稽之谈.出招快慢取决于个人手感和技术. \n\n2.攻的多寡.按我一贯的做法是越高越好!!但也有个比例,基本上我是创500内非掉级招加3000攻最少,后来有了装备,尚武的时候加到了5000,创800招时是3200的攻.1000招从不创,因为我用1200*1200的老拳.可以看出来,攻和内的比例是按倍数加的,也许是我迷信.要不要加这么多还看你自己. \n\n3.声望.声望多寡影响招的好坏一说,纯属虚构!!本人就是例子!!因进江湖近1年,pk情况可想而知,声望最低时跌破2位数,但网宿谁敢说他小招有我杀伤高??(12层1438) \n\n\n附:系统n次改版后,一些现在或未来都不可能再现的\"绝世武功\". \n1.测试时个别有识之士为兼顾攻内平衡,开创1500*1500大招先河,并于正式版后大展其威!!具体表现为散仙打地仙无视高转克低转先去内铁则!!!1转打2转直接去血,恐怖之极! \n3转的同时被封. \n2.1200*1200拳,传承测试时1500拳之精髓,要求属性更加合理化的bt武功,于低敏克高敏时期无敌于天下,如火狐冷月孤星剑,网宿无痕一剑(嘿嘿)等.  于1848版之后被封. \n3.   0内招.4转时期出现,空内即可出招,起初被当做烟花来玩~后经高手提出而被广泛应用与pk赛,练至12层可打掉内人2000左右内力~可谓\"空手套白狼\"之典范!!2.5版之后绝迹.  \n\n", "source": "幻灵官服宝典"}, {"idx": 391, "orig_path": "【修炼区】->积累功德最新最快的办法", "orig_data": "【人物篇】 \n   申请4个新人帐号（免费3天）建议帐号名尽量一致。比如：king01、king02、king03、king04...记住一个帐号（便于快速修改）。 \n【装备篇】 \n   身饰：幻兽之灵    0级使用  +100血、100防、100敏（水任务兽玉换得）     推荐指数★★★ \n          梦之链    0级使用  +100血、100防        （中秋任务绝版）      推荐指数 ★★ \n          药王佩    0级使用          +20防、 20敏 （乾坤五行炉开炉任务）推荐指数  ★☆ \n         彩蝶（飞龙）香囊   10级使用   +50防 +50敏+20攻（+50防+20敏+50攻）      （端午任务得）        推荐指数 ☆ \n             疾风之镯    50级使用      （兄弟77关换）        推荐指数 ☆ \n   头饰：恋之守护    0级使用                 +30敏 （恋之守护任务）       没商量，就是他了！ \n   衣服：彩云衣     0级使用          +150防        （水任务10打怪得）   没商量。就是他了！ \n   鞋  ：真爱仙履   0级使用                  +200敏（雪狼湖任务得）     没商量，就是他了！ \n按幻兽之灵装备下来：1级新人 100血250防350敏（新人20点加敏） \n\n\n添加一个最重要的装备：90级加1800+的防衣（或100级） \n\n【带功德办法】 \n\n1级到5级在水成郊外练，然后去做丑剑客任务，升到15级，练到29级，再找丑剑客，升到39级，然后带到69级做清风原哪个修补剑的任务，就成了89级 \n带1级之后穿上90级加1900左右的防衣（这个过程10分钟左右） \n也可以一直升级到69，做次任务直接到89级，练几级就能穿装备了 \n大号带只敏低于700的宠物，能秒怪就可以 \n\n要是有时间可以去西码头打250级（110级以下在明月桥不能一战一级）、要不就直接在明月桥挂，明月桥脚本在下面 \n这样可以直接挂到250级左右换下另一批小号。 \n3批小号1万功德，150X3=450战，懂算术的就知道快不快了（最适合晚上睡觉之前挂机） \n不过就是有个难题，90级或100级1800+衣服难找啊，还有小号要加点血才能挂机 \n\n在带功德之前.先放四只嘟嘟鸟在每个小号的身上.让小号升级的时候给宠加忠、虽然有点点麻烦. 不过这样也有好处...四个小号..每个小号带四只...等宠满忠了的时候.再结婚转到大号去.让大号进化.一次加130点经验.16只就加了2080点的经验..还有16只九转鸟.. \n\n【带功德好处】 \n多了功德 \n给大号加了养宠经验 \n带了N只觅雾鸠 \n加帮凑人数 \n4只300级飞散龟 ", "source": "幻灵官服宝典"}, {"idx": 392, "orig_pat 】->新人练级详细路线", "orig_data": "新人1级带的装备   \n真爱仙屡0级+200敏 \n恋之守护+30敏 \n人宠合一 \n先发制人-----要么人和宠的敏都低于自己打的怪物 \n后发制人-----要么就都高于自己打的怪物 \n人的敏只要能跟宠加一样高，在无好的防衣前还是以加防为主 \n\n———————————————————————— \n\n练金龙====当人和宠都有300敏就可以在悬台跟的到500的象了！到华山打的时候就可以不要敏了因为人和龙的敏一般都不会高于猴子和蹊跷鼠（龙的敏成长最好在1.0左右） \n\n1-15级 水城外郊 1-20铁甲龟 1-25蝴蝶 \n15-25级 青风原 30拽刺头 25厚皮鳄(44,91/左角) \n25-60级 四桥原 50努努鸟 40酷刺头（防100敏50） 70骑士龟 80拽刺头（标33.64/防165敏40） \n60-80级 黄泥岗 111截拳道(38,10/右上方台子上) (防150敏需110以上) \n80-120级 松雪野 200白毛象 210楞头青 (敏需200以上,防需300左右) \n120-180级 雪融谷 250懒懒象(45,42/中间那有水的地方) (敏需170以上) \n180-200级 西雪玲 330白毛象 (敏180以上) \n200-250级 绿洲东郊 410酷毙象 (41,73/树周围) (防400+ 敏230+) \n榕盘谷 424跷跷鼠 （40，28/防375敏525） \n250-300级 悬台 590衰呆象 (55,55) (防500+ 敏380+) \n羁马谷 580弹簧鼠 (62.45/图右中/5，防430，敏690） \n300-500级 华山脚 720陶陶 740蹊跷鼠 (防需650+ 敏1180+) \n沙洞2层-紫苔洞窟 777绿锦宝 720拽刺头（防1600敏430） \n500-650级 华山脚 850陶陶 870蹊跷鼠 (防760+ 敏1450+) \n沙洞2层-紫苔洞窟 888绿锦宝 828呆刺头（34,37/防1780敏550） \n650-700级 华山亭 939截拳道 979级硬骨鳄 (防2000敏1170+) \n700-1000级 华山腰道 1050鲁鲁 1030琳琳 （标27.27 防2290敏1460） \n华山腰道 1191鲁鲁 1150蝴蝶 (防需要2560 敏1800+) \n1000-1200级 传说中的英雄冢 1300黄锦宝 (防2700，敏850) \n新山城1层-九曲回廊 1620呆刺头 1650红锦宝 (防需3850+ 敏需1200+) \n\n———————————————————————— \n\n简单的说偶自己要是开小号从一级练的话 \n①首先开号再带上装备真爱鞋+恋之守护 \n②带一只金龙（成长6.5左右功2.5左右防3.0左右敏0.8左右敏） \n③开始练级了（从开始1级到打500级的象加的点数全部加防，要是人和宠不合的话就稍做调整，人敏高了就脱下鞋，人敏低了就加一些，但不要太多了。鞋和香斓可以加250敏了所以点数加敏最多+50左右，当可以去华山打 山脚 720陶陶 740蹊跷的时候可以不要加敏了！因为怪物的敏很高，人和宠都跟不上！人带装备之后的敏可以跟上悬台的500级象就可以不再加其他的，都加防！） \n\n———————————————————————— \n\n新人练苦行归和蝴蝶的路线（新人练级一般不会加功，因为没有极品装备所以点数要是加功就会很难练宠，蝴蝶和归的功成长一般不会很高要是功成长高了就不好练！所以新人一般不要练蝴蝶和归，但系统规定要练一只300级的苦行归才可以飞仙，下面给出练级路线。本人奉劝新人一般归练到300级可以飞就够了，没必要练到很高级别，因为飞仙后的归最多成长也只10+左右，成长好坏等级高低并不影响多大） \n\n\n1-15级 水城外郊 1-20铁甲龟 1-25琳琳 \n15-25级 青风原 30拽刺头 25厚皮鳄(44.91/左角，防64敏15） \n25-65级 四桥原 50努努鸟 40酷刺头（防100敏50） 70骑士龟 80拽刺头（标33.64/防165敏40） \n观日桥 75铁甲龟 60厚皮鳄 （防140敏40） \n65-80级 闲情园 90盈盈 70铁甲龟 （防210 敏155） \n80-150级 剑池谷 121 琳琳 101 大嘴鳄 （防220敏110） 155琳琳(标40.37/图中宝剑下，防315敏134) \n松竹林 181呆刺头 (标22.11/右上的树后，防360，敏124) \n150-200级 怨灵洞口 282西皮 (64,56/图右中/树下) (防220,敏240) \n200-250级 银罐谷
