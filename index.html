炼话药.配合上一个炼话药就可以打8-9拳大拳.那样比起来就占了很多优势.因为他不会浪费药.杀伤力极高.\n\n下面来谈谈各个属性人的装备\n类型          武器            衣服           鞋子         左饰          右饰  \n\n纯招人        纯攻或攻敏      纯敏或血敏     纯敏         敏内          纯加血或减敏加血\n招标人        血内敏武器      纯敏或血敏     纯敏         敏内          纯加血或减敏加血\n内人          血内武器        血内甲         血内鞋       减血加内      减敏加血 \n血人          (同内人)\n大标人        血敏武器        减内的血敏衣   纯敏鞋       磐龙清防就可  减敏加血\n小标人        (同大标人)\n血防人        血防武器        减内加防       血内鞋清防   磐龙清敏      减敏加血\n90万纯招人    血内敏武器      血内敏甲       敏内鞋       黯然佩改装    加防减敏加血减攻\n90万多属性人  血内敏武器      减内的防敏甲   敏内鞋       黯然佩改装    加防减敏加血减攻\n\n\n装备与点数的分配:\n  纯招人 \n武器:用醉剑做成减防1910减100敏攻XXXX(据修行定).   \n衣服:用正气甲做成减攻100 加敏1171敏的那种. \n鞋子:飞羽做的纯敏鞋 减1995攻 减300防   \n左饰用紫血板戒直接加修行.加240敏 加内XXX(根据修行定)  \n右饰可以选择长命锁,太乙珠,丹凤钗几种材料做成减敏或不减敏的直接加血\n加点:只要把混攻调到N层武功打怪掉血的一半就可以了.剩下的点数全加敏.\n\n   招标人\n武器用醉剑做+1135敏 -1910防 加血内看自己的属性来定  \n其他的跟纯招人的一样\n加点:把混攻加到N层武功打怪掉的血的一半.剩下的加敏\n\n   内人,血人:\n武器:醉剑或金光刀做的.+4600左右血,+3900左右内 -1910防 -100敏\n衣服:用正气战衣做成 +2000内 +XXXX血 -100敏的衣服\n鞋子:飞羽做成的+5985内 +2289血 -300防 的那种\n左饰:-732血 +XXXX内 (根据修行定)\n右饰:-50,-100,-120攻 +XXXX血(根据修行定)\n加点:做内人就把红利全加到内上去.做血人就全加到血上去.\n\n   标人\n武器:+4600左右血  +1135,1139,1140敏 \n衣服:-5940内 +2580血 +1980敏 -70攻\n鞋子:飞羽纯敏鞋 \n左饰:磐龙把防清0 +200血 +200敏 +XXX内\n右饰:-227,-232,-235敏 +XXXX血\n加点:大标人全把红利加到攻上去.右饰带不减敏的那种.小标人减敏加血的右饰,好加点红利到敏上去.剩下的全加攻\n\n   血防人:\n武器:加XXXX血 +120防或100防(剑和刀的区别) 要做加血的武器先把修行算好.血能加到攻的90%\n衣服:极品的防甲 -5940内 -70攻 -80敏 +XXXX防衣服 \n鞋子:用极品的内人鞋 +5985内 +2289血  最好把-300防清掉 \n左饰:磐龙把敏清完,加内XXX \n右饰:-227,-232,-235敏的 +XXXX血的佩.\n加点:看防和血来分配.适当的加上些内..混内不要下1500.混防也不要低与6000.剩的红利全加血\n\n90万的纯PK人\n武器:跟招标人一样的武器.可以把防弄到负1200多\n衣服:+2000内  +2100血 +958敏 +XXX防 -100攻 或是+2000内 +1600多血 +1152敏 -100攻\n鞋子:+5985内  +6653敏 -1995攻\n左饰:-732血   +7332内 +244攻\n右饰:+7059血  +235防  -235敏 -120攻的丹凤钗\n加点:把混内加到上2W.把血也加到2W.剩下的加敏.随便你加敏和血都可以\n  90万的多属性人\n衣服:-5940内 +1980敏  +6602防 \n其他的装备都跟90万的PK人一样\n加点:靠装备有5000多点防.加到了7000防就够了.把混内加到2W以上..血和敏看你的喜欢加了 ", "source": "幻灵官服宝典"}, {"idx": 405, "orig_path": "【修炼区】->满修ＰＫ人各种属性详解", "orig_data": "招人类：\n\n高敏纯招人：适用装备“衣服、鞋、武器、血饰不变、内带可选用敏暗、紫血、盘龙、敏堕落”（优点为敏高，命中敌人几率高\n和闪避的比较多；缺点为内低单挑情况下不太好用、除敏暗神外血都普遍低。）此属性3600红利属性大概为1W91多敏、1W45左右内、1W58左右血（敏暗神血可到1W64）2200红利敏大概在1W77左右，血和内跟高属性相同。\n\n高敏低内招人适用１０５０内招，中性敏人适用１１００内以上的招．这是高敏人所需用的装备，紫血＼丹凤和敏暗\n\n\n\n高敏人属性\n\n\n\n中性敏纯招人：适用装备“-666血普通内带、内暗神、内堕落”（优点为敏适中，内和血也可以调节到最佳状态，适合单挑的属性；缺点为在PK场内拉屏打的时候命中率没有高敏的好，而且中招几率相对也比较大一些）此属性3600红利可以到1W8敏、1W75内、1W65血，这个属性是按照内暗来分配，如果用其他两种内带只需减去和内暗相差的内数值即可。2200红利可到1W7敏，1W65血。1W53内。\n\n\n低敏高血人：适用盘龙、敏暗；有的PK人进PK场的宗旨是“先保命才能再杀人”故而有的PK手在内和中性敏纯招人一样的情况下，将敏变低，血调高做常见的为1W75敏 1W45内 1W92血  也有1W5敏2W多血的招人。（优点为拉屏对战时期血高，可以降低被秒的可能；缺点为敏低，敌人容易命中，打敌人时命中率偏低）\n\n\n招内人：适用装备同中性敏招人；此属性可点可杀，乃山城混战和PK场内混战时最佳属性（优点为可以点其他招人，缺点为敏比较低，命中率也比较低）常见的为1W7敏  2W内  1W65血；1W6敏  2W3内 1W64血。\n\n\n\n彪人类：\n\n招彪人：适用装备“招鞋、招衣、不加攻内带、丹凤、极品彪武器”此属性用的人不多，将彪武器攻击清0，用纯点加攻到和招武器一样的，其余加敏个人认为此属性挺不实用的，彪内人不好用，彪招人靠运气．但是也有人喜欢加成这属性。唯一的就是可以用招杀内人．\n\n\n\n敏彪人：和中性招人用同样装备，纯点加2500攻击，其余全部加敏；大概为1W7敏，1W64血  一彪5500，运气好了3彪可以出去一个招人（优点为彪招人容易命中缺点为除了能彪一下招人再无其他作用，而且必须要运气好时才可以发挥出属性的作用）\n\n\n内彪人：装备同中性招人装备，内加到2W，其他加攻击。大概为2W内、一彪1W、1W64血。（优点为可点招人和其他彪人、缺点为没防、碰到敌人的彪人2下就飞出去）\n\n\n纯彪人：适用装备为“满修加防的盘龙、极品堕天防敏衣或极品彪衣、极品彪武器、加防丹凤、招鞋”此属性在PK场内令内人畏惧，往往在角落里突发奇彪，另人防不胜防，而且和遇到其他彪人时候还不怕彪，因为穿上装备后可以达到6700的防御。（优点为防高，攻高，PK场内是内人的天敌‘缺点为内超低，随便一个招人都可以点）\n\n\n内人类：\n\n超内人：适用装备为“内暗神、内堕落、普通内带、加防丹凤、加防血内鞋、加防血内衣、不减防血内武器”内人在PK场内无可争议的占领\n\n着不可替代的位置，一场比赛中胜败内人往往占据着很大的因素。纯内人就是穿上以上装备，点全部加内；内大概4W7  血1W4（优点为不怕任何高红利大内人来点，缺点为内高了，但是血低了，即使有防也是2彪飞出去）\n\n\n普通内人：适用装备同上，血加到1W64或1W92，其他点全部加内。（优点为加上装备的防，和这么高的血，彪人要3彪才可以彪出去，缺点为相对与高红利大内人来说就低了，碰到高红利大内人可能会被点）\n\n\n\n大内招人：装备同招人一样，一般情况下３６００红利可以做到４Ｗ３内，１Ｗ６４血＼９５５８敏的属性，这样可点，而且可以杀敌人的彪人以及内人，缺点就是没有防，两彪飞出去．\n\n\n\n\n    大血人：“装备除把内带换成满修盘龙，其他和内人装备一样”一般来说都是点全部加血，（优点为有防、血高，在场内晃荡不怕被杀；缺点为除了做炮灰没其他作用）\n\n", "source": "幻灵官服宝典"}, {"idx": 406, "orig_path": "【修炼区】->种九转的功能说明", "orig_data": "九转青灵丹                 宠升5级 \n九转培灵丹                 人升5级  \n九转元阳丹                 人宠各升5级 \n九转蕴灵丹                 人升10级 \n九转万灵丹                 宠升10级 \n九转混元丹                人宠各升10级 \n九转天心丹                 人宠各升20级\n", "source": "幻灵官服宝典"}, {"idx": 407, "orig_path": "【修炼区】->篡位攻略", "orig_data": "1：试过篡位的人都知道，要篡位你在帮里的地位必须是副帮这个就不用多说了\n2：想要篡位必须满足一个条件，效忠你的人要是帮主的2倍，在这个前提下你 \n     才可以篡位的哦\n3：在帮里有职务的人都是属于效忠帮主的，要怎么让他们效忠你，这就得看你 \n     自己的本事了，当然你也可以开N个小号加入帮派，让你的小号效忠你。。\n4：在所有条件都齐全的情况下，准备200W点篡位就OK了。。。。\n", "source": "幻灵官服宝典"}, {"idx": 408, "orig_path": "【修炼区】->帮派建立住宅小区攻略", "orig_data": "三级帮派且有帮派总坛的长老级以上领导人物,在皇城可以找到负责销售建房许可证的林大人(111,62)...只要花500万就可以买到建房许可证,使用建房许可证就可以在帮派占领的地图上建立一个住宅小区...\n找林大人旁边的刘大人(111,70)购买地皮开发许可证后,就可以在帮派住宅小区里建立一块地皮...(如果有玩家要买地皮,可以先谈好价格,然后在开发地皮哦.....)\n注意：购买建房许可证与地皮开发证都是需要使用帮派基金...\n", "source": "幻灵官服宝典"}, {"idx": 409, "orig_path": "【修炼区】->如何增加功德值及优势", "orig_data": "老玩家做队长，队伍中每有一个新人升级，则增加功德值＝队伍中新人数量－1；如果只有一个新人也是1点\n如果升级的新人级别大于100，则增加功德值＝2×(队伍中新人数量－1)；同样，如果只有一个新人也是1×2＝2点\n也就是说如果一战有两个新人升级、则功德值增加按照两个人分别计算、然后叠加\n例如：散仙1级队长、带4个新人一起战斗，一战下来有两个人升级、1个101级1个10级、则队长功德值增加2×4＋4＝12点\n功德值不仅仅是5转飞升的一个衡量标志，可以让玩家体验扶助新人的乐趣，同时它对于任何一位幻灵玩家的作用都将是非常大的：\n1、宠物相关：功德值可以换宠物,而且换的是用养宠经验也换不到的宠物\n2、偷窃相关：可以消耗一定的功德值出天牢 \n3、锻造相关：换取一些锻造用的初级宝石\n4、修行相关：换取一定的等级,效用相当于兵解或者升级药,但不能使用此方法过劫\n新玩家定义： \n1、没有投胎过 \n2、凡人 \n3、等级≤600 \n老玩家定义：\n1、散仙以上 \n2、队长\n1、五转飞升功德的条件限定在1万功德值，达到要求即可找相关NPC接受考验，飞升后不扣功德值。飞升功德后，很多地方都会得到价格10％的优惠，例如进入新山城收费练功区，购买三级房屋等等&lt;其他玩家购买需要8800万、飞功德的玩家只需8000万&gt;，另外，飞升功德的玩家兵解时，护法等级增加程度在原来基础上再增加所得等级的10％，自己修行等级也会多加所得修行等级的15％。举例如下：队长800兵解，队员1级，原来队长得到400的修行等级，队员得到79级，如果队长是五转飞功德玩家，则队长得到520级修行等级，队员得到87级修行等级 \n2、新山城功德殿，功德值换取宠物，需要的功德值大幅度下调，基本上是原来的15％左右。而且，如果五转飞升功德值的玩家在这里还有少要求功德值10％的优惠，对这几类宠物有兴趣的玩家可以前去兑换\n", "source": "幻灵官服宝典"}, {"idx": 410, "orig_path": "【修炼区】->名剑山庄降妖(赤刃)任务", "orig_data": "到名剑山庄书房找到庄主易云,他会告诉你庄里出了妖怪, 让你帮他收服, 并且给你一把惊鸿剑, 晚上17：00-19：00带着惊鸿剑到名剑山庄正院找到来福(29,34), 他会送你小枯井下面收服妖怪,进去一后可以看到一妖怪, 跟他说话进入战斗(5只1500级的蓝发魔姬), 战斗胜利后得到妖怪内丹\n名剑山庄左厢房找到易天, 他会让你帮他找他的妻子\n从树城灵儿处到达寒月台, 找蝶衣, 她会让你帮她找武当山的元元真人炼制 回天灵丹\n找元元真人炼制回天灵丹,然后回来给蝶衣, 她会让你去易天那报平安; 最后找到易天,他为了表示感谢, 会送你一把赤刃\n", "source": "幻灵官服宝典"}, {"idx": 411, "orig_path": "【修炼区】->雪狼湖(真爱仙履)任务", "orig_data": "首先在华山顶抓一只1级的奇变天狼,然后和华山顶的小狼仙(31,42)对话.....进入雪狼崖...和里面的老狼仙(28,27)对话,会得到真爱花种.........(带着真爱花种就可以自由的进出雪狼崖了)\n在晚上的22:00-24:00带着真爱花种进入雪狼崖,跟老狼仙对话后,可以进入时间的伤口,跟里面的胡狼(12,11)对话,得到白色绣球花....\n在早上的7:00-9:00带着白色绣球花再次进入雪狼崖,跟老狼仙对话后,进入时间的伤口,跟胡狼对话后,到达雪狼湖,跟这里的宁静雪(27,20)对话,得到真爱仙履....\n真爱仙履 +200 敏捷 0等级使用\n火属性任务中的夜晚的时间伤口就是早上7:00-9:00进去的...(必须带有白色绣球花才可以吖)\n", "source": "幻灵官服宝典"}, {"idx": 412, "orig_path": "【修炼区】->佛珠任务", "orig_data": "佛珠&任务(等级限制150级左右)\n在水城的船上找到小云(22,54/靠青风原这边),她会给你一条;佛珠 .....\n再到树城斗宠处下面,找云中子(69,107),对话后收走佛珠,得到;祝福过的佛珠\n", "source": "幻灵官服宝典"}, {"idx": 413, "orig_path": "【修炼区】->送物得甲任务", "orig_data": "等级限制 70-200\n华山脚的修行者(34,59)对话,他会让你帮他去买银蜂针和缝影烈毒散,并得到;购物单买到需要的两样东西后,带着;购物单;再次来到华山脚,交给修行者,他会将自己做的铠甲送给玩家....\n", "source": "幻灵官服宝典"}, {"idx": 414, "orig_path": "【修炼区】->除小贼任务", "orig_data": "等级限制150级\n到水城找怪老头(40,97)对话,他会警告你要小心小偷...如果向他求助该怎么办,他会告诉你别把钱放在身上,都存起来,同时还要练偷....他还希望你能帮他夺回被逃到山城附近的小偷所偷走的东西....选择帮助他,你会得到物品物证带着物证找到枯井原的笨小偷(38,23)...他提出用武力解决,选择我可不怕你就进入战斗...战斗胜利,得到物品;贵重项链将贵重项链;还给怪老头,你的敏捷会加10点，等级提高10级....\n", "source": "幻灵官服宝典"}, {"idx": 415, "orig_path": "【修炼区】->丑剑客升级任务", "orig_data": "到水城外郊找到丑剑客(打20级蝴蝶的地方),她会让你买一瓶甘露酒给她...\n到水城药店买一瓶甘露酒给她...她会给你升10级和500两银子...\n投胎后的人可以利用此任务马上从1级到21级哦\n", "source": "幻灵官服宝典"}, {"idx": 416, "orig_path": "【修炼区】->“五转”任务", "orig_data": "幻灵魔境十八层，仙界九重天。古往今来，无数修行的人、神、魔都渴望突破自身的极限，能进入更高一层的境界。而仙魔两道的纷争也连绵不断，直到最近爆发的一场惊心动魄的幻灵仙魔大战，双方都损失惨重，才稍有平息。\n\n－－－－－－－－－－\n幻灵仙道\n－－－－－－－－－－\n\n小时原本有目疾的天残子仰仗过人的毅力苦修，终于开了天目，成为天神界洞察八方第一人，如今奉逍遥天帝的旨意带领天界硕果仅存的几位星君从众多仍在修行的大罗金仙中选拔精英。完成任意一个属性任务，并修行到1300级的大罗金仙到天空城殿廊找到和幻影兽小白参禅的天残子（11，18），就可以根据自己的特长找天残子接受相应的考验。 \n\n1、幻灵火淬守护佩支线任务(飞升锻造)：\n\n如果锻造经验超过两万，就可以要求考验锻造技巧。从天残子那里得到“火淬之令”，受命到衡天台找到掌管天界法宝的火淬星君空融子（23，42）。见到火淬令的空融子不敢怠慢，提出考验玩家秘方锻造和普通锻造。先带着“星君名贴”，到山城找身为鲁班传人的巧匠凌风，得到“秘方记录”。按照秘方记录上记载收集齐全材料，成功的锻造出“凤凰战靴”，并按照空融子的要求自己锻出修行1000级以下（含1000），防御2000以上（含2000）的盔甲，回到衡天台找到空融子，就会通过空融子的考验，得到“火淬守护佩”。 \n\n飞升锻造，只有大罗金仙才能飞升。要求锻造经验20，000以上，飞升任务将是寻找一个秘方来锻造出特殊物品，并要求玩家自己锻造一件防御2000以上、修行要求1000级的盔甲。飞升优势将是锻造出来的装备和一般人锻造出来的装备相比，装备的要求修行等级将下降一定百分比。 \n\n2、幻灵武德守护佩支线任务（飞升创招）： \n\n如果创招经验超过二十万，就可以要求考验武德。从天残子那里得到“武德之令”，受命到御风台找身为天界神武将军的武德星君朝阳子（42，25）。朝阳子注重武功的修为，安排的考验是解敕勒川族长之危。带朝阳子的“调查令”到敕勒川的大蓬（25，14）找到族长，接受族长的委托，去对付为害乡里的欧霸天。在沉没的城市找到正横行霸道的欧霸天（45，59），用武功击败他手下防御超高的幻灵兽“霸王卸甲”，欧霸天承诺永不侵犯敕勒川。带着欧霸天的“强者之剑”回到敕勒川，完成族长委托，得到“感谢信”，再回御风台找朝阳子交差，十分满意的朝阳子就会赠送“武德守护佩”。 \n\n飞升创招，只有大罗金仙才能飞升。要求创招经验200，000以上。飞升任务将是对付一组超防成长的宠物，必须合理的利用一定级别的武功才能通过考验。飞升优势是可以创出系数超过2。0的武功。 \n\n\n3、幻灵巡天守护佩支线任务（飞升修行）： \n\n如果修行等级超过两万，就可以要求考验意志。从天残子那里得到“巡天之令”，受命到翔云台找历经百万劫难肉身飞升的巡天星君空冥子（13，39）。空冥子注重考察意志，安排帮助虽然资质鲁顿却坚持苦修仙道的传真道人。带“救援令”去武当后院见到仍在苦修的传真道人（17，9），传真道人获知是空冥的安排感激不尽，要求玩家协助打通走火入魔而阴阳两气阻滞的大锥穴，帮助他后，等级下降300级，得到传真佩剑“青枫剑”。重新修炼到1300级后，再次帮助传真打通环跳穴，等级下降200级，这次换得传真的“真武靴”。第三次修练到1300级，最后一次帮助传真打通任督二脉，助传真功成，换得传真修练万年的法宝“太乙珠”。修练到1300级，带着“太乙珠”找空冥子复命，得到“巡天守护佩”。 \n\n4、幻灵圣兽守护佩支线任务（飞升养宠）： \n\n如果养宠经验超过二十五万，就可以要求考验养宠技能。从天残子那里得到“圣兽之令”，受命到降尘台找精通禽眼兽语的圣兽星君御灵子（73，47）。接受御灵子委托，先打败被混沌魔尊施法作乱的五行使者，再去按照御灵子的要求重新寻找五行使者的接班人。找到五行使者的接班人，完成御灵子的委托就可以得到“圣兽守护佩”。 \n\n5、幻灵道德守护佩支线任务（飞升功德）： \n\n如果功德值达到一万，就可以要求考验道德。从天残子那里得到“道德之令”，受命到圣泉台找以普渡众生为己任的心漩子（12，18）。接受心漩子委托，到雪城帮助雪城城主，积累最后功德。拿着“普渡令”到雪城城堡找到城主（30，21），得知雪城水源受染，须舍利子才能解毒，带着城主所赠能御奇寒的“龙涎丹”，到雪融谷找到银花婆婆（7，31）。按照银花婆婆的要求收集齐十几样材料制成的“紫阳丹”，换得舍利子所制的“丹凤钗”解了雪城水源之毒，得到城主“天蚕衣”，带着“天蚕衣”回圣泉台复命，就可得到“道德守护佩”。 \n\n－－－－－－－－－－－－－－\n幻灵魔道\n－－－－－－－－－－－－－－\n\n本为天残之弟的地缺，为寻医兄长目疾之药，走遍名山大川，未能如愿，却在英雄冢尽头碰翻了镇压妖魂之魄的炼妖壶，吸入三千妖魂之魄成就魔尊之体。因此受魔帝所托，带领五方魔尊，去地狱寻找魔界后进，以图和仙家抗衡。完成任意一个属性任务，并修行到1300级的魔神到剥皮地狱找到孩童之躯的地缺魔（30，52），就可以根据自己的特长找地缺魔接受相应的考验。 \n\n6、幻灵掠天守护佩支线任务（飞升偷窃）： \n\n如果偷窃值达到二十五万，就可以要求考验偷术。从地缺魔那里得到“掠天之令”，受命到磨骨地狱找号称魔界千面魔姬的掠天魔君破天魔（12，35）。受破天魔要求，带着“迷惑丝巾”找其二弟子飘雾解救被仙家收去的破天魔大弟子飘云。在皇城太和殿找到飘雾（17，32），花50万得到飘雾从皇宫盗来的“七心海棠”，按照飘雾的指示。到名剑山庄的右厢房找李氏三兄弟（14，12）盗取“飘云的魂魄”。“飘云的魂魄”在三兄弟其中的一个人身上，不过是谁就看运气了，如果失手偷不到会被送入天牢。得到“飘云的魂魄”后去找破天魔，打败迷失本性的飘云后，就通过了破天魔的考验，得到掠天守护佩。 飞升偷窃，只有魔神才能飞升。要求偷窃经验250，000以上。飞升任务将和平时偷钱一样含一定的运气成分。五转飞偷的玩家，可以直接从天牢里出来，不需要交钱（包括监狱）。并且提供免费易容机会。找位于水城的服务生“妙手空空儿”与其对话，并通过对话切入男女不同地图，玩家进入地图后，可随意换造造型。更换好后，可通过与NPC对话，切出地图。\n小提示：妙手空空儿在水城的固定地点，每天只出现一小时。如果您在一小时内觉得所换造型不满意，那么我们还提供您再次进入更换的机会。”\n\n\n7、幻灵嗜血守护佩支线任务（飞升声望）： \n\n如果声望达到两千万，就可以要求考验声望。从地缺魔那里得到“嗜血之令”，受命到污秽地狱找打遍魔界无敌手的嗜血魔君幻灭魔（41，48）。接受幻灭魔的考验，到天牢一层找魔界守护将军（24，36），三次打败其手下的两员魔将玄广和雪空，就能得到“英雄令”，带“英雄令”回来复命，就可得到“嗜血守护佩”。 \n\n飞升声望，只有魔神才能飞升。要求声望值20，000，000以上。飞升任务将包含达到条件玩家之间进行回合pk，胜者飞升。飞升优势是在今后的回合pk中有优势。 \n\n8、幻灵堕天守护佩支线任务（飞升修行）： \n\n如果修行等级超过两万，就可以要求考验意志。从地缺魔那里得到“堕天之令”，受命到天灯地狱找有一百零八条命的堕天魔君曜日魔（35，47）。受曜日魔的委托，去名剑山庄，不惜功力依次接下李氏三兄弟的一掌，夺回魔界三将军的法宝“金光刀”、“堕天甲”、“龟背靴”来合成“魔界法器”。带着“魔界法器”找曜日魔复命就能得到堕天守护佩。 \n\n飞升修行，不限仙魔。要求修行级别20，000以上。飞升任务将包含损失等级协助npc情节。飞升优势是将来在人物等级的上限将有突破，超过1300级。\n\n“投胎后如再想飞升修行，请携带“风火令”与NPC对话完成任务”。\n\n9、幻灵妖兽守护佩支线任务（飞升养宠）： \n\n如果养宠经验超过二十万，就可以要求考验养宠技能。从地缺魔那里得到“妖兽之令”，受命到铡头地狱找善于操控万千幻兽的妖兽魔君兽心魔（31，33）。先打败兽心魔座下五大守护兽，再去按照兽心魔的要求重新驯养五大守护兽，完成兽心魔的要求就可以换到“妖兽守护佩”。 \n\n飞升养宠，不限仙魔。要求养宠经验达到200，000以上。飞升任务将包含和宠物相关的考验。\n\n10、幻灵泯灭守护佩支线任务（飞升功德）： \n\n如果功德值达到一万，就可以要求考验道德。从地缺魔那里得到“泯灭之令”，受命到焰浆地狱找魔力强大的泯灭魔君无情魔（25，26）。按照无情魔的指示，带“渡仙令”去沙城找入魔失败的天仙凝云（24，42）。按照凝云的要求去雪融谷寻找银花婆婆获得舍利子制成的“丹凤钗”，渡凌云入魔，带着凌云的“银风战衣”回去找无情魔复命得到泯灭守护佩。 \n\n飞升功德，不限仙魔。要求功德值达到一定的程度。功德值是新近引进的人物属性，玩家如果帮助新人，比如组队带新人练级等，将积累该属性。2。0版将开放该功能和属性的显示。飞升任务将是需要很多朋友帮助的。飞升优势暂时保密。\n\n\n玩家在飞升五转时除飞升修行外其他几种职业要求修行级别需达到5000以上并完成十个支线任务中的任何一个，（目前飞功德的任务五和十由于功德值刚开放，暂时无法完成）带着对应的守护佩，大罗金仙到盈露台找仙界接引使，魔神到油锅地狱找魔界接引使，就可以完成飞升。不过做任务过程中如果有损失对应的经验要补回才能成功飞升。飞升时，飞升养宠的要损失二十万的养宠经验，飞升声望的要损失一千万的声望值。 \n\n仙飞升养宠的得到红色小猪比特，魔飞升养宠的得到肉色小猪安特，其余职业的仙飞升得到异种穿心兽，魔飞升得到红色飞天鼠。 \n\n另外附上各个幻灵职业的优势： \n\n飞升养宠：对一级幻灵宠物一抓必中，抓到后初始忠诚85，出征宠物等级上限上浮50，将来可以用养宠经验换得可进行四进宠的最后进化； \n\n飞升修行：幻灵人物等级上限上浮100级； \n\n飞升锻造：幻灵锻造装备要求修行等级下降10％； \n\n飞升创招：同样系数的招数，使用内力不变的情况下，杀伤力上浮10％；\n\n飞升声望：损失少量级别，找特定npc可以随时重新分配所有当前点数，但是失去创招的能力； \n\n飞升偷窃：掌握幻灵易容术，随时变成其他玩家造型，被抓入幻灵监狱出来不需要交钱（不含天牢）。 \n\n飞升功德：很多地方都会得到价格10％的优惠，例如进入新山城收费练功区，购买三级房屋等等，兵解时，护法等级增加程度在原来基础上再增加所得等级的10％，自己修行等级也会多加所得修行等级的10％。\n\n有情提示：\n飞升各职业前，请玩家空出相应宠物位，以获得系统赠送的飞升宠物；如您实在忘却，只好重做该任务。望谨记！\n", "source": "幻灵官服宝典"}, {"idx": 417, "orig_path": "【修炼区】->“由魔入道”任务", "orig_data": "在武当练功房内的无极真人处可以打听到由魔入道必须要有无极天魔丹与凝神丹炼制成的脱胎换骨丹，寻找到这两种丹药后再请无极真人炼制成脱胎换骨丹。\n\n然后再到天空之城的武神殿找到由魔入道的前辈-擎天子（31，23），可以了解到由魔入道的方法。考虑清楚以后就可以由魔入道了。\n\n注意事项：\n一、由魔入道逆天的行为，所以成功者在修炼上会下降一个层次！如由阿修罗王就会降为地仙，以此类推。\n二、必须花费300万用来做善事化解戾气，去除魔气。这三百万必须放在身上。\n三、就是由魔入道就有如再世为人，身上的装备等物品都会丢失。\n", "source": "幻灵官服宝典"}, {"idx": 418, "orig_path": "【修炼区】->“由道入魔”任务", "orig_data": "地焰洞的地狱守护MM处可以打听到由道入魔须要无极天魔丹与凝神丹炼制成的神魔丹，寻找到这两种丹药后可以请地狱守护MM炼制成神魔丹。\n\n然后再打入地狱，在钉床地狱找到由道入魔的前辈－噬魔女（14，30），可以了解到由道入魔的方法。考虑清利害后就可以在噬魔女的帮助下由道入魔了。\n\n注意事项：\n一、由道入魔逆天的行为，所以成功者在修炼上会下降一个层次！如由阿修罗王就会降为地仙，以此类推。\n二、必须花费300万用来供奉魔神。这三百万必须放在身上。\n三、由道入魔就有如再世为人，身上的装备等物品都会丢失。\n四、也是最关键的一点！由道入魔要求至少是天仙级别的修为，等级在800级别以上。\n", "source": "幻灵官服宝典"}, {"idx": 419, "orig_path": "【修炼区】->“四转”任务", "orig_data": "升魔神:进入油锅地狱 ========选择不同属性飞升找相对应npc　 \n大罗金仙:盈露台看守区========选择不同属性飞升找相对应npc \n\n具体的条件： \n\n1、天仙1000级别或者阿修罗1000级以上； \n2、选择任意一种属性的图鉴为基础飞升： \n\n四转图鉴： \n由原来的百分比计算，改为按只数计算，飞升NPC的对话中有提示。 \n下列为四转的基本要求： \n水系：15只 \n土系：13只 \n木系：11只 \n金系：10只 \n火系：9只 \n\n选择其中一种属性飞升，必须分别达到以下要求： \n水系：26只 \n土系：19只 \n木系：25只 \n金系：13只 \n火系：18只 \n原来达到飞升要求的玩家同样可以飞  \n\n请注意，选择哪一种属性的图鉴飞升，就奖励得到该对应属性的终极宠物一只。 \n\n金系： 蓝鸟龙 \n土系： 蓝发魔姬 \n水系： 敖雪兽 \n火系： 绿妖 \n木系： 至尊林 \n\n请量力而行，水系工作量较大，火系和木系完成的难度非常高。不喜欢收集图鉴的，可以考虑完成金系，较容易。根据飞升开放前的最后调整，只有四转图鉴满足四转的基本要求，然后只要选择其中一个属性，达到要求。 另外，另外说明一下，这一级的飞升不需要有专门的宠物，只要记得飞升的时候，身上还有空的位置可以得到宠物奖品。 \n\n\n注：大罗金仙和魔神的部分法术在菜单的仙术部分可以找到，请注意不少法术要牺牲等级和银子。 \n\n血雨勾魂 是魔神的法术，可以将地图上所有的玩家的血都减少25％。 \n花雨普渡 是大罗金仙的法术，主要是给整个地图上不是魔的玩家加血。 \n这两种法术不仅需要银子，而且要损失1级的等级，请谨慎使用。 \n\n大罗金仙和魔神的天劫在天仙和阿修罗的山洞后面。 \n友情提醒：飞升时请卸下身上装备，以免造成不必要的损失 \n", "source": "幻灵官服宝典"}, {"idx": 420, "orig_path": "【修炼区】->“投胎任务”攻略", "orig_data": "人活天地间，终不能破鸿蒙而涅槃。很多修道之人为了突破自身的极限，使自己脱胎换骨，重新做人，而纷纷尝试投胎密法，但是了解投胎具体密法的人却不是很多。\n\n在东码头的天闲老人就略知一二：投胎是古代仙人修炼时创出的一种禁技，使用这种术法能使仙人回到凡人的状态重新修炼，并可以大大提高自身原有的素质。但是具体的实施方法他就不甚了解了。不过如果想知道更多详细的内容，天闲老人会给玩家一封‘求道介绍信’并指点玩家到逆之洞窟寻找对投胎很是了解的抚月仙长\n\n在逆之心情找到抚月仙长（16.36），抚月仙长为世人执着于生死而感叹，此时若没有带天闲老人的介绍信来此，那抚月仙长将不愿意冒然相助。若带有天闲老人的介绍信，抚月仙长就同意相助。但由于投胎之法过于凶险，必须有一名为收魂佩之密宝，方能保证施法成功。从抚月仙长处得知武当有位道人善做此佩，并得到抚月仙长的天师令牌。\n\n带着天师令牌到武当山上找到元元真人，好事多磨，由于收魂佩是由一种魂玉经法术炼成，而元元真人处已经没有存货，需要玩家自己取得魂玉才行。\n\n按元元真人的指点，到聋耳地狱中找到红刀（45.17），在打败红刀后可以得到魂玉。（五只一千二的红刀。）\n\n带着魂玉到元元真人处就可以得到收魂佩，带上收魂佩就能请抚月仙长帮助施行投胎大法了。\n\n\n单人投胎：满足条件后就可以请抚月仙长帮助行法，行法之后进入逆之轮回，记录点也存在此处。里面有各式各样的肉身形象可任由选择，不分性别。选择合适的形象后，如果满意，就可以通过地玄真人离开。如非原神状态，离开后记录点将变成水城，出生之地哦。\n\n夫妻投胎：夫妻两人都满足条件，而且身上都有收魂佩后两人组队，就可以请抚月仙长帮助行法，行法之后进入逆之情结，记录点也存在此处。里面有各式各样的肉身形象可供选择，但男的只能选男性肉身，女的只能选女性肉身。选择合适的形象后，如果满意，就可以通过地灭真人离开。如非原神状态，离开后记录点将变成水城，出生之地哦。\n\n\n施行投胎大法后，玩家将会以原神形象存在。男女原神形象不同，但是都很酷的哦。投胎后进入逆之轮回或逆之情结时，可以通过里面的地玄（灭）真人离开到凡世，原神形态受很多限制，不可以战斗，结婚、记录等等，但可以四处逛街、聊天等。\n\n\n投胎的时候身上的物品会消失。单人投胎时损失夫妻、帮派关系。不影响其他属性，可以更换性别造型。夫妻投胎时将可以得到一只带有特殊技能时光穿梭的珍珍做奖励，并且将累积夫妻共同投胎次数，但不可以更换性别，只能更换造型。\n\n投胎时如果选择了不同的人物造型，需要注意，不同人物使用武器不同。如原先时钩男形象使用钩做武器，换成拿环女时将变成使用环做武器，原来的钩就无法使用。\n\n投胎修行级别保留，奖励的修行级别和永久红利点数因投胎时担魔层次而异，层次越高，加的越多。基本上等同或者多于仙魔互转时加的修行等级。 \n\n地仙级投胎后修行等级=原修行等级+投胎时的等级 \n天仙级投胎后修行等级=原修行等级+投胎时的等级*1.5 \n金仙级投胎后修行等级=原修行等级+投胎时的等级*2 \n金仙级以上投胎后修行等级=原修行等级+投胎时的等级*2.5 \n\n\n投胎增加的永久红利点数不同与飞升的红利点数，这个点数是不会因为飞升或者下次投胎被百分比弱化到最小，而是做为附加点数额外计算的，也就是说如果投胎次数越多，这个点数累计的越多，要是有耐心和毅力，达到2000点都不是问题。 \n\n红利点数初始是0，投胎时候得到的奖励点数是红利点数+（地仙级是2，天仙级是3，以此类推）*5， \n\n修行层次是：地仙是2，天仙是3，金仙是4，金仙以上是5。 \n第一次投胎时根据不同修行层次，得到不同点数。 \n而第一次所得到的点数分别是：： 地仙级：10；天仙级：15；金仙级：20；金仙级以上：25点。  \n\n第二次开始，现红利点数=原红利点数+（修行层次）*5 \n", "source": "幻灵官服宝典"}, {"idx": 421, "orig_path": "【修炼区】->幻灵“兵解攻略”", "orig_data": "首先要得到无极天魔丹，然后在逆之洞窟第二层逆之往事找到魏无崖（64，38），才可以了解兵解的具体事项，并得到魏无崖的信。\n\n从魏无崖处得到信后，根据魏无崖的指引带上无极天魔丹前往吓死人洞窟二层找到天机真人（38，64），可以获得兵解所需要的凝神丹。\n有了凝神丹之后，才可以进行兵解。\n\n兵解的方法：点击菜单选项中的高级=>仙术=>兵解。\n\n兵解的条件：\n\n1、转世级别地仙以上，兵解前等级800级以上\n2、必须是以队长的身份组队，并且队伍中有队员。\n3、必须拥有天机真人炼制的凝神丹。\n\n兵解的好处：\n\n1、兵解的玩家兵解后等级将回到一级，同时原来的等级的一半将增加到修行等级上。 \n2、护法之人可以得到与兵解之人的等级差的十分之一做为奖励。如果护法是兵解之人的好友，将多得到这奖励的十分之一，如果护法是兵解之人的配偶，将多得到这奖励的十分之二。\n\n注:兵解的时候，身上的所有装备以及物品栏里的物品都会被系统自动回收。", "source": "幻灵官服宝典"}, {"idx": 422, "orig_path": "【修炼区】->“三转之转阿修罗”任务", "orig_data": "先到华山顶打到天魔散，然后到天灯地狱找到地狱飞龙（49，37），他就会给你一颗阿修罗飞升药了。\n\n满足条件后吃了阿修罗飞升药就可以飞升了。\n\n飞升阿修罗的条件：夜叉王1000级以上，内力和血全满，出征宠物是一只800级以上，忠诚100以上的黄龙使。\n\n友情提醒：飞升时请卸下身上装备，以免造成不必要的损失 ", "source": "幻灵官服宝典"}, {"idx": 423, "orig_path": "【修炼区】->“三转之转天仙”任务", "orig_data": "先到古铜洞窟2打出玉露丹，然后到仙客厅找到青云仙子（16，27），她就会该你一颗天仙飞升药了。\n\n满足条件后吃了天仙飞升药就可以飞升了。\n\n飞升天仙的条件：地仙1000级以上，内力和血全满，出征宠物是一只800--1200级，忠诚100以上的绿衣仙子。\n\n友情提醒：飞升时请卸下身上装备，以免造成不必要的损失 ", "source": "幻灵官服宝典"}, {"idx": 424, "orig_path": "【修炼区】->“夜叉王装备”任务", "orig_data": "到钉板地狱(第二层)(57,31)找魔女飞纷说话,她会让你用一只一级的\"红刀\"和5万两银子跟他换一件装备.\n\n抓到一级\"红刀\",然后身上放5万两银子,再找她说话,她会收走宠物和钱,同时给你一件飞纷皓月甲.\n\nPS:飞纷皓月甲 攻击:+50 防御:+150\n", "source": "幻灵官服宝典"}, {"idx": 425, "orig_path": "【修炼区】->“地仙装备”任务", "orig_data": "来到天空之城的记录点房间,进入下面的房间(12,28)找幻影兽小白说话!\n\n他会让你拿一只一级\"拂叶鸠\"和5万两银子跟他换一件盔甲.\n\n抓到一级\"拂叶鸠\",身上放5万两银子,然后再跟他说话,他会收走你的宠物\n\n和银子,给你一件幻影锦云甲任务(还不错哟).\n\nPS:幻影锦云甲 攻击+50 防御+100 血+100\n", "source": "幻灵官服宝典"}, {"idx": 426, "orig_path": "【修炼区】->“转魔”任务", "orig_data": "到盘龙洞窟2(43,59)找地狱守护魔女说话,如果满足飞升条件,即可进入战斗,打赢后得到\"魔道飞升药\",吃完就可以飞升为夜叉王了。补血也要注意点哟，吃完就飞了。\n\n友情提醒：飞升时请卸下身上装备，以免造成不必要的损失 ", "source": "幻灵官服宝典"}, {"idx": 427, "orig_path": "【修炼区】->“转仙”任务", "orig_data": "到武当山(95,57)找张三丰说话,如果满足飞升条件,即可进入战斗,打赢后得到\"仙道飞升药\",吃完就可以飞升为地仙了。\n\nPS：如果不想飞的朋友，千万别乱吃哟，战斗中补血也要注意点哟，吃完就飞了。\n\n友情提醒：记得把装备存起来 要不然就没有\n", "source": "幻灵官服宝典"}, {"idx": 428, "orig_path": "【修炼区】->三级房屋宠物医生攻略", "orig_data": "先去皇城的太和殿里跟陈大人说话，去家庭物品店，在物品店（59，53）的地方有一个宠物医生，身上带30万，跟她说话，就可以得到“医生邀请函”了，拿回家里（一定要三级房屋才可以），使用邀请函，家里就出现了一个宠物医生。从请了医生的第二天开始，每天可以在医生那里拿三颗丹药治疗宠物的受伤度。一颗天灵丹可以减少宠物受伤度30，两颗地灵丹，分别减少宠物受伤度10。 \n", "source": "幻灵官服宝典"}, {"idx": 429, "orig_path": "【修炼区】->“全本鲁公秘录”任务", "orig_data": "鲁公秘录据传为当年祖师鲁班所留，共分八卷，上面记载了各种秘方，有缘得到的人可以大幅度提高锻造经验，不过求此秘录之路可谓崎岖，不但要拥有超人的智慧，还需要挑战困难的勇气，不知有多少勇士为此书而奋斗着！\n\n在凰之谷（42，70）找到当年转世为鲁班的天机星，从他口里就可以得知八本秘笈的概要获得方法。此书一共有8卷：\n\n兑卷——为一本书卷，最初出现水城出生点，不论玩家等级多少，右键点击就能获得。之后该书卷会在下面地图上的对应坐标出现。\n卧佛沙城（92，53）、绿洲东郊（42，5）、情人谷（40，22）、赏月谷（14，38）、银罐谷（19，16）、落雁谷（17，21）、羁马谷（72，42）、沙盗洞口（32，21）、青幽洞（23，40）、镜雪原（14，25）、鸟鸣谷（16，23）、春水桥（54，59）、敕勒川（60，79）、西雪岭（38，49）、浮影水城外郊（31，40）、坠泪岗（32，21）、明月桥（11，15）、闲情园（34，43）、松竹林（27，13）、断壁（25，22）、西码头（36，8）、东码头（24，18）、断魂涯（10，27）、石壁洞口（38，17）、怨灵洞口（65，64）。\n\n该卷使用后增加10点锻造经验。 上面记录的秘方为：\n霸王钳坎水、凤凰羽翼离火、龙鳞艮土、象牙震木、佛经乾金，主炼佛经，即可得到震卷秘录。\n\n离卷——在剑池谷战斗，会随机得到离卷的战斗奖励。目前该奖励的获得几率调整介于一般战斗中药品奖励几率和装备奖励几率之间。该卷使用后增加20点锻造经验。上面记录的秘方为：\n皂角鞋坎水、狼爪离火、霸王钳震木、龙鳞乾金、鳄鱼骨艮土，主炼皂角鞋，即可得到狂狼战靴。该物品属性为－生命值100，＋内力1000，－攻击50，＋敏捷500，1000修行等级用。\n\n震卷——得到兑卷后，根据上面记录的秘方，收集物品合成而得。该卷使用后增加30点锻造经验。上面记录的秘方为：人鱼之泪坎水、凤凰羽翼离火、象牙震木、龟壳乾金、水纹坠艮土，主炼水纹坠，即可得到长命锁。该物品属性为＋生命300，－攻击50，800修行等级用。\n\n坤卷——到水城找蔡参将，如您的偷值技能在20点之上的情况下，可通过偷取方式成功则获得坤卷，如运气不好，偷取失败，您将被送入监狱牺牲偷值。该卷使用后增加40点锻造经验。上面记录的秘方为：\n玄金镯震木、人鱼之泪坎水、狼爪离火、龟壳乾金、龙鳞艮土，主炼玄金镯，即可得到磐龙樽。该物品属性为＋生命200，＋防御230，＋敏捷200，2万修行等级用。\n\n艮卷——此卷藏在水城宝洞。经常来寻宝有机会获得艮卷。该卷使用后增加50点锻造经验。上面记录的秘方为：\n正气甲乾金、正气甲兑金、象牙震木、龙鳞坎水、鳄鱼骨离火、霸王钳艮土，主炼乾位正气甲，即可得到正气战衣。该物品属性为＋生命400，＋内力2000，－攻击100，＋防御300，＋敏捷100，2万修行等级用。\n\n坎卷——带本佛经，和一件自己锻造的1000修行加敏1000以上的靴子，找到天机星换得坎卷。该卷使用后增加60点锻造经验。 上面记录的秘方为：\n龟壳乾金、霸王钳兑金、象牙震木、人鱼之泪坎水、凤凰羽翼离火、龙鳞艮土，主炼乾位龟壳，即可得到宠物[谨慎]技能书。该物品使用后，出征宠物可以学会谨慎技能。\n\n巽卷——带村民衣（九转天心丹任务物品）、白色绣球花（雪狼湖任务物品）、妖怪内丹（名剑山庄除妖任务物品）找山城的巧匠凌风，可换得巽卷。该卷使用后增加70点锻造经验 上面记录的秘方为：\n玄武丹乾金、穿云丹震木、柔肠丹坎水、神凰丹离火、青龙丹艮土，主炼乾位，可得锻造效果相当于五个顶级毒药的蓝水晶。\n\n乾卷——在规定时间内去单人天关、夫妻天关、兄弟天关找归隐的将军楚青鸿购买。具体出现地点为单人天关的90关（0点－12点），夫妻天关第20关（12点－18点），兄弟天关第70关（18点－24点）。 上面记录的秘方为：紫阳丹放于乾金、无极草震木、冰石坎水、无忧失心草离火、千年灵芝艮土，主炼乾位，可得提升人物功力的升级圣药通玄丹。该物品可以提升人物等级10级。\n\n如收集齐上述八卷，放入五行炉中各自对应位置，主炼乾位，如合成全本鲁公秘录，使用后，您的锻造经验将快速提升一千点。\n\n另外:秘方中各个材料来源：\n\n龟壳——坠泪岗战斗掉物品。\n龙鳞——吓死人洞2层战斗掉物品。\n狼爪——踏雪原战斗掉物品。\n凤凰羽翼——凰之谷战斗掉物品。\n鳄鱼骨——东码头战斗掉物品。\n象牙——西雪岭战斗掉物品。\n霸王钳——不归海岸战斗掉物品。\n\n人鱼之泪——“乒乓鱼任务”物品的人鱼项链，到海底城找人鱼三公主交换得到。 \n", "source": "幻灵官服宝典"}, {"idx": 430, "orig_path": "【修炼区】->“摆摊,训兽师和加血MM”攻略", "orig_data": "先到皇宫的太和殿找吴大人（20，20），跟他说话后，选择买其他的东西，就会出现“帮派训兽师，帮派护士，市场管理员”三个选项，点击其中一个就可以购买了（只有三级帮派的帮主和副帮主才可以买哦）。买完以后回到帮派。\n\n在帮派总坛里双击使用帮派训兽师，就会出现一个NPC，这就是帮派训兽师了。放完以后，右键点击训兽师，就可以往里面存放宠物了，存放的宠物同时也是帮派的守护兽，当别人闯入帮派的时候，就会先跟这些守护兽战斗，打赢了才能进入。宠物在保护帮派跟别人战斗时牺牲对宠物没有任何影响，这里每个人都可以将宠物存放进去，不过不是每个人都能取出来哦，只有帮主才可以取出宠物。\n\n在帮派总坛里双击使用帮派护士，就可以放下一个NPC，点击该NPC就可以加血了，不过加一点血需要一两银子哦（包括任务和出征宠物的）。收入直接放到帮派基金里。\n\n在帮派占领的地图上（也就是总坛外面），双击使用市场管理员，就会出现一个NPC，放了市场管理员以后，该地图就可以宠物摆摊了，收费和税率可以通过点击该NPC修改。收的钱直接进入帮派基金中。帮派的长老可以将一些不遵守规则的摊子踢走（可别乱踢哦）。\n", "source": "幻灵官服宝典"}, {"idx": 431, "orig_path": "【修炼区】->“二级房屋升级”攻略", "orig_data": "到皇宫的湖滨小区参观，可以看到新的二级房屋样板房，款式多多哦。\n\n如果有兴趣，可以先进入样板房内参观（很漂亮哦，特别是中式房屋，古色古香，还有水雾缭绕的户外温泉哦。）。满意后花费1500万购买了二级房屋的设计图。\n\n带着这设计图回到自己已经购买好，并且建造了一级房屋的小家旁，点击房屋后会出现选项，原来的拆房选项变成了拆房或升级房屋，选择该选项后出现的对话框除了拆房的几个选项外，还有个升级成二级房屋，点击后房屋就升级成二级的了\n\n可以开始重新添置家具咯。 \n\n与一级房屋相比，房屋内使用面积大大提高，明显建筑水平也高了很多，有了庭院哦。而且一级房屋只能放置特殊的物品箱两个，而二级房屋这类特殊物品可以放四个哦！ 各类家具装饰品相加一共可以放置二十个。\n\n\n注意：二级房屋必须在一级房屋的基础上升级。", "source": "幻灵官服宝典"}, {"idx": 432, "orig_path": "【修炼区】->“安家置业”攻略", "orig_data": "等级达到三级的帮派中的长老级以上领导人物，在皇城可以找到负责销售建房许可证的林大人（111，62）。只要花五百万就可以买到建房许可证，使用建房许可证就可以在帮派占领的地图上建立一个住宅小区。\n\n单单购买了建房许可证是不够的，要找站在林大人边上的刘大人（111，70）购买地皮开发许可证才可以开发地皮，只有开发过的地皮，才可以在上买内建造房屋。地皮开发证需要十万元。\n\n皇城的黄大人（37,62）是房屋设计院的，可以通过他去参观房屋设计院设计出来的家庭住房。在他这里还可以购买到空钥匙（一千元），空钥匙是用与家庭配钥匙的。\n进入参观可以看到初级三种样式的房屋，有中式、阿拉伯式、欧式三种风格，选择自己喜欢的一种就可以花费五百万购买该房子的设计图纸了。\n\n\n购买了建房许可证与地皮开发证以后，到自己帮派占领的地图上就可以双击建房许可证，出现住宅小区的标志后，选择一个合适的地方以后就可以放下住宅小区了。\n建立好住宅小区后，用右键点击代表住宅小区的石碑后就可以进入住宅小区了。\n\n进入小区以后，选择合适的地方后，就可以双击开发许可证进行地皮开发了，开发后的地皮是一块颜色与土地略有不同的方型土地。右键点击已经开发好的地皮就可以购买了，购买地皮需要二十万，购买以后的地皮就变成一块被栅栏圈围的土地。从购买地皮之日开始就需要缴纳每天一万元的管理费用。\n\n点击被栅栏圈围的土地，会出现选项，主要功能为建造房屋、缴管理费、退地皮，如果有房屋设计图，就可以开始建造房屋。点击缴管理费一次就缴了5天共50000元的费用，多点就可以多交纳，最多可以缴30天也就是一个月的费用。退地皮是将此地皮退还给帮派，能够得到5万元。\n\n建立好房屋后，就可以看到自己心爱的小窝建好了，点击房屋后，可以看到自己已经缴了管理费用的天数以及回家、缴管理费、拆房、门锁相关等选项。\n\n选择回家以后就可以进入家庭，除了房主夫妻以外，其他人想进入必须要有钥匙。\n选择拆房以后，房屋会变成地皮，但是房屋内的家具等不会消失，只要在同地图上重新建造房屋，东西就会回复。这个功能是将来房屋升级使用的。（如果变成地皮以后，选择退地皮，那么家具等物品会彻底消失的。）\n门锁相关：可以选择花1000两配钥匙，配了钥匙以后就可以将钥匙给朋友，让朋友进入自己家。如果觉得自己家钥匙所托非人或者给太多人了，就可以花10000两换锁。换锁以后，其他人就不可以使用原来的钥匙进入了。\n\n这样，就可以安家置业了。\n\n\n注意：购买建房许可证与地皮开发证都是需要使用帮派基金。\n\n初级的房屋可以放置存储物品和宠物的东西两个。如果放两个存物品的，那么就没有办法再放置存放宠物的了。\n\n房屋管理费任何人都可以缴，只要点击房屋后点击缴管理费就可以缴了。 管理费如果欠缴时间超过10天，就无法进入。如果欠缴时间超过20天，帮派就可以强行收回地皮。\n", "source": "幻灵官服宝典"}, {"idx": 433, "orig_path": "【修炼区】->“帮派购买总坛”任务", "orig_data": "京城太和殿内的吴大人（20，20）负责出售帮派总坛，可以通过他参观帮派总坛的样品房。\n\n进入的样板房都是已经装修过的，都摆放了一些家具、装饰，然而据说这些家具是非卖品，购买帮派总坛的时候只能买到没有装修、没有家具的房子，想要有家具等装饰，还必须再行购买。\n\n每个样板房的入口那都有一个售房NPC，与他们对话后可以购买所在地图的样子的总坛，也可以选择参观下一种帮派总坛。\n\n现在一共有五种样式的样板房可供参观购买，有古典风格、江南庭院式，还有西欧风格的。在相中自己喜爱样式的总坛以后，帮主或者副帮主级别的帮派领导人物与出口的售房NPC交谈，就可以将帮派基金划拨三千万给NPC，会得到一个帮派龙虎令，再找该NPC就可以领取到相应的房产证。（前提条件本帮派等级已达到三级，帮派基金有三千万以上。）\n\n带着房产证选择一张地图作为自己的帮派总坛所在地之后，只需使用该房产证，放置好帮派传送NPC就大功告成了！一张地图只可以被一个帮派占领，早来早得，可不要错失良机哦。\n\n注意事项：\n\n1、当成功占领一块地图后，帮派龙虎令会被收走。如果没有成功占领地图或者将房产证不慎遗失时，只要帮派龙虎令还在，就可以重新向NPC领取房产证。如果帮派龙虎令丢失，那...就白白损失了三千万了。\n\n可以占领的地盘的列表如下：\n\n浮影水城外郊、青风原、坠泪岗、四桥原、闲情园、松竹林、怨灵洞口、剑池谷、石壁洞口、西码头、枯井原、断魂涯、观日桥头、东码头、断壁、银罐谷、绿洲东郊、金轮谷、落雁谷、羁马谷、华山顶、情人谷、梦佛窟、赏月谷、羁马谷、酒鬼冢、流沙原、净沙原、独孤亭、晚枫林、斑鸠小舍、回首亭、守望林场、暮归道、双印谷、镜雪原、松雪野、踏雪原、斧青谷、犁春原、黄泥岗、鸟鸣谷、羊肠道、独木原、春水桥、雪融谷、炊烟谷、绿幽洞、巨菇洞\n", "source": "幻灵官服宝典"}, {"idx": 434, "orig_path": "【修炼区】->“帮派升级”任务", "orig_data": "二级以上的帮派帮主、副帮主在紫禁城找到巫将军(70,55),可以从巫将军处得知帮派场所升级好处多多，而且3级的帮派才有资格拥有帮派场所。\n\n要升级就需要先帮巫将军的忙，到华山顶找到符冲（28，16），告诉他皇家运输队想请他帮忙的事情，再打败了他的5只800级别的幻灵兽（大刀）后，符冲同意帮忙，将自己的无双剑交给玩家。\n\n带着无双剑重新找到巫将军，得知只要身上带着现金1000万帮派升级费用就可以升级了。\n将无双剑与1000万现金交给巫将军后，帮派就从二级晋升成三级了。\n再走到里面太和殿内找到吴大人，就可以找他购买帮派地图了。\n\n升级帮派的好处：三级以上的帮派才会有资格拥有自己的帮派地盘，还可以自己开设赌场、收取摆摊杂税等等。 无双剑（攻击+150）", "source": "幻灵官服宝典"}, {"idx": 435, "orig_path": "【修炼区】->“拿宝箱钥匙”任务", "orig_data": "在凝露山城可以找到地理学家汪思敬（60，32），跟他说话，他会告诉你只要帮他抓一只凝露山城门口的独行就可以换一把黄色木箱的钥匙。\n\nPS：拿到这把钥匙，在每个小时的前几分钟就可以到水城客栈底下的宝洞里开启宝箱领取奖品了。\n", "source": "幻灵官服宝典"}, {"idx": 436, "orig_path": "【修炼区】->“拿PK赛入场令”任务", "orig_data": "在沙城找到李拳师（74，46），只要通过他的考验（5只200级的嗷日犬），就可以得到参加PK大赛的入场令了。", "source": "幻灵官服宝典"}, {"idx": 437, "orig_path": "【修炼区】->“林天的玉佩”任务", "orig_data": "林天的玉佩\n\n在山城跟林天（5，44）说话，他会让你去帮他探望他哥哥，并且给你一块玉佩做信物。\n\n在PK场里找到林捕头（79，79），他会帮你补满血和内力，并且给你一块玉佩。\n\n再回来找林天，他就会告诉你夫妻天关的秘密。\n", "source": "幻灵官服宝典"}, {"idx": 438, "orig_path": "【修炼区】->“帮派升级”任务", "orig_data": "在紫禁城找到巫将军(70,55),他会让你带上他的令牌去剿灭强盗。\n\n到黄泥岗找到强盗（26，50），跟他说话进入战斗（5只800级的西皮），打赢以后得到强盗战刀。\n\n再回来找到巫将军，身上放500万两，他就会帮你的帮派升级了。\n", "source": "幻灵官服宝典"}, {"idx": 439, "orig_path": "【修炼区】-> “打入天空之城”任务", "orig_data": "到武当练功房(20,18)找无极真人说话,如果不是200级以上地仙,则进入战斗,打赢可进入天空之城。\n\n如果是200级以上地仙则可以直接进入。\n\nPS:要打的都是900级的风舞哟。\n", "source": "幻灵官服宝典"}, {"idx": 440, "orig_path": "【修炼区】->“打入地狱”任务", "orig_data": "到地焰洞（20，14）找到地狱守护MM，如果不是200级以上夜叉王，则说完话后进入战斗，打赢以后可进入地狱。\n\nPS：战斗中打的是900级的怪物哟，千万小心。\n", "source": "幻灵官服宝典"}, {"idx": 441, "orig_path": "【修炼区】->“进海底之城”任务", "orig_data": "到阳光渔栈(5,15)找白龙使说话,他会告诉你只能变成蛋蛋鱼,乒乓鱼或丸子鱼的样子才能下去。\n\n变成上述三种鱼中的一种，再跟白龙使说话就可以下到海底之城了。\n", "source": "幻灵官服宝典"}, {"idx": 442, "orig_path": "【修炼区】->“水属性任务”攻略", "orig_data": "恒河星溯变化出奇、层出不穷，一种神秘的力量创造了幻灵世界。但是很少人对此有所了解，将毕生心血投入于研究的悠然老人，在花费了一生精力之后，终于对此力量有了一些了解，常常在断壁一带的悠然老人（58.48）对好学的人是很热心地讲解构成幻灵世界的神秘力量的情况，以及由此神秘力量一分为五繁衍出的各系幻灵兽的故事。了解这些情况以后，可以知道，如果想追寻那五系的力量，则需要通过各系各个宠物的考验。\n\n良禽择木而栖，灵兽择主而侍。西码头的“骑士龟勇勇”，最大的愿望就是能跟随一位强大的主人，为了能找到一个配得上它的主人，它在西码头苦苦等候。它听说华山经常有高人出没，但由于路途遥远它至今仍未找到机会去华山。如果玩家愿意帮助，就可以到华山附近去帮“骑士龟勇勇”物色主人。当到达华山亭时玩家就可以碰到武艺已趋大成的“剑无涯”，他正想找一只合适的幻兽陪伴他。“剑无涯”让玩家带着他的本命玉牌给“骑士龟勇勇”，只要看到他的玉牌幻兽就会知道他的实力。“骑士龟勇勇”为了表示感谢，将会送给玩家一块“水行令”，凭着这块令牌就可以去寻找水属性的力量。\n\n剑池谷“琳琳飞羽”做“甜蜜露”还缺少一种“神奇花粉”，想请玩家到坠泪岗她姐姐“盈盈翠羽”那里拿。但“盈盈翠羽”在前些时候把“神奇花粉”都送给他的好朋友丘丘了，如果尽快的赶去可能还会剩些。到吓死人洞“珍珍丘丘”那里拿到神奇花粉交给“琳琳飞羽”可以得到“水行令2”\n\n净沙原“厚皮鳄霹雳（32.6）”皮坚肉厚，对自己很有信心。放言所有来寻水力量的人只要打败他们几个兄弟就算通过他的考验，可以得到它送出的“水行令3”。选择战斗的话，只要打败5只500级的厚皮鳄就可以得到“水行令3”\n不归海岸的“蓝牙”最近正为他母亲的病而烦恼。她母亲的病只有一种“蓝幽草”的才能根治，但是拥有这药的人不喜欢幻兽，把他给赶出来了。得知玩家是为追寻水的力量而来的，想请玩家帮助取“蓝幽草”。断魂涯的“糊涂老人”因为他的小儿子自去抓一只幻灵兽不小心死了，所以恨透了幻灵兽。所以玩家再拿“蓝幽草”的时候千万不可以说是为帮“蓝牙”的忙。带着“蓝幽草”交给“蓝牙”，为了表示感谢它将会送你“水行令4”\n\n带着“水行令4”到斑鸠小舍（68 48）找“霓裳”。“霓裳”在很久以前受过一个人的帮助，一直没有机会报答，只要玩家能帮他恩人就算过了它这关。原来它的恩人无忌是个冒险家，整天爱到处乱跑，这天在沉没的城市（46 10）被一群幻灵兽给困住了，玩家只要帮忙赶跑那5只700级的铁甲龟就可以得到物品“冰泪坠”回斑鸠小舍“霓裳”那里换取“水行令5”\n\n凰之谷“苦行龟”最大的愿望就是可以走遍天下，因为重任在身没有机会出游而倍感遗憾。如果玩家可以找到一只500级以上忠100的苦行龟来代替它，那么将可以得到“水行令6”\n\n“乌哩头小弟”(绿幽洞：11 35)最崇尚力量，如果玩家能向它展示出自己的强大能力的话，那么进入下一关就轻而易举了。它的哥哥——乌哩头大哥在赏月谷训练一些徒弟舞枪弄棒，如果玩家能打败他们就可以得到乌哩头小弟的认可从而获得进入下关的令牌。到赏月谷与乌哩头大哥对话并打败它手下的7只900级的乌哩头得到物品“考验之牌B”回到绿幽洞交差得到得到物品“碧水令7”\n\n徘徊林（17 31）“蛋蛋鱼”闲来无事，昨夜斟观天象，发现树城一带的五行之气有紊乱之相，其中水性力量似有削弱，想请玩家帮助查明原因。带着“调查委托书”找到树城“长者”（61 97）得知：这阵子树城唯一的水井不知道怎么不出水了，害的大家都要跑到水源丰富的水城去取水喝。并告知玩家树城水井的水源都来自山城那附近一带，到那调查可能会有些线索。原来，不久前鳄鱼霸王看到山城水源充足从沙漠移居到此霸占了下游的水源。打败鳄鱼霸王手下7只1100级的大嘴鳄赶跑鳄鱼霸王后，树城的水源终于回来了，树城的水性力量从而恢复如常。为了表彰玩家的勇气和善心蛋蛋鱼将会把“水行令8”交给玩家。\n\n水城（62 5）“羽衣”一直以来都在找寻一种叫神圣之羽的东西，却渺无音信，最近终于有了点头绪，玩家带上羽衣赠与地精灵之链，去青灵洞，就会得到这个传说种的神羽。但神圣之羽的主人——纷飞，从不轻易把神秘之羽送人，只有强者才有资格得到它。打败纷飞手下的7只1300级的粉衣后，玩家的能力得到了纷飞的认可，得到物品“神圣之羽”。得到圣洁而美丽的羽毛后，羽衣兑现了她的承诺，将“水行令9”送给了玩家。\n\n沙漠，水属性力量最弱的地方。山城“口袋鸭扁嘴”自他一个小兄弟跑到沙漠后，夜不能寐，当心兄弟会遭遇危险。看到玩家一路过关斩将而来，因而想请玩家帮忙将它的小兄弟安全的带回。“救宠一命胜造七级浮屠”带上“委托书”去青之绿洲寻找“口袋鸭嘎嘎”吧（26 42）。原来扁嘴的兄弟答应朋友一定要带这里的青灵之水回去，因这有几只“幻兽守卫”（青之绿洲：51 40）守着，凭它的力量无法打败，所以一直僵持到现在。打败9只1300级的乌哩头得到物品“青灵之水”。口袋鸭嘎嘎得到青灵之水后，让玩家将一封报平安的家书交给他大哥，就飘然而去给朋友送水了。回到山城，口袋鸭扁嘴得知兄弟平安后，赠与玩家“水行令10”\n\n水族的制衣高手灵衫（雪城：92 56）花了很长的时间精心制作了一件彩云衣，最近被雪融谷的幻兽怪盗所偷。得知玩家正在追寻水之力量，请求玩家帮忙夺回衣服。幻兽怪盗不甘心轻易将衣服交还，非得要玩家用武力夺回。打败7只 1500级的空手道后，得到物品“彩云衣”。雪城灵衫因彩云衣的失而复得而欣喜若狂，将“水行令11”送给玩家。\n\n“山中无甲子，寒尽不知年”。聋耳地狱的“红刀”守卫地狱多年，好想能有一次长假可以出去看看世面。但只有得到“地狱天使”（冰封地狱：20 30）的批准，“红刀”方能请假。“地狱天使”得知红刀不安于工作，勃然大怒。但答应，只要打败他的幻兽（9只1700蓝发魔姬）就破例放红刀出去几天。带着“特赦书”交给聋耳地狱的“红刀”为了报答玩家，红刀将“水行令12”给玩家作为谢礼。\n\n独木原的“欧欧”在玩家身上感觉到水族的力量波动，得知玩家是来接受水之力量的考验。因而让玩家帮忙寻找个杀伤3500的毒药来跟人换一样东西，你如果能帮弄来毒药，就可以过关了。但这种毒药只能用当地战斗奖励的两种物品锻造方可得到。交给“欧欧”3500的毒药后得到“水行令13”\n\n“行万里路，读万卷书”愣头青为了增长见识出门历练。本来打算下一站是要去沙城，可是通往沙城的唯一通路上有些山贼在守着，它打又打不过，又出不起买路钱，。只好滞留在树城宠物店。得知玩家身怀水行令，想请玩家帮忙到石壁洞口“山贼”（左边的那个）处拿过路条。靠打家劫舍为生的山贼自不肯放过到嘴的肥肉。玩家要么选择孝敬他们5000两银子，要么就只好用武力通过了（9只1900的小妖）。为愣头青拿到过路条后，身无长物的愣头青把“水行令14”送给玩家，同时让玩家替他照顾水族的幻兽——巧巧。\n水的力量看似柔弱，其实蕴藏着巨大的能量，它没有起点也没有终点，从恒古以来就存在了。道德经有言：上善若水。因此只有善良勇敢的人才可以领悟它的真谛，找到它的神秘之源。\n\n榕盘谷的“卜卜”对玩家是否了解水的力量还略带疑问。因而让玩家到紫苔洞窟（54 29）找水族的长老，只要得到它的认可，就算通过了卜卜这关。水族长老的考验很简单，只要打败它手下几个水族的幻兽（9只2100级的逐浪仙子）就可以了。战斗胜利会得到“水长老的认证”，从而表明玩家已经有了继续追寻水族力量的资格，回到卜卜处换取“水行令15”“摇爷”在辗肢地狱等候追寻水之力量的人已经多年了，但是能来到它这关的却寥寥无几。因而它从不怀疑那些能顺利到达它这关的玩家的实力。只是有个和它一起来这当差的水族朋友，已经很久没见面了，甚为记挂，想让玩家帮忙去问候一下。带着摇爷“给朋友的信”去聋耳地狱找“红刀”。刚被批准放假的红刀，得到老友的音讯大为感动，请玩家带一块温玉送给摇爷。对于玩家的宅心仁厚，摇爷大为赞赏，把“水行令16”交给玩家继续寻找水之力量。\n\n东码头（33 17）“硬骨鳄”的几个孩子不知天高地厚，成天就想着出去闯天下，让这位当母亲的很是担心。为此，想请追寻水之力量到此的大智慧之人帮忙说服它的孩子回家。自认为实力在水族中已经是数一数二的“鳄鱼兄弟”们正在西码头玩耍，它们向往的是更为广阔的世界，想创出自己的一番天地，如何肯听从母亲委托人的劝告。要想让它们回家只有打败它们（10只2300的硬骨鳄）。在见识了玩家的手段后，鳄鱼兄弟终于明白了天外有天的道理，写下了“孩子的悔过书”交给玩家。看到悔过书后，“硬骨鳄”深表感谢，将“水行令17”交给玩家。并且，只要玩家从树成宠物店愣头青那得到的水族幻兽——巧巧的等级为800-1000级，它还会将巧巧的等级增加201级。\n\n\n新山城（73 84）“绿甲”有位朋友“疑惑”身为水族的一分子，却对水的力量不甚了解。想请追寻水属性力量的而来，对水之力量已经颇有研究的玩家帮忙去提点一下。带着绿甲的嘱托到深蓝海城找到“疑惑”，它想请教你水的力量的特点。回答疑惑的问题后会得到与你所答的内容相应的物品，回到新山城交差，只要你的答案是对的就可以得到“水行令18”\n\n水族有一件世代相传的镇族之宝，叫做避水珠，有了这样宝物，即便是凡人也能去任何有水的地方。但在前些天水族庆典的时候，有人把避水珠偷了去。镜雪原（36 41）的“大嘴鳄”想请追寻水之力量的水族朋友帮忙找回宝物。偷盗“避水珠”的“小贼”远逃到了观日桥头（34 12），当玩家找到小贼后他会矢口否认偷了避水珠，只有使用武力战胜他手下的10只2500的酷毙象，他才会把避水珠交出。镜雪原“大嘴鳄”深感大德，将“水行令19”交给玩家。\n　　\n\n居住在炮烙地狱（30 41）的“铁甲龟”常年与朋友失去联系，很是想念以前的老朋友，想给远在雪城的灵衫捎去一封信。得到多年失去音信的朋友的问候，灵衫颇为感动，由于“铁甲龟”一直以来腿脚就不便，为了让它早日康复，灵衫让玩家带“活络油”给铁甲龟。不仅联系到了朋友，而且还感受到朋友的关怀，铁甲龟感激涕零，答应将“水行令20”送给玩家，同时将玩家身上所带的800级至1000的彩衣（巧巧进化而成）增加201级。\n\n“丸子鱼”在武当练功房苦苦修行，正到了即将进化的紧要关头，听说人类有升级药可以提升级别，因而想借助升级药的神奇功效来突破修练途中遇到的障碍。送上升级药，丸子鱼就会兑现诺言给你通往下关的“水行令21”。\n\n弱肉强食的江湖，实力证明一切，只有强者才能通过山城宠物店“戛戛”的考验。“戛戛”有个兄弟在华山一带训练手下。带着“戛戛”的“考验推荐信”去华山脚找“幻兽训练官”，如果能打败它手下10只2700级的戛戛就可以得到一块证明你通过考验的“验证之石”回山城宠物店向戛戛换“水行令22”\n\n“粉衣仙子”虽然荣登仙籍，但却没有得到仙境居住权，只好跑到降尘台 (66 79)暂时落脚，为了能在仙境中活得更好，粉衣仙子多次向“仙界管理员”（紫阳门 26 8）申请居住权，却始终未能如愿。原来要得到居住权的办法只有两种，一种是花费200万两银子来购买，一种是通过暴力来夺取（10只2900的地藏）。当玩家为粉衣仙子“居住权证”后就可以得到“水行令23”\n\n皇宫中一年一度的幻兽大赛就快要到了，居住在皇城（81 91）的“乒乓鱼”想在这次大赛中出人头地，但听说今年有许多厉害的家伙参加，因而想找一种叫“幻兽之灵”的饰物来提升能力。而此种饰物只有在遥远的凰之谷中有位隐居的“老工匠”才会制作。由于制作幻兽之灵的一种必须材料——兽玉已经没有了，如果玩家能拿到这种材料（出谷战斗就有机会得到物品“兽玉”），“老工匠”会破例帮忙做一个。得到幻兽之灵的乒乓鱼为表示感谢，会把通往下关的“水行令24”送给你。\n\n\n水系幻灵兽是所有幻灵兽中最庞大的一系，逆之往事（23 52）的“悠然老人”对玩家能做到这一步大为吃惊。只要玩家的水系图鉴做了20个就可以回答悠然老人提出的问题。根据回答的不同选择不同的考验者。如果回答“我想要拥有强大的力量”，就可以得到霸王令去找敖雪兽霸气通过考验。如果是回答“对未知的力量的好奇心”，则得到奇云令，可以去找幻云兽瑶奇接受考验。\n\n霸王令任务：\n水族中有一件宝物——聚水珠是由空灵园（31 87）找“敖雪兽霸气”保管的，后来它出游时不慎丢失了，对此它一直耿耿于怀。为了考验追寻水之力量的人的智慧和勇气，霸气要求玩家去寻找聚水珠。如果玩家能帮忙找回遗失的宝物，就可以顺理成章的得到水属性的力量了。为了寻回宝物，霸气委托它的朋友石老头帮忙调查此事。带着霸气的族长令去将军碑谷找石老头，就可以得知聚水珠落到了一个叫乌云盖天的豪杰手中。这家伙的脾气孤僻，很难对付。要从他手上拿回聚水珠恐怕很难。石老头让玩家带着名帖去名剑山庄练功房找“乌云盖天”。性格孤僻的他要求玩家打赢了他的幻兽才肯给出聚水珠。完成任务后，带上聚水珠去找霸气，就可以在霸气的帮助下提升300级的等级（当然不超过最高等级），并得到碧水令。到此完成水属性任务霸王令剧情。\n\n奇云令任务\n\n带着“奇云令”到空灵园找幻云兽瑶奇。瑶奇要玩家完成两件事情就算通过它的考验。其一是，它听人说皇城中有种叫翡翠白玉汤的东西，是天下的美味，常心向往之，只是无缘得以一尝，希望玩家能帮它取来，了却心愿。其二就是要玩家把所带着的水族的彩虹仙子（彩衣进化而成）练到800级。\n\n皇城甬道（13 18）的“悟食老人”大内御膳房的总管，小小翡翠白玉汤对他来说自然不在话下。但是假公济私的悟食老人家中修缮园子尚缺10万两银子，如果玩家答应出这笔钱就可以带着“悟食老人”的家书去水城找正在筹钱的“悟食老人”的儿子悟施人交钱。交给他10万两银子后就会得到一封家书回悟食老人那换翡翠白玉汤。带着“翡翠白玉汤”，并让800级以上的彩虹仙子处于出征状态，瑶奇就会用水属性的力量把“彩虹仙子”进化成“敖云兽”。 ", "source": "幻灵官服宝典"}, {"idx": 443, "orig_path": "【修炼区】->火属性任务”攻略", "orig_data": "恒河星溯变化出奇、层出不穷，一种神秘的力量创造了幻灵世界。但是很少人对此有所了解，将毕生心血投入于研究的悠然老人，在花费了一生精力之后，终于对此力量有了一些了解，常常在断壁一带的悠然老人（58.48）对好学的人是很热心地讲解构成幻灵世界的神秘力量的情况，以及由此神秘力量一分为五繁衍出的各系幻灵兽的故事。了解这些情况以后，可以知道，如果想追寻那五系的力量，则需要通过各系各个宠物的考验。\n\n双印谷逆之洞窟外的乐乐熊思思，他听说逆之洞窟里头有一些他没有见过的熊猫绿锦宝，所以想来此地寻找绿锦宝陪他玩耍，不料绿锦宝呆在洞窟最深处，而此洞内还有其他猛兽盘踞，所以思思不敢进去寻找绿锦宝陪他玩，玩家若是愿意帮助他，找一只一级的绿锦宝来陪他，思思为了表示感谢，将一块火行令交给他，告诉玩家凭这令牌就可以继续接受火系考验了。收下令牌后思思提示玩家去找他的兄弟欢欢熊欣欣接受考验。\n\n\n十步杀一人，千里不留行！是多么潇洒的江湖生活写照，一心想过仗剑江湖、快意恩仇的生活的欣欣呆在水城的一艘船上（48.85）。欣欣虽然有心进入江湖，却苦于无一技傍身，一直没能通过蔡参将的考验。带着火行令一，找到欣欣，欣欣会请玩家帮忙寻找学习催眠所需要的训兽经，带训兽经给欣欣后，可以得到火行令二。并得到提示寻找蜜蜜熊安安进行下个考验，听说安安在很久以前被人收服去看守一个神秘的地方。\n\n幻灵中由幻灵兽看守的地方有夫妻天关、单人天关等地，经过摸索来到了单人天关的第四层。看守第四层的果然就是安安。安安发现玩家身上带有火行令，便询问玩家是否来此接受考验，并拜托玩家帮忙寻找他的妻子静儿。同意后离开天关来到山城，遇上失忆的静儿（65.71），为了帮她恢复记忆，玩家跑到华山找到采药人朱照启求取灵药华岳仙芝，花费6000钱两后得到华岳仙芝给静儿，静儿恢复了一些记忆，但是由于身体还过于虚弱，所以请玩家帮忙带送家书给安安，安安收到家书后，为表感谢就将通过他考验的证明-火行令三给了玩家。\n\n带着火行令三到将军碑谷找到正在水边观赏鱼儿的迷惑小华，小华很喜欢鱼，听说海底之城聚集了世上最美的鱼儿，因此很想去那里，所以请玩家帮助寻找一只一级的乒乓鱼好让他可以变化成乒乓鱼的样子混入海底之城。帮他找到乒乓鱼后可以得到火行令四。\n\n喜欢到处旅行的迷茫小伟这次却被沙盗洞穴而难住了，他听说这个洞内怪石嶙峋、景色幽奇。于是远道而来想进去观赏，可是到了沙盗洞口(36.27)才知里面怪物凶狠异常，小伟打不过它们，可又不想空跑一趟，很是为难。他心想少林武功独步武林，想学会少林金刚掌定能打败那些怪物，所以请玩家帮助找到学习金刚掌的佛经给他，让他可以学习。（临时抱佛脚？！ ^0^）帮他找到佛经可以得到火行令五。\n\n天生没有方向感却又疼爱老婆的小妖阿威，由于老婆喜欢雪凤凰，于是就打算跑到凰之谷找一只哄老婆开心，却不料由于自己一时小气没买小贩兜售的地图，加上自己没有方向感，没走一半就在暮归道（8.28）这儿迷路了。只好请玩家帮忙找一只一级的雪凤凰好回家交差。帮了他的忙后可以得到火行令六。\n\n百兽之王辛巴最喜欢在敕勒川（80.50）晒太阳，玩家找他接受考验时，着实让不喜欢追求力量、喜欢开开心心过日子的辛巴头疼了一把。经过思考后辛巴出了个不算太难的题目给玩家，他听说水城下有个宝洞，宝洞内有很多宝箱，其中褐色宝箱中有不少好东西，但是需要有对应的褐色宝箱钥匙才可以开启。于是请玩家找一把褐色宝箱的钥匙给他。帮他找到褐色宝箱的钥匙后可以得到火行令七。\n\n银罐谷的匆匆小遥（45.27）对追求力量的人都是严格考验的，必须向他证明了自己有足够实力，否则是无法通过考验的。通过和他战斗，打败五只六百级的匆匆后可以得到火行令八。\n\n怨灵洞口的西皮希亚（36.63）他曾经见过沙城每日的PK竞赛中在竞技场内维持治安中的林捕头的玉佩，并且非常喜欢，想购买但是林捕头不愿意割爱。但是希亚对那玉佩念念不舍，朝思暮想。帮他找来林捕头的玉佩，就可以得到火行令九。而且他告诉玩家，如果要继续接受考验需要去找旺旺小天。\n\n据说小天很怕热，所以躲在太阳晒不到的地方。来到铜人殿找到怕热的小天（77.57），他告诉玩家如果能帮他弄来冰晶，那玩家需要帮忙的地方他也尽力帮忙。了解了冰晶的来源以及好处后，来到玉洁桥，如果恰巧遇上常枫，那么可以向他打听冰晶的情况，可以了解到在此处战斗时有可能得到这里怪物所收藏的冰石，当得到六个冰石后就可以请常枫帮忙将冰石提炼成一块冰晶，提炼冰晶时必须注意一定要带好六个冰石再请常枫帮忙提炼，如果数量不够，常枫提炼一半不但会白费功夫，而且会浪费玩家辛苦打到的冰石。得到一块冰晶后就可以拿回去给小天，小天看到冰晶后很高兴，他询问玩家是否愿意带着他的一位族人一起接受考验，同意后可以得到一只一级的旺旺和火行令十。\n\n山城的小阳（115.78）为了购买烟火，特地跑到山城来等待江南霹雳堂的人，结果一直没等到。若玩家帮他买了一只烟火，可以从他这里得到火行令十一。\n\n一心向往大草原的风影虽然已经从主人身边离开，但是由于顾虑小主人虫虫的感受，左右为难地停留在青幽洞（13.30）中。他请玩家帮忙给虫虫送封信，带着风影的信到水城找到虫虫（79.79），可以感受到他们之间深厚的情谊。虫虫看完信以后也请玩家帮忙带回信以及口信给风影，做完这些送信工作后，可以得到火行令十二。\n\n梦佛窟外可以找到晓风，他因为怀疑自己珍藏的火之念珠失窃是与嘟嘟鸟小月有关可又没有证据，如果玩家带着火行令十二并对火属性了解了14只或以上，晓风就会让玩家帮忙找回念珠。同意后来到明月桥上找到小月（10.8）打听火之念珠的事，小月由于被冤枉很是气愤，于是说要玩家打败他才透露有关念珠的事。和他战斗打败五只八百级别的嘟嘟鸟后得知是深蓝海城的绿甲拿去的。到深蓝海城的深蓝海底与绿甲战斗，有一定机率得到火之念珠.\n\n带着这念珠就可以回去找晓风了。找到晓风时可以知道如果身上带有一只精心饲养的等级在800级到900级以内忠诚度100的旺旺，并处于出征状态就可以接受晓风的考验了。带上合适的旺旺并出征后，如果是精心饲养的，也就是说成长比较好的旺旺，那么就可以通过晓风的考验并得到了两百级的等级奖励和火行令十三。\n\n带着火行令十三到瑞天雪城找到洛影，他很喜欢可爱的幻灵兽，一直希望有一只可爱的小叮咚能陪他玩，但是由于小叮咚在天空之城，所以一直未能如愿，玩家若帮他找一只一级的小叮咚来陪他玩，就可以得到火行令十四。\n\n华山的小狼仙（33.43）很羡慕胡狼与宁静雪（雪狼湖任务）的真爱，所以很想要代表真爱的白色绣球花，通过雪狼湖任务得到白色绣球花后给小狼仙可以得到火行令十五。\n\n在雪狼崖的老狼仙（27.26）有一个朋友蝶依，他们两族之间虽然水火不容，可他们之间的交情很好。老狼仙听说蝶依出事情了（名剑山庄任务），很是担心。但是由于自己不便出面直接去找蝶依，所以请玩家帮忙代为打探消息，玩家可以通过树城的灵儿到寒月台找到蝶依，将老狼仙的信交给蝶依，并带蝶依的回函给老狼仙可以得到火行令十六。老狼仙会着重提示下一个考验需要找阿蒙，告诉玩家阿蒙喜欢懂礼貌的人，要记得打招呼。\n\n在武当前上遇上由于练功不慎走火入魔而到武当来找张真人求治的阿蒙，他喜欢懂礼貌的人，所以如果没有使用动作与其招手打招呼，他是不会搭理人的哦。边招手边和他说话了解情况后，知道了他需要归元仙露才能尽快恢复，于是在阿蒙的提示下到了酒鬼冢找高阳酒徒询问归元仙露的情况。高阳酒徒由于口渴难耐，就写了封索酒信让玩家先帮他到名剑山庄找张一丁讨要极品状元红并让玩家去找玉露丹，带上名剑山庄的极品状元红和玉露丹后再回去找高阳酒徒。此时才知此两物品是制作归元仙露的关键材料。高阳酒徒制作好归元仙露后自己先抢喝了几口才给玩家，带着归元仙露回去给阿蒙，阿蒙为了表示感谢，就将火行令十七交给玩家。\n\n带着火行令在教堂外找到赫鲁斯（89.63），必须对火属性了解程度达到14只才可以接受他的考验，他会请玩家帮助寻找广陵散。根据赫鲁斯的提示，到英雄冢的传说中的英雄冢战斗，打败1300左右的黄锦宝有一定几率得到广陵散。找到广陵散并带着精心饲养的等级800级到900级，忠诚度一百的啮风犬就可以去找赫鲁斯接受考验，通过考验后可以得到火行令十八，接受考验的啮风犬也可以得到两百级的等级奖励。\n\n在敕勒川大蓬内的阿图姆，见到玩家以后对玩家能通过这么多考验表示难能可贵，让玩家尽情地展现实力与他战斗，需要注意的是这里有支线情节。在阿图姆处可以得到火行令十九，并了解到接下来的考验是由火系终极幻灵兽进行，火系终极幻灵兽有三位，只能选择其中一位来接受考验而无法接受其他两位的考验以及需要找悠然老人询问适合自己的考验者的情况。\n\n在断壁找到悠然老人，根据回答的不同选择不同的考验者，分别是火妖精魅影、绿妖碧云。选择好合适的考验者后可以得到相应的令牌：火魅令或者绿影令。然后按照选择不同进入不同的任务情节。\n\n魅影剧情：\n\n根据悠然老人的提示，到水城宝洞那里去寻找魅影。原本只能由阿修罗或者魔神进入的阿修罗、魔神修炼圣地，现在只要持有火魅令或者绿影令就可以得到特许进入了。\n在守侯洞窟找到魅影（29.52），需要对火属性了解18只或以上才可以继续接受考验。听魅影讲述完她们姐妹之间的往事后，魅影请玩家带信给碧云。玩家必须让她们姐妹和好才可以通过考验。\n通过暮归道的小妖阿威可以到达百草池，百草池是个美丽的地方，碧云就在这里（29.17）。带着魅影的信给她后得知其实她并没有生魅影的气，她请玩家帮忙找回她妹妹璇紫多年前被名盗柳随风盗走的白玉扇并交给璇紫，同意后碧云将一对碧星耳环交给玩家，让玩家一并带给璇紫。通过英雄冢任务中获得白玉扇后，到夜晚的时间伤口找到璇紫，璇紫收下白玉扇与碧星耳环后会给一枚碧玉扳指，带碧玉扳指回去给碧云后，碧云就给了玩家一对烈炎耳环，带着这烈炎耳环就可以回去找魅影交差了。此时如果带着满足条件，也就是八百级以上忠诚100的幻变天狼并出征，就可以接受魅影的考验。通过考验的话，接受考验的幻变天狼就会进化成火系超级幻灵兽，并得到一枚风火令。到此完成火属性任务魅影剧情。\n\n碧云剧情：\n\n在百草池找到碧云，喜爱自然的碧云认为只有有实力并且心性善良的人才适合拥有力量。她听说沙城的人们遇上一些麻烦，请玩家帮忙解决此事来证明自己的实力与心性。\n到沙城找到胡老头（75.66），知道沙城的水源被一伙强盗占据的事情，并了解到那些强盗可能是火系超级幻灵兽璇紫的手下。同意帮助沙城的人后，得到沙城的委托信。带着委托信到夜晚的时间伤口找到璇紫，原来那些强盗不是璇紫的手下，而是魅影的手下。替璇紫找回丢失的白玉扇后，璇紫给玩家一枚黄玉戒指作为信物。带着这信物到守侯洞窟找到魅影，魅影看在璇紫的份上，就将自己的令牌给玩家了。将魅影的烈炎令交给胡老头，就可以凭借此令解决沙城的水源问题了。这样就可以得到胡老头代表沙城百姓写的感谢信。\n碧云看到感谢信就让玩家通过考验，并给玩家一颗九阳丹和一块风火令。只要带着九阳丹找碧云，就可以在碧云的帮助下提升300级的等级（当然不超过最高等级）。到此完成火属性任务碧云剧情。\n\n\n\n", "source": "幻灵官服宝典"}, {"idx": 444, "orig_path": "【修炼区】->夫妻双飞攻略", "orig_data": "在漫长的修行之路上，夫妻携手，一路相伴，一直是很多人的梦想。如今，实现这个愿望不在困难。\n\n到新山城(40, 96)找到受恩师之命在此守候的通玄童子，对话就可进入新地图飞升门，二转到四转的夫妻双飞将在这个地图进行。 \n\n散仙飞地仙或夜叉，对两个人的基本要求与单人飞时一样；需要队长去找张三丰或者地狱守护魔女分别拿两颗仙道飞升药或者魔道飞升药，然后按照通玄童子的提示锻造出地仙或者夜叉双飞药。两人组队，队长身上带双飞药找人和童子对话，如条件满足，对话后双飞。\n\n地仙飞天仙、夜叉飞阿修罗，对两个人的基本要求与单人飞时一样；分别需要两颗天仙飞升药或者两颗阿修罗飞升药，按照通玄童子的提示锻造出双飞药。同样两人组队，队长身上带双飞药找地利童子对话，如条件满足，对话后双飞。 \n\n天仙飞大罗金仙、阿修罗飞魔神，对两个人的基本要求与单人飞时一样；另外，两人必须都是仙，或者都是魔，而且双飞二人必须飞同一系的。飞升丹药的锻造也必须是同一系的，按照通玄童子的提示将两颗同一系的丹药锻造出双飞药，两人组队，队长身上带药找天时童子对话，如条件满足，对话后双飞。 \n\n\n五转的双飞在下一张地图通仙之境进行。 \n大罗金仙或魔神双飞，对每个人的基本要求与单人飞时一样；而且两人必须都是仙，或者都是魔；两人带的必须是同样的守护佩，飞同样的职业。 \n\n双飞后系统除了送单飞时送的宠之外，还将多送夫妻双方每人一只盈盈。而且成长会随着双飞层次的提高逐渐提高。因此大家注意身上保留宠位。\n\n冰清友情提醒：飞升时请卸下身上装备，以免造成不必要的损失 ", "source": "幻灵官服宝典"}, {"idx": 445, "orig_path": "【修炼区】->“天魔解体”任务", "orig_data": "先去武当炼丹房找“元元真人”，他会告诉你去华山找“朱道友” 。\n然后去华山腰道找他，跟他对话会得到“无极草”。（朱在右上紧靠地图右边的地方，没有道路的，只能跳过去） \n再你把“无极草”交给元元真人，打完800的刚雷狒后会得到“无极天魔丹”。\n接下来拿着“无极天魔丹”去吊烤地狱找“魔女”，她会问你：[天魔解体大法]是很危险的，他要让你失去五分之一的等级，然后将剩下等级的一半参数返还给你。（大体这个意思）\n\n最后就是你的问题了，按不按确定，掉不掉级别？ 你自己决定哦~\n\n\n任务的注意事项:\n\n一:等级600级以上就可以做这个任务了 \n二:天魔解体必须下降20%的等级 \n三:剩下的一半等级的属性点数可以重新分配 \n四:在解体以前最好把未分配的点数分配完哟。\n\n大家如果有需要，就可以通过这个任务重新分配部分点数了~~~：）\n", "source": "幻灵官服宝典"}, {"idx": 446, "orig_path": "【修炼区】-> 开启乾坤五行炉任务", "orig_data": "在山城药店门口可以遇见药王（27，35），从他那里听说了乾坤五行炉的情况，了解到武当的元元真人正是当今世上少数懂得使用乾坤五行炉的人。找到药王炼丹所需要的无极草与药王交换可以得到药王佩。\n\n带着药王佩到武当练丹房内找到元元真人，元元真人会先考查玩家对乾坤五行炉的基本常识。（这些都是常识性问题哦，很容易的。）当三个问题都答正确后元元真人会赠给玩家一个乾坤五行炉并且指点了玩家的炼化入门知识。\n这样，就可以开炉炼化咯！只要点高级=》乾坤五行炉即可。\n\n三个问题以及答案如下：\n\n一、乾坤五行炉中最多可以同时放入几样物件进行炼制？ 答：8个\n二、乾坤五行炉是根据天地间的什么原理而来的？ 答：五行 （顾名思义就知道了哦!）\n三、在乾坤五行炉中武器是属于五行属性中的哪一个？ 答：火\n", "source": "幻灵官服宝典"}, {"idx": 447, "orig_path": "【修炼区】-> 退江湖（关闭pk）任务", "orig_data": "如何关闭PK执照（关闭之后其他玩家不能PK您，您也不可PK其他玩家)\n\n　　吾入江湖数十载，历经无数血雨腥风(就是常见自己的星星而已，^0^），心有倦意，但我不P人，人P我。今天终下决心，退隐江湖。（被一个黑社会追杀，想不退都不行了）\n在水城当铺旁与贤者倾诉退隐之意，他告诉我带着本金刚经找少林的慧明大师(也就是少林唯一的和尚)可帮我主持金盆洗手。于是，日夜兼程，奔赴少林(一路被人打，星星又看了几次，唉)。\n\n　　慧明大师知道我的来意，为试我心诚否，指定我找寻一只一级忠100的苦行龟于金盆洗手中放生消除戾气。素菜我都不吃一口，奔往树城。\n告诉你吧，这么多年江湖我也不是白混的，得到一级苦行龟的最快捷径就是做名剑山庄的捉龙换龟的任务，要去名剑先要从树城便利店旁的灵儿姑娘那得到香包才会有钓鱼翁愿意送你去名剑。得到香包就去吓死人洞二层捉只三百多级的纹地龙再去东码头找钓鱼翁去名剑，进名剑之后找到左上方的小女孩换到一只苦行龟了。再回少林，慧明大师就会帮你主持金盆洗手当画面上显示“系统”“昭告天下，从此金盆洗手，退隐江湖：恩恩怨怨，一笔勾销”时金盆洗手成功，洗的真干净呀!\n\n（呼，真是险啊，好几十人追到少林来P我呀，小命总算保住了，嘿嘿等我练成绝世武功，你们一个都逃不要，什么!你们也金盆洗手!晕!!!)\n出场人物：一个打不过就逃的高手中的高高手、贤者、明慧和尚、灵儿、钓鱼翁、小女孩、放生后却被我堡汤的苦行龟、被我玩够的纹地龙、一群没良心的黑社会.\n\n　　关键人物出场坐标：贤者(水城)：66， 71 /明慧和尚(少林)：12, 5 / 灵儿(树城)：30, 33 /小女孩(名剑山庄)：20, 40 /渔夫(东码头)：53, 64\n", "source": "幻灵官服宝典"}, {"idx": 448, "orig_path": "【修炼区】->“学偷技”的任务", "orig_data": "到水城(57,89)，找到快手老王，他会让你抓一只七级琳琳给他，他就教你偷技。\n\n去水成郊外抓一只4级琳琳，养到7级，然后再回来找快手老王，他会收走琳琳，然后奖励你20点偷技。", "source": "幻灵官服宝典"}, {"idx": 449, "orig_path": "【修炼区】->入江湖（开pk）任务", "orig_data": "在水城(101,88)找到贺捕头,跟他说话,他会给你一支飞镖.\n\n拿到飞镖后到水城(31,88)找蔡参将说话,然后进入战斗,打赢了以后PK执照\n\n打开,正式进入江湖.\n", "source": "幻灵官服宝典"}, {"idx": 450, "orig_path": "【修炼区】->物混乱技能任务", "orig_data": "来到新天空之城喷泉（27,39）找到正在补天的女娲，女娲会请你去帮忙到西天界找修炼千年的巨鳖取回天柱以将西斜天的撑起。\n\n在女娲的帮助下来到西天界，巨鳖拒绝将天柱交出，便可与之及其弟子进行交手，两轮胜仗后可将天柱取回交给女娲。\n\n为表示感谢，女娲将送你一件神奇的礼物，它能让你的出征宠学会“混乱攻击”的技能，但此技能密笈暗藏在一块神铁中，神铁被女娲身边的黑龙使偷走，女娲便会请你再协助将神铁寻回，并给你一块召唤神铁的磁铁。\n\n来到深蓝海底（25,27）找到黑龙使，打赢它后将神铁和磁铁取回带给女娲，女娲便信守承诺将宠物“混乱攻击”的技能密笈赠予你。 \n", "source": "幻灵官服宝典"}, {"idx": 451, "orig_path": "【修炼区】->宠物催眠任务技能", "orig_data": "在雪城宠物店跟小白（20，22）说话，他会让你找一只一级忠诚100的苦行龟跟他玩。\n\n给他一只一级忠诚100的苦行龟，他就会给你一本训兽经。\n\n然后到沙城宠物店找小红（21，17），将训兽经给他，并且通过他的考验（3只200级的迷惑），他就教你的出征宠物一招催眠攻击。", "source": "幻灵官服宝典"}, {"idx": 452, "orig_path": "【修炼区】-> “醉拳系列”任务", "orig_data": "这个任务只适合攻击点：1000，内力点：2000的玩家。\n先完成逍遥战衣的任务，然后带着逍遥战衣找到浪子剑阿锋，他会给你一把醉龙舞雪剑。\nPS：醉龙舞雪剑：攻击 +300 防御+100，敏捷-100\n\n然后到东码头找到钓鱼翁（53，65），他会让你拿一只一级红大嘴跟他换醉生梦死酒。\n\n然后到酒鬼冢找到高阳酒徒（39，24），把醉生梦死酒给他，他就会教你一招醉拳。\nPS：醉拳：使用等级：600，消耗内力：600，攻击效果1080。\n", "source": "幻灵官服宝典"}, {"idx": 453, "orig_path": "【修炼区】-> 少林金刚拳任务", "orig_data": "任务NPC位置：小龙 卧佛沙城 坐标92，72\n慧明和尚 少林藏经阁 坐标14，13\n任务目标：抓一只西皮给小龙，得到一本经书。\n交给少林慧明和尚可以学到“少林金刚掌”\n", "source": "幻灵官服宝典"}, {"idx": 454, "orig_path": "【修炼区】->“乒乓鱼”任务", "orig_data": "到雪城宠物店(23,11)找花花说话,他会让你帮他从地狱救一只一级的小丁当回来。\n\n去地狱抓一只一级的小丁当,回来找花花说话,他会给你一根\"人鱼项链\"。\n\n到沙城宠物店（11，18）找小仙说话，如果同意将\"人鱼项链\"给她，她会让一只一级的乒乓鱼跟随你。\n", "source": "幻灵官服宝典"}, {"idx": 455, "orig_path": "【修炼区】->“雪城宠物店”任务", "orig_data": "任务NPC位置:雪城宠物店 坐标17,17\n任务目标:将满足忠诚100,等级30的酷刺头交给小雪.既可为出征的宠加3点的忠诚度\n", "source": "幻灵官服宝典"}, {"idx": 456, "orig_path": "【修炼区】->“守望林场”任务", "orig_data": "任务NPC位置：守望林场 坐标19，47\n任务目标：抓一只一级的白毛象来换一只一级的酷刺头\n", "source": "幻灵官服宝典"}, {"idx": 457, "orig_path": "【修炼区】->“名剑山庄”任务", "orig_data": "任务NPC位置:灵儿 树城 坐标29,32\n钓鱼翁 东码头 坐标52,64\n张一丁 名剑山庄正院 坐标49,82\n小鱼 名剑山庄正院 坐标18,50\n任务流程:首先身上要有一只300多级的纹地龙.然后去树城找灵儿带个香包交给东码头的钓鱼翁既可去名剑山庄,到山庄内找小鱼将宠交给他任务完成,可得到一只一级苦行龟.\n", "source": "幻灵官服宝典"}, {"idx": 458, "orig_path": "【修炼区】->“送木柄”任务", "orig_data": "(等级限制0---49)\n\n山城的铁匠张三（31，60）近日生意不错，很多武林人士找他，武器销量大增，但制作武器手柄用的木头不够了，让玩家帮他去迷雾榕城他的兄弟拿一些来啊！”\n\n如果玩家答应将会得到一封介绍信，他的兄弟一看到就知道是张三叫你去的了！”\n\n到迷雾榕城找到“李四”（44，53）后，为了尽量给玩家少麻烦，李四决定迟点在找人送过去，同时为了证明玩家已经来过他这里，他会给你一个取货凭证到张三处交差。 \n为了感谢玩家的热心帮忙，张三将会给玩家300两的银子作为您来回奔波的酬劳。", "source": "幻灵官服宝典"}, {"idx": 459, "orig_path": "【修炼区】-> “救命药”任务", "orig_data": "（等级限制：0-15）\n\n“人在江湖走，哪能不挨咬！”\n\n浮影水城外郊’的“丑剑客”（47，11）：这些天状态不好，老在怪物手上吃亏，药也快用光了！需要玩家帮忙替他买药，如果玩家去水城药店替他买回救命药来让他有体力支撑回去的话，那么他将会回报帮助他的玩家。 \n选择“那就快离开这吧！”的则结束对话\n\n带着丑剑客给的“购药方子”到药店买回甘露酒交给丑剑客。作为回报丑剑客将会给玩家银子，并传些功力给玩家。", "source": "幻灵官服宝典"}, {"idx": 460, "orig_path": "【修炼区】->“御风而行”任务", "orig_data": "来到武当山（39,57）找到列子，告诉他想学御风而行的愿望，列子会让你带一双“草缕鞋“给愚公吕三太。\n\n在犁春园（48,18）找到愚公口三太后，他会收下这双草缕鞋，提示你可以将他脚下的一簸”王屋之石“送给在不归海岸（93,65）衔石填海的精卫鸟楚云，如果里面有五彩石，便可学会御风而行。\n\n带上王屋之石找到楚云，将其交给她，如果是五彩之石（80%的机会），楚云会赠予你一颗”飞行石“，此飞行石只能使用一次，如果不是五彩之石，楚云也会将一片金羽毛（0级+防25左饰）赠予你作为礼物。\n\n注：御风而行的任务只有二转及二转以下的人才可以做。\n", "source": "幻灵官服宝典"}, {"idx": 461, "orig_path": "【修炼区】->“庄周梦蝶”任务", "orig_data": "到观日桥找到惠子（11,13），惠子会问你鱼儿是否是快乐的，如果你告诉他鱼儿是快乐的，他便会和你探讨一番鱼儿是否快乐的哲学，并在你的认真坚持下，让你带上一只乒乓鱼和一封手书去找能通晓鱼儿语言的庄子。如果一开始你就认为他是神经兮兮的，惠子便会让你带上一只乒乓鱼和一封手书去找庄子，让庄子研究一番后来此与他探讨鱼儿是否快乐的哲学。 \n\n到闲情园（30,27）找到正在白日做梦的庄子，如果你手上有庄子手书和乒乓鱼，庄子便会告诉你鱼儿为什么是快乐的，并会告诉你他其实是一只蝴蝶，不论你认为是真是假，除非你对他不礼貌，否则他都会告诉你他梦见自己化身为蝶，在花间翩翩飞舞，并指点你一些做人的道理，为了表示感谢，你可以帮他找到他的花魂-代表真爱的白色绣球花，并把乒乓鱼赠予他，他便会送给你一件梦蝶佩（0级+防30的右饰）。", "source": "幻灵官服宝典"}, {"idx": 462, "orig_path": "【修炼区】->幻灵“进入英雄冢”攻略", "orig_data": "到瑞天雪城找到徐天麟（73，26），他会让你帮他找女儿，并且给你一个苦艾香囊。到皇城的大殿里找到徐君如（29，30），他会告诉你她被人劫持的经过，并且给你一块大内通行令，让你帮她找回家传的翠羽钗。到凝露山城找到周仁（52，91），跟他说完进入战斗（10只1350级的旺旺），战斗胜利得到翠羽钗。然后回去找到徐天麟，他会给你一块英雄令，带着英雄令找徐君如就可以进入英雄冢了。\n\n进入英雄冢，到最底层可以看见有五个人分别站在五个角，这里是五位战死英雄埋骨之地，只要玩家为这些英魂完成一系列任务将可得到英雄们的承认，为玩家举行传承英雄力量的仪式。\n\n首先找右下脚的柳随风（39，17），他告诉你在子时到午时可以找下面的守护神兽说话. 打赢1235的幻云兽后拿到神兽令,叫你在午时到子时再与柳随风说话。柳随风会让你帮忙到华山的某个地方帮他把隐藏的东西取回来。玩家答应后可以得到一块玉佩。到华山瀑布找夜行兽（4，14），对话后进入战斗（10只1400级的蓝大嘴）。战胜后夜行兽会给你一把白玉扇，让你再去找柳随风。将白玉扇交给柳随风后他会给你一个神偷令牌，让你去鹰枪无敌何轻烟（英雄冢22，23）。与何轻烟对话，他会给你一个磁气瓶让你帮忙到敕勒川替他找魔鹰。\n\n到敕勒川找到何轻烟的化身为火凤凰的魔鹰后与之对话可以得到一个火凰草去何轻烟那里交差。交给何轻烟火凰草就算过了这关了，何轻烟会给你一块神鹰令去找钟离剑。\n\n\n带着神鹰令去找钟离剑。原来钟离剑是铁剑门的掌门，按铁剑门的规矩，掌门卸任时应该掌门铁剑留给下一带的掌门。但钟离剑在与魔头的血战中死了，掌门铁剑也不知下落，只要玩家能帮他找到遗失的铁剑，并且把剑交给华山脚下的铁剑门门人，他就会推荐你去见他的兄长禁军统领——沈铁衣了。钟离剑让你带着一块原来挂在铁剑上的玉佩到沙漠去找线索。在遗忘之地会碰到一只喜欢收集各种东西的幻灵兽（19，62）在这渺无人烟的荒漠地带难得碰到一个人，幻灵兽提出只要玩家跟它过过招，就可以把铁剑奉上。答应后出现10只1500级的黄龙使。战胜这些黄龙使，就可以得到铁剑门的掌门铁剑。把铁剑交给华山脚下的铁剑门弟子（29，62），带上他给的铁剑副令就可以回到英雄冢找钟离剑交差了。为了表示对你的感激之情，钟离剑会给你一块令牌让你去找沈铁衣。\n\n对于玩家到来，沈铁衣深感诧异，因为几乎没有人来到过他这里，但是对于玩家是否能继承5位英雄的力量，他还是要进行一番考较。\n\n沈铁衣当年深受皇恩，为了报答知遇之恩，他会让你带着他的“铁军令”去帮紫禁城的江大人收服两个不受皇家约束的江湖帮派。带上令牌到紫禁城找江大人（51，45）。他会告诉你凰之谷的权利帮和梦佛窟的金钱帮与朝廷作对，让你去收服这两个帮派。在凰之谷战胜权利帮帮主（30，25）及他的手下10只1600的飞天鼠，可以得到权利令，表示该帮派从今以后听从皇家的指挥。梦佛窟战胜金钱帮帮主（89，62）及其手下10只1600级的飞天鼠可以得到代表该帮最高权利的金钱令。降伏两个帮派后，带上权利令和金钱令回到江大人那交令，为了表彰你的功勋，会给你一个奖牌。带着奖牌玩家可以回到英雄冢去找沈铁衣。由于完成了沈铁衣生前的夙愿，他对你感激不尽，会让你带着他的信物“中军令”去找最后一位英雄——江湖浪客顾人来。\n\n验过令牌之后，顾人来会让你带着他的古瓷瓶到他出生的小鱼村去看看，顺便帮助那边的村民。在顾人来的家乡不归海岸你会碰到一个顾老头（12，37）。看过古瓷瓶，他会向你述说最近来了一伙海盗想把夺取村子作为他们的分舵。战胜海盗手下1700级的绿甲后，你就算通过了顾人来这关了。带上顾老头的粽子就可以回去见顾人来了。\n\n见到顾人来后，他对你的侠义心肠大为赞赏，认定你就是继承他们力量的最好人选，会把一块“英雄令”给你。让你去找守护兽替你举行传承仪式。\n\n在适当的时间（子时至午时）再去英雄冢找守护神兽，奉上英雄令，它就会替你举行仪式了。仪式完毕后，玩家可以获得的物品将不再单一的为“九转天仙丹”。将随机获得“9转元阳丹”、“9转蕴灵丹”、“10元宠物礼包”等等。想知道获得的更多物品，那么现在就出发吧！\n", "source": "幻灵官服宝典"}, {"idx": 463, "orig_path": "【修炼区】-> “恋之守护”任务", "orig_data": "在幻灵栖月谷（28，40）的地方，可以看到一个漂亮的mm可儿在呤诗，询问后得知她的恋人远在雪域，请玩家帮忙到雪城附近为她的恋人常枫送上一件可儿亲手做的衣服（多才多艺，能诗，也能做家事），同意后得到一件“御雪暖服”。\n\n到了雪城附近，由西雪岭经寒井台,进入冰清桥往上就是玉洁桥，每天的20:00到21:00，常枫会出现玉洁桥最深处（40，20），将衣服给他后，他会请玩家再帮忙带上一支“雪山人参”给可儿!\n\n按原路回到栖月谷再与可儿交谈，可儿为了表示感谢，将自己儿时获得的一条有魔法的项链“恋之守护”赠送给玩家。此项链据说有特别的魔法，只要佩戴上这条项链，爱情就能得到恋之女神的护佑。\n\n注意，可儿只和女性ID说话，如果是GG和她说话，她是不理睬的呀!所以，这个任务是女玩家才可以做的哦!\n\nPS：恋之守护 +30敏捷，并且可以佩戴在右边。\n\n ", "source": "幻灵官服宝典"}, {"idx": 464, "orig_path": "【修炼区】->“逍遥战衣与空明拳”任务", "orig_data": "首先你要在 凝露山城(30,33)，浮影水城(53 112)，树城(84,100)，卧佛沙城(22,69)，雪城(42,67) 这四个地方中的其中一个地方找到“浪子剑阿锋”，找到他后，他会告诉你去他想“天魔解体”，但是他没有“天魔解体”时必须的“无极天魔丹”，所以这时你要去帮他找“无极天魔丹”，找到后给他，他会给你一件他自己锻造的装备--“逍遥战衣”。\n*但做过“天魔解体”任务的玩家应该知道，练“无极天魔丹”还需要“无极草”，所以当你把“无极草”给他时，他因为感谢还会教你空明拳。*\n\n“无极草”和“无极天魔丹”的得到方法，请参照“天魔解体”任务攻略\n\nPS：逍遥战衣，使用等级：600，攻击+20，防御+250 (此战衣在商店价值70万) \n\n注:这个任务中的“浪子剑阿锋”在一个玩家做完后，会跑到其它城市，所以你也要到处奔波去找他， 好在他就在上面说的几个坐标之间跑。\n\n", "source": "幻灵官服宝典"}, {"idx": 465, "orig_path": "【修炼区】->猎人迷药任务", "orig_data": "在猎人洞窟里(14,33)附近的地方打嗷日犬,可以随机得到\"猎人的迷药\".\n\n拿到\"猎人的迷药\"后出来跟李月蝶(14,36)说话,可以得到\"用过的猎刀\".\n\n带着\"用过的猎刀\"到水城(57,89)找快手老王说话,可以得到一颗\"升级药\"\n\n(可以升5级,吃了可以直接过天劫哟).\n\n ", "source": "幻灵官服宝典"}, {"idx": 466, "orig_path": "【修炼区】->“猎人洞窟”任务", "orig_data": "任务NPC位置:西码头 坐标12,37\n任务流程:先找猎人李进说话,答应帮忙,于是进入\"猎人洞窟\".将抓到的\"嗷日犬\"交给猎人的女儿李月蝶既可获得一定的金钱\n", "source": "幻灵官服宝典"}, {"idx": 467, "orig_path": "【修炼区】->“碧水洞窟蒙蒙”任务", "orig_data": "任务NPC位置:小枫 碧水洞窟 坐标25,10\n任务目标:在碧水洞窟抓到900级的蒙蒙后，去水城找小枫的姊姊小云，把符合条件的蒙蒙交给小云拿到取货凭证，回去找小枫获取相应的奖金。", "source": "幻灵官服宝典"}, {"idx": 468, "orig_path": "【修炼区】->当你登陆游戏游戏遇到以下只有一半画面的时候？", "orig_data": "右击HL桌面图标-选择属性-属性里面的兼容性-勾上兼容性-选择WIN98和ME.确定重上.\n\n或者你可以将兼容性里面的 禁用视觉 勾上就可以了\n\n如果选择了兼容性后,聊天记录出现只有一行的问题..那么将禁用视觉勾上试试.\n", "source": "幻灵官服宝典"}, {"idx": 469, "orig_path": "【修炼区】->新山城客栈用功德换宠物、武功等东西的解说", "orig_data": "☆指代不推荐、★指代推荐\n\n◆本帖与无量殿的更新而更新◆\n①：换轻翼龙需要消耗3000功德值(金属性)  ※推荐度：★★★☆☆\n\n②：换波萝蜜需要消耗6000功德值(木属性)  ※推荐度：★★☆☆☆\n\n③：换小精卫需要消耗3000功德值(金属性)  ※推荐度：☆☆☆☆☆\n\n④：换丸子鱼需要消耗7000功德值(水属性)  ※推荐度：☆☆☆☆☆\n\n⑤：换小令当需要消耗7000功德值(土属性)  ※推荐度：☆☆☆☆☆\n\n⑥：换水晶儿需要消耗＿＿＿功德值(金属性)  NPC无提示、目前估计所耗功德值在30W以上\n\n⑦：学习少林七十二绝技之般若掌需要消耗50000功德值(系统显示：500内 1100杀伤 300级使用 根据玩家学到的结果得知系数是2.63)  ※推荐度：★★☆☆☆\n\n⑧：换无量水晶需要消耗150功德值(效果相当于五个-5000毒药)  ※推荐度：★☆☆☆☆\n\n⑨：换10级等级需要消耗1000功德值(不能过劫`无聊的东西`浪费功德)  ※推荐度：☆☆☆☆☆", "source": "幻灵官服宝典"}, {"idx": 470, "orig_path": "【展示区】->全套极品满修PK装备", "orig_data": "感谢天下会员..心碎制作出的\"满修军火\"\n\n满修招人装备：http://bbs.ty17.com/attachments/month_0703/20070328_667515cb56ee05ea458dec4Fs7qDMoo0.jpg\n\n满修内人装备：http://bbs.ty17.com/attachments/month_0703/20070329_40fc9f01cd03949976fbXp7wumOVkYM2.jpg\n\n满修防标人装备：http://bbs.ty17.com/attachments/month_0703/20070328_fcae04e6fb6b32ac4515tNKOJM05OhWq.jpg\n\n幻灵游侠2.5之宠爱一生-----宠物图鉴完整版[点击以下地址欣赏]\nhttp://user.qzone.qq.com/271499019/photo/a207fb32-4c95-49d7-b949-a2b2e470859e\n", "source": "幻灵官服宝典"}];

    // Set stat numbers
    document.getElementById('statBlocks').textContent = allBlocks.length;

    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const sidebarNav = document.getElementById('sidebarNav');
    const welcomeView = document.getElementById('welcomeView');
    const detailView = document.getElementById('detailView');
    const detailBreadcrumb = document.getElementById('detailBreadcrumb');
    const detailTitle = document.getElementById('detailTitle');
    const detailSource = document.getElementById('detailSource');
    const detailPath = document.getElementById('detailPath');
    const detailCode = document.getElementById('detailCode');
    
    const searchInput = document.getElementById('searchInput');
    const searchCount = document.getElementById('searchCount');
    const searchResultsSection = document.getElementById('searchResultsSection');
    const searchResultsList = document.getElementById('searchResultsList');
    const closeSearchBtn = document.getElementById('closeSearchBtn');

    // UI States
    let currentFontSize = 14;

    // 2. Render Sidebar Navigation Tree
    function renderNavigation() {
      let navHtml = '';
      Object.keys(categoryMapping).forEach((catName, catIdx) => {
        const blocks = categoryMapping[catName];
        if (blocks.length === 0) return;

        const catSlug = `cat-${catIdx}`;
        navHtml += `
          <div class="category-group">
            <button class="category-header" data-target="${catSlug}" id="header-${catSlug}">
              <span>${catName}</span>
              <span class="category-arrow">▶</span>
            </button>
            <div class="category-list" id="list-${catSlug}">
        `;

        blocks.forEach(blockIdx => {
          const block = allBlocks[blockIdx];
          const cleanPath = block.orig_path.replace('->', ' ➔ ');
          navHtml += `
            <button class="nav-item" data-hash="block-${block.idx}" id="nav-block-${block.idx}">
              ${cleanPath}
            </button>
          `;
        });

        navHtml += `
            </div>
          </div>
        `;
      });
      sidebarNav.innerHTML = navHtml;

      // Event Listeners for accordion headers
      document.querySelectorAll('.category-header').forEach(header => {
        header.addEventListener('click', () => {
          const targetId = header.getAttribute('data-target');
          const list = document.getElementById(`list-${targetId}`);
          const isActive = header.classList.toggle('active');
          
          if (isActive) {
            list.style.maxHeight = list.scrollHeight + "px";
          } else {
            list.style.maxHeight = "0px";
          }
        });
      });

      // Event Listeners for subitems
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          const hash = item.getAttribute('data-hash');
          window.location.hash = hash;
          closeMobileSidebar();
        });
      });
    }

    // Mobile Sidebar controls
    function openMobileSidebar() {
      sidebar.classList.add('active');
      sidebarOverlay.classList.add('active');
    }

    function closeMobileSidebar() {
      sidebar.classList.remove('active');
      sidebarOverlay.classList.remove('active');
    }

    menuToggleBtn.addEventListener('click', openMobileSidebar);
    sidebarOverlay.addEventListener('click', closeMobileSidebar);

    // Theme Switch
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeToggleBtnMobile = document.getElementById('themeToggleBtnMobile');

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark-mode');
      const icon = isDark ? '🌙' : '💡';
      themeToggleBtn.textContent = isDark ? '🌙' : '💡';
      themeToggleBtnMobile.textContent = isDark ? '💡' : '🌙';
    }

    themeToggleBtn.addEventListener('click', toggleTheme);
    themeToggleBtnMobile.addEventListener('click', toggleTheme);

    // 3. Hash Router logic
    function handleHashChange() {
      const hash = window.location.hash.substring(1);
      if (!hash) {
        welcomeView.style.display = 'block';
        detailView.style.display = 'none';
        setActiveNavItem(null);
        return;
      }

      // Check if it's block-X or cat-X
      if (hash.startsWith('block-')) {
        const blockIdx = parseInt(hash.replace('block-', ''), 10);
        const block = allBlocks.find(b => b.idx === blockIdx);
        if (block) {
          renderBlockDetail(block);
          setActiveNavItem(blockIdx);
        }
      } else if (hash.startsWith('cat-')) {
        // Just expand the category in sidebar
        const catIdx = parseInt(hash.replace('cat-', ''), 10);
        const header = document.getElementById(`header-cat-${catIdx}`);
        if (header && !header.classList.contains('active')) {
          header.click();
        }
      }
    }

    function renderBlockDetail(block) {
      welcomeView.style.display = 'none';
      detailView.style.display = 'flex';

      // Breadcrumb calculation
      const parts = block.orig_path.split('->');
      detailBreadcrumb.textContent = parts.slice(0, -1).join(' ➔ ') || '全攻略';
      detailTitle.textContent = parts[parts.length - 1];
      detailSource.textContent = `数据来源: ${block.source}`;
      detailPath.textContent = `原始路径: ${block.orig_path}`;
      detailCode.textContent = block.orig_data;
      
      // Auto Scroll right panel back to top
      document.getElementById('readerPanel').scrollTop = 0;
    }

    function setActiveNavItem(blockIdx) {
      // Deactivate all
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });

      if (blockIdx !== null) {
        const activeNav = document.getElementById(`nav-block-${blockIdx}`);
        if (activeNav) {
          activeNav.classList.add('active');
          // Auto scroll sidebar to display this item
          activeNav.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          // Ensure parent accordion is expanded
          const accordionContent = activeNav.parentElement;
          const headerId = accordionContent.id.replace('list-', 'header-');
          const header = document.getElementById(headerId);
          if (header && !header.classList.contains('active')) {
            header.click();
          }
        }
      }
    }

    // 4. Clientside Fuzzy Search Engine
    let searchDebounceTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchDebounceTimeout);
      searchDebounceTimeout = setTimeout(performSearch, 200);
    });

    function performSearch() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) {
        searchResultsSection.style.display = 'none';
        searchCount.textContent = '';
        return;
      }

      // Filter all blocks
      const results = allBlocks.filter(block => {
        return block.orig_path.toLowerCase().includes(query) || 
               block.orig_data.toLowerCase().includes(query);
      });

      searchCount.textContent = `${results.length} 条`;
      searchResultsSection.style.display = 'block';
      
      let resultsHtml = '';
      if (results.length === 0) {
        resultsHtml = '<div style="padding:16px; text-align:center; color:var(--text-secondary); font-size:13px;">没有找到匹配的内容...</div>';
      } else {
        results.forEach(block => {
          resultsHtml += `
            <div class="search-result-item" data-hash="block-${block.idx}">
              <div class="search-result-title">${block.orig_path.replace('->', ' ➔ ')}</div>
              <div class="search-result-path">来源: ${block.source} | 路径: ${block.orig_path}</div>
            </div>
          `;
        });
      }
      searchResultsList.innerHTML = resultsHtml;

      // Result click listener
      document.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', () => {
          const hash = item.getAttribute('data-hash');
          window.location.hash = hash;
          // Hide search results to focus on reader
          searchResultsSection.style.display = 'none';
          searchInput.value = '';
          searchCount.textContent = '';
          closeMobileSidebar();
        });
      });
    }

    closeSearchBtn.addEventListener('click', () => {
      searchResultsSection.style.display = 'none';
      searchInput.value = '';
      searchCount.textContent = '';
    });

    // 5. FontSize actions
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    zoomInBtn.addEventListener('click', () => {
      if (currentFontSize < 24) {
        currentFontSize += 1;
        detailCode.style.fontSize = `${currentFontSize}px`;
      }
    });
    zoomOutBtn.addEventListener('click', () => {
      if (currentFontSize > 11) {
        currentFontSize -= 1;
        detailCode.style.fontSize = `${currentFontSize}px`;
      }
    });

    // Copy Content Action
    const copyContentBtn = document.getElementById('copyContentBtn');
    copyContentBtn.addEventListener('click', () => {
      const code = detailCode.textContent;
      navigator.clipboard.writeText(code).then(() => {
        copyContentBtn.classList.add('tooltip-active');
        setTimeout(() => {
          copyContentBtn.classList.remove('tooltip-active');
        }, 1500);
      }).catch(err => {
        alert('复制失败，请手动选定复制。');
      });
    });

    // Initialization
    window.addEventListener('hashchange', handleHashChange);
    renderNavigation();
    handleHashChange(); // Trigger on load

  </script>
</body>
</html>
